        </div>
      </div>

      {/* 風險生命週期 */}
      <SectionLabel>風險生命週期</SectionLabel>
      <div style={{marginBottom:16}}>
        {[
          {step:0,label:'已登記',       date:risk.createdAt},
          {step:1,label:'FAIR 分析完成', date:risk.fairResult?risk.updatedAt:null},
          {step:2,label:'評估決策完成',  date:risk.evaluation.reviewedAt},
          {step:3,label:'應對計畫建立',  date:risk.treatment.dueDate?risk.updatedAt:null},
          {step:4,label:'控制措施完成',  date:risk.treatment.treatStatus==='completed'?risk.updatedAt:null},
          {step:5,label:'進入監控',      date:risk.status==='monitoring'?risk.updatedAt:null},
        ].map((s,i)=>{
          const done=STATUS_CFG[risk.status]?.step>=s.step;
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <div style={{width:24,height:24,borderRadius:'50%',flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:10,fontWeight:700,fontFamily:'Inter,sans-serif',
                background:done?C.grn:C.bdr,color:done?'white':C.fnt}}>
                {done?'✓':i+1}
              </div>
              <div style={{fontSize:12.5,color:done?C.txt:C.fnt,fontFamily:'Inter,sans-serif',
                fontWeight:done?500:400,flex:1}}>{s.label}</div>
              {s.date&&<div style={{fontSize:11,color:C.fnt,fontFamily:'Inter,sans-serif'}}>
                {fmtDate(s.date)}
              </div>}
            </div>
          );
        })}
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <Btn ch="結案此風險" onClick={closeRisk} v="ghost" style={{color:C.sub,fontSize:12}}/>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {saved&&!isDirty&&(
            <span style={{fontSize:12,color:C.grn,fontFamily:'Inter,sans-serif',
              display:'flex',alignItems:'center',gap:5}}>
              <span style={{fontSize:15}}>✓</span> 已儲存
            </span>
          )}
          {!isDirty&&!saved&&(
            <span style={{fontSize:12,color:C.fnt,fontFamily:'Inter,sans-serif'}}>尚無變更</span>
          )}
          <Btn ch={saved&&!isDirty?'儲存完成 ✓':'儲存變更'}
            onClick={isDirty?save:undefined} disabled={!isDirty}
            v={saved&&!isDirty?'ghost':'primary'}
            style={saved&&!isDirty?{color:C.grn,borderColor:C.grn,background:'transparent',opacity:0.8}:{}}/>
        </div>
      </div>
    </div>
  );
}

/* Tab: 決策摘要 */
/* Tab: 風險計價 */
function TabPricing({risk,onUpdate}){
  const r=risk.fairResult;
  const ip0=risk.internalPricing||{};
  const tr=risk.treatment;
  const mkId=()=>Math.random().toString(36).slice(2,8);
  const[ip,setIp]=useState(()=>({
    enabled:false,purpose:'',pricingBasis:'',
    currentRiskCost:'',residualRiskCost:'',allocatedAmount:'',
    allocationCycle:'annual',includedInBudget:'',accountingNote:'',
    insuranceAllocationRatio:'',postInsuranceNetRiskCost:'',insuranceTradeoffNote:'',
    expectedExposureReduction:'',roiNote:'',managementInterpretation:'',
    allocationDetails:[],
    ...ip0,
    allocationDetails:Array.isArray(ip0.allocationDetails)?ip0.allocationDetails:[],
  }));
  const[saved,setSaved]=useState(false);
  const upd=(k,v)=>{setIp(p=>({...p,[k]:v}));setSaved(false);};
  const save=()=>{
    onUpdate({...risk,internalPricing:{...ip,lastUpdated:today()},updatedAt:today()});
    setSaved(true);
  };
  const parseTWD=s=>Math.round(parseFloat((s||'').replace(/[^0-9.\-]/g,''))||0);
  const indicativeCost=useMemo(()=>{
    if(!r)return 0;
    if(ip.pricingBasis==='eal')return r.mean;
    if(ip.pricingBasis==='p90')return r.p90;
    if(ip.pricingBasis==='hybrid')return(r.mean+r.p90)/2;
    if(ip.pricingBasis==='base_adj')return r.mean*1.15;
    return r.mean;
  },[ip.pricingBasis,r]);
  const treatBudget=parseTWD(tr.approvedAmount||tr.budget);
  const curCost=parseTWD(ip.currentRiskCost)||Math.round(indicativeCost);
  const resCost=parseTWD(ip.residualRiskCost);
  const insRatio=(parseFloat(ip.insuranceAllocationRatio)||0)/100;
  const reduction=curCost-resCost;
  const roi=treatBudget>0&&reduction>0?(reduction/treatBudget*100).toFixed(0):null;
  const totalPool=parseTWD(ip.allocatedAmount)||curCost;
  const details=ip.allocationDetails||[];
  const totalPct=details.reduce((s,d)=>s+(parseFloat(d.weightPercent)||0),0);
  const pctOk=Math.abs(totalPct-100)<0.01;
  const calcRow=(d)=>{
    const pct=(parseFloat(d.weightPercent)||0)/100;
    const curAlloc=Math.round(curCost*pct);
    const resAlloc=Math.round(resCost*pct);
    const insAlloc=Math.round(curCost*insRatio*pct);
    const ctrlAlloc=Math.round(treatBudget*pct);
    const net=resAlloc+ctrlAlloc+insAlloc;
    return{curAlloc,resAlloc,insAlloc,ctrlAlloc,net};
  };
  const addUnit=()=>{
    const newRow={id:mkId(),unitName:'',allocationBasis:'equal',weightPercent:'',notes:''};
    upd('allocationDetails',[...details,newRow]);
  };
  const removeUnit=(id)=>upd('allocationDetails',details.filter(d=>d.id!==id));
  const updUnit=(id,k,v)=>upd('allocationDetails',details.map(d=>d.id===id?{...d,[k]:v}:d));
  const autoEqual=()=>{
    if(!details.length)return;
    const pct=+(100/details.length).toFixed(1);
    upd('allocationDetails',details.map(d=>({...d,weightPercent:String(pct)})));
  };
  const purposes=[
    {v:'cost_alloc',     l:'成本分攤',     en:'Cost Allocation'},
    {v:'invest_dec',     l:'投資決策支援', en:'Investment Decision'},
    {v:'insurance_alloc',l:'保險分攤',     en:'Insurance Allocation'},
    {v:'retained',       l:'風險保留成本', en:'Retained Risk Cost'},
  ];
  const bases=[
    {v:'eal',      l:'EAL',         en:'預期年度損失'},
    {v:'p90',      l:'P90',         en:'高分位損失'},
    {v:'hybrid',   l:'Hybrid',      en:'EAL+P90 混合'},
    {v:'base_adj', l:'Base+Adj',    en:'固定費率調整'},
  ];
  const cycles=[{v:'monthly',l:'月度'},{v:'quarterly',l:'季度'},{v:'annual',l:'年度'},{v:'one_time',l:'一次性'}];
  const allocBases=[
    {v:'equal',   l:'平均分攤'},
    {v:'revenue', l:'依營收占比'},
    {v:'asset',   l:'依資產價值'},
    {v:'usage',   l:'依使用量'},
    {v:'eal',     l:'依 EAL 占比'},
    {v:'custom',  l:'自訂'},
  ];
  if(!r){
    return(
      <div style={{textAlign:'center',padding:'48px 20px',color:C.fnt,fontFamily:'Inter,sans-serif'}}>
        請先在「FAIR 分析」標籤執行蒙地卡羅模擬，才能使用內部風險計價功能。
      </div>
    );
  }
  return(
    <div>
      {/* Enable toggle */}
      <div onClick={()=>upd('enabled',!ip.enabled)}
        style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',
          background:ip.enabled?C.txt:'#F6F4EF',borderRadius:4,marginBottom:16,
          border:`1px solid ${ip.enabled?C.txt:C.bdr}`,cursor:'pointer',transition:'all .15s'}}>
        <div style={{width:20,height:20,borderRadius:4,flexShrink:0,
          border:`2px solid ${ip.enabled?'white':C.bdr}`,
          background:ip.enabled?'rgba(255,255,255,0.25)':'transparent',
          display:'flex',alignItems:'center',justifyContent:'center'}}>
          {ip.enabled&&<span style={{color:'white',fontSize:11,fontWeight:700}}>✓</span>}
        </div>
        <div>
          <div style={{fontSize:13.5,fontWeight:700,fontFamily:'Inter,sans-serif',
            color:ip.enabled?'white':C.txt}}>
            啟用內部風險計價（Internal Risk Pricing）
          </div>
          <div style={{fontSize:11,color:ip.enabled?'rgba(255,255,255,.7)':C.sub,
            fontFamily:'Inter,sans-serif',marginTop:2}}>
            將 FAIR 量化結果轉化為內部管理成本訊號，支援多單位成本分攤與投資決策
          </div>
        </div>
      </div>
      {ip.enabled&&(
        <div className="fade">
          {/* PART 1: 整體計價設定 */}
          <div style={{background:'#F6F4EF',border:`1px solid ${C.bdr}`,
            borderRadius:6,padding:'16px 18px',marginBottom:16}}>
            <div style={{fontSize:10.5,fontWeight:700,color:C.txt,letterSpacing:'0.1em',
              textTransform:'uppercase',marginBottom:12,fontFamily:'Inter,sans-serif',
              display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:3,height:14,background:C.txt,borderRadius:2,display:'inline-block'}}/>
              整體計價設定 · Overall Pricing Setup
            </div>
            {/* FAIR refs */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
              {[
                {k:'EAL',       v:usd(r.mean),          note:'預期年度損失'},
                {k:'P90',       v:usd(r.p90),            note:'90% 情境門檻'},
                {k:'Hybrid',    v:usd((r.mean+r.p90)/2), note:'EAL+P90 均值'},
                {k:'計價指示值', v:usd(indicativeCost),   note:'依所選方法'},
              ].map(({k,v,note})=>(
                <div key={k} style={{padding:'8px 10px',background:'white',
                  border:`1px solid ${C.bdr}`,borderRadius:4}}>
                  <div style={{fontSize:9,color:C.fnt,marginBottom:1,fontFamily:'Inter,sans-serif',
                    textTransform:'uppercase',letterSpacing:'0.06em'}}>{k}</div>
                  <div style={{fontSize:15,fontWeight:700,color:C.txt,fontFamily:'Inter,sans-serif'}}>{v}</div>
                  <div style={{fontSize:9,color:C.fnt,fontFamily:'Inter,sans-serif'}}>{note}</div>
                </div>
              ))}
            </div>
            {/* Purpose + Method */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:5,fontFamily:'Inter,sans-serif'}}>計價目的</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {purposes.map(p=>(
                    <div key={p.v} onClick={()=>upd('purpose',p.v)}
                      style={{padding:'5px 11px',borderRadius:3,cursor:'pointer',fontSize:12,
                        fontFamily:'Inter,sans-serif',fontWeight:ip.purpose===p.v?700:400,
                        border:`1.5px solid ${ip.purpose===p.v?C.blu:C.bdr}`,
                        background:ip.purpose===p.v?C.bluL:'white',
                        color:ip.purpose===p.v?C.blu:C.sub,transition:'all .12s'}}>
                      {p.l}
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:5,fontFamily:'Inter,sans-serif'}}>計價方法</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {bases.map(b=>(
                    <div key={b.v} onClick={()=>upd('pricingBasis',b.v)}
                      style={{padding:'5px 11px',borderRadius:3,cursor:'pointer',fontSize:12,
                        fontFamily:'Inter,sans-serif',fontWeight:ip.pricingBasis===b.v?700:400,
                        border:`1.5px solid ${ip.pricingBasis===b.v?C.grn:C.bdr}`,
                        background:ip.pricingBasis===b.v?C.grnL:'white',
                        color:ip.pricingBasis===b.v?C.grn:C.sub,transition:'all .12s'}}>
                      {b.l}
                      {ip.pricingBasis===b.v&&(
                        <span style={{fontSize:9,color:C.grnM,marginLeft:3}}>({b.en})</span>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            {/* Cost fields */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:10}}>
              {[
                {k:'currentRiskCost',          l:'目前內部風險成本',    ph:`建議：${usd(Math.round(indicativeCost))}`},
                {k:'residualRiskCost',          l:'預期殘餘風險成本',    ph:'例：NT$220,000'},
                {k:'allocatedAmount',           l:'建議總分攤池',        ph:'例：NT$500,000'},
                {k:'insuranceAllocationRatio',  l:'保險分攤比例（%）',   ph:'例：60'},
                {k:'postInsuranceNetRiskCost',  l:'保險後淨風險成本',    ph:'例：NT$223,000'},
                {k:'expectedExposureReduction', l:'預期節省暴露',        ph:'例：NT$337,000'},
              ].map(({k,l,ph})=>(
                <div key={k}>
                  <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:3,fontFamily:'Inter,sans-serif'}}>{l}</div>
                  <TInput value={ip[k]} onChange={e=>upd(k,e.target.value)} placeholder={ph} sm/>
                  {ip[k]&&k!=='insuranceAllocationRatio'&&(
                    <div style={{fontSize:9.5,color:C.grn,marginTop:2,fontFamily:'Inter,sans-serif'}}>
                      {fmtTWD(ip[k])}
                    </div>
                  )}
                </div>
              ))}
              <div>
                <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:3,fontFamily:'Inter,sans-serif'}}>分攤週期</div>
                <TSelect value={ip.allocationCycle} onChange={e=>upd('allocationCycle',e.target.value)}
                  options={cycles} placeholder="— 選擇 —" sm/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:3,fontFamily:'Inter,sans-serif'}}>是否納入部門預算</div>
                <TSelect value={ip.includedInBudget} onChange={e=>upd('includedInBudget',e.target.value)}
                  options={[{v:'yes',l:'是，已納入'},{v:'no',l:'否'},{v:'pending',l:'待確認'}]}
                  placeholder="— 選擇 —" sm/>
              </div>
            </div>
            {/* ROI + interpretation */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:3,fontFamily:'Inter,sans-serif'}}>ROI / 成本效益說明</div>
                <TInput value={ip.roiNote} onChange={e=>upd('roiNote',e.target.value)} rows={2} sm
                  placeholder={roi?`投入 ${usd(treatBudget)}，節省 ${usd(reduction)}，ROI≈${roi}%`:'例：投資 NT$360 萬，預期節省 NT$1,011 萬，ROI 約 2.8 倍'}/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:3,fontFamily:'Inter,sans-serif'}}>管理意涵</div>
                <TInput value={ip.managementInterpretation} onChange={e=>upd('managementInterpretation',e.target.value)} rows={2} sm
                  placeholder="例：目前年度風險成本超出可接受水準，完成控制措施後預期降至合理範圍"/>
              </div>
              <div style={{gridColumn:'span 2'}}>
                <div style={{fontSize:11,color:C.txt,fontWeight:700,marginBottom:3,fontFamily:'Inter,sans-serif'}}>財務入帳與分攤邏輯</div>
                <TInput value={ip.accountingNote} onChange={e=>upd('accountingNote',e.target.value)} rows={2} sm
                  placeholder="例：以 OPEX 項目入帳，按季結算至各業務單位成本中心"/>
              </div>
            </div>
          </div>

          {/* PART 2: 分攤明細 */}
          <div style={{background:C.surf,border:`1px solid ${C.bdr}`,
            borderRadius:6,padding:'16px 18px',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontSize:10.5,fontWeight:700,color:C.txt,letterSpacing:'0.1em',
                textTransform:'uppercase',fontFamily:'Inter,sans-serif',
                display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:3,height:14,background:C.grn,borderRadius:2,display:'inline-block'}}/>
                分攤明細 · Allocation Detail
              </div>
              <div style={{display:'flex',gap:8}}>
                {details.length>0&&(
                  <button onClick={autoEqual} style={{padding:'5px 12px',background:'transparent',
                    color:C.sub,border:`1px solid ${C.bdr}`,borderRadius:3,cursor:'pointer',
                    fontSize:11.5,fontFamily:'Inter,sans-serif'}}>⚖ 平均分配</button>
                )}
                <button onClick={addUnit} style={{padding:'6px 16px',background:C.txt,
                  color:'white',border:'none',borderRadius:3,cursor:'pointer',
                  fontSize:12.5,fontFamily:'Inter,sans-serif',fontWeight:700}}>+ 新增單位</button>
              </div>
            </div>
            {details.length===0?(
              <div style={{textAlign:'center',padding:'32px 20px',
                border:`2px dashed ${C.bdr}`,borderRadius:6,
                color:C.fnt,fontFamily:'Inter,sans-serif',fontSize:13}}>
                尚未新增分攤單位。點擊「+ 新增單位」開始設定。
              </div>
            ):(
              <>
                {/* Header */}
                <div style={{display:'grid',
                  gridTemplateColumns:'1.8fr 1.2fr 0.7fr 1.1fr 1.1fr 1.1fr 0.5fr',
                  gap:6,padding:'6px 8px',background:'#F0EDE8',borderRadius:4,marginBottom:6,
                  fontSize:9.5,fontWeight:700,color:C.fnt,letterSpacing:'0.06em',
                  textTransform:'uppercase',fontFamily:'Inter,sans-serif'}}>
                  {['單位名稱','分攤依據','%','目前成本','殘餘成本','淨分攤成本',''].map(h=>(
                    <div key={h}>{h}</div>
                  ))}
                </div>
                {/* Rows */}
                {details.map((d,i)=>{
                  const{curAlloc,resAlloc,ctrlAlloc,insAlloc,net}=calcRow(d);
                  return(
                    <div key={d.id} style={{display:'grid',
                      gridTemplateColumns:'1.8fr 1.2fr 0.7fr 1.1fr 1.1fr 1.1fr 0.5fr',
                      gap:6,padding:'7px 8px',marginBottom:5,
                      background:i%2===0?'#FAFAF8':'white',
                      border:`1px solid ${C.bdr}`,borderRadius:4,alignItems:'center'}}>
                      <input value={d.unitName}
                        onChange={e=>updUnit(d.id,'unitName',e.target.value)}
                        placeholder="例：A 工廠"
                        style={{padding:'5px 8px',border:`1px solid ${C.bdr}`,
                          borderRadius:3,fontSize:12.5,fontFamily:'Inter,sans-serif',
                          color:C.txt,background:'white',width:'100%'}}/>
                      <select value={d.allocationBasis}
                        onChange={e=>updUnit(d.id,'allocationBasis',e.target.value)}
                        style={{padding:'5px 4px',border:`1px solid ${C.bdr}`,
                          borderRadius:3,fontSize:11,fontFamily:'Inter,sans-serif',
                          color:C.txt,background:'white',width:'100%',cursor:'pointer',appearance:'auto'}}>
                        {allocBases.map(b=>(<option key={b.v} value={b.v}>{b.l}</option>))}
                      </select>
                      <div style={{position:'relative'}}>
                        <input type="number" value={d.weightPercent}
                          onChange={e=>updUnit(d.id,'weightPercent',e.target.value)}
                          placeholder="0"
                          style={{padding:'5px 18px 5px 6px',border:`1px solid ${C.bdr}`,
                            borderRadius:3,fontSize:12,fontFamily:'Inter,sans-serif',
                            color:C.txt,background:'white',width:'100%'}}/>
                        <span style={{position:'absolute',right:5,top:'50%',
                          transform:'translateY(-50%)',fontSize:9.5,color:C.fnt,
                          pointerEvents:'none'}}>%</span>
                      </div>
                      <div style={{fontSize:12,fontWeight:600,color:C.txt,
                        fontFamily:'Inter,sans-serif',textAlign:'right'}}>
                        {curAlloc>0?usd(curAlloc):'—'}
                      </div>
                      <div style={{fontSize:12,fontWeight:600,color:C.sub,
                        fontFamily:'Inter,sans-serif',textAlign:'right'}}>
                        {resAlloc>0?usd(resAlloc):'—'}
                      </div>
                      <div style={{fontSize:12,fontWeight:700,color:C.grn,
                        fontFamily:'Inter,sans-serif',textAlign:'right'}}>
                        {net>0?usd(net):'—'}
                      </div>
                      <button onClick={()=>removeUnit(d.id)}
                        style={{padding:'4px 8px',background:C.redL,color:C.red,
                          border:`1px solid ${C.red}30`,borderRadius:3,cursor:'pointer',
                          fontSize:11,fontFamily:'Inter,sans-serif',textAlign:'center'}}>✕</button>
                    </div>
                  );
                })}
                {/* Totals */}
                <div style={{display:'grid',
                  gridTemplateColumns:'1.8fr 1.2fr 0.7fr 1.1fr 1.1fr 1.1fr 0.5fr',
                  gap:6,padding:'7px 8px',
                  background:pctOk?C.grnL:C.redL,
                  border:`1px solid ${pctOk?C.grn+'40':C.red+'40'}`,
                  borderRadius:4,marginTop:4,alignItems:'center'}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.txt,fontFamily:'Inter,sans-serif'}}>合計</div>
                  <div/>
                  <div style={{fontSize:13,fontWeight:700,color:pctOk?C.grn:C.red,
                    fontFamily:'Inter,sans-serif',textAlign:'center'}}>
                    {totalPct.toFixed(1)}%
                  </div>
                  {[
                    details.reduce((s,d)=>s+calcRow(d).curAlloc,0),
                    details.reduce((s,d)=>s+calcRow(d).resAlloc,0),
                    details.reduce((s,d)=>s+calcRow(d).net,0),
                  ].map((v,ci)=>(
                    <div key={ci} style={{fontSize:12,fontWeight:700,
                      color:ci===2?C.grn:C.txt,fontFamily:'Inter,sans-serif',textAlign:'right'}}>
                      {v>0?usd(v):'—'}
                    </div>
                  ))}
                  <div/>
                </div>
                {/* Status */}
                <div style={{marginTop:8,padding:'8px 12px',borderRadius:4,
                  background:pctOk?C.grnL:'#FFF8F0',
                  border:`1px solid ${pctOk?C.grn+'30':'#D4A03040'}`,
                  display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:13}}>{pctOk?'✓':'⚠'}</span>
                  <span style={{fontSize:12,fontFamily:'Inter,sans-serif',
                    color:pctOk?C.grn:C.amb}}>
                    {pctOk
                      ?`已分攤 ${details.length} 個單位，合計 100%，分攤設定完整`
                      :totalPct<100
                        ?`尚未分攤 ${(100-totalPct).toFixed(1)}%，請調整各單位比例至合計 100%`
                        :`已超額分攤 ${(totalPct-100).toFixed(1)}%，請調整比例`}
                  </span>
                  {!pctOk&&totalPool>0&&(
                    <span style={{marginLeft:'auto',fontSize:11,color:C.fnt,fontFamily:'Inter,sans-serif'}}>
                      總分攤池 {usd(totalPool)}
                    </span>
                  )}
                </div>
              </>
            )}
          </div>

          {/* Auto Summary */}
          {(curCost>0||details.length>0)&&(
            <div style={{background:C.grnL,border:`1px solid ${C.grn}35`,
              borderRadius:6,padding:'14px 18px',marginBottom:16}}>
              <div style={{fontSize:10,fontWeight:700,color:C.grn,letterSpacing:'0.1em',
                textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>
                自動計算摘要 · Auto Summary
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:details.length>0?10:0}}>
                {[
                  ['目前風險成本',  usd(curCost)||'—',            '計價基礎'],
                  ['殘餘風險成本',  resCost>0?usd(resCost):'—',   '應對後預期'],
                  ['預期節省暴露',  reduction>0?usd(reduction):'—','風險成本降幅'],
                  ['粗略 ROI',      roi?roi+'%':'—',               `投入 ${usd(treatBudget)}`],
                ].map(([k,v,note])=>(
                  <div key={k} style={{textAlign:'center',padding:'9px 8px',
                    background:'white',borderRadius:3,border:`1px solid ${C.grn}25`}}>
                    <div style={{fontSize:9.5,color:C.grn,marginBottom:2,fontWeight:700,
                      fontFamily:'Inter,sans-serif'}}>{k}</div>
                    <div style={{fontSize:16,fontWeight:700,color:C.grn,
                      fontFamily:'Inter,sans-serif'}}>{v}</div>
                    <div style={{fontSize:9,color:C.grnM,fontFamily:'Inter,sans-serif',marginTop:1}}>{note}</div>
                  </div>
                ))}
              </div>
              {details.length>0&&(
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                  {[
                    ['參與分攤單位', details.length+'個'],
                    ['已分攤比例',   totalPct.toFixed(1)+'%'],
                    ['最大分攤單位', (()=>{
                      if(!details.length)return'—';
                      const m=details.reduce((a,b)=>(parseFloat(b.weightPercent)||0)>(parseFloat(a.weightPercent)||0)?b:a,details[0]);
                      return(m.unitName||'未命名')+' '+((parseFloat(m.weightPercent)||0).toFixed(1))+'%';
                    })()],
                  ].map(([k,v])=>(
                    <div key={k} style={{padding:'8px 12px',background:'white',
                      borderRadius:3,border:`1px solid ${C.grn}25`}}>
                      <div style={{fontSize:9.5,color:C.grn,marginBottom:2,fontWeight:700,
                        fontFamily:'Inter,sans-serif'}}>{k}</div>
                      <div style={{fontSize:14,fontWeight:700,color:C.grn,
                        fontFamily:'Inter,sans-serif'}}>{v}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Save */}
          <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:12}}>
            {saved&&(
              <span style={{fontSize:12,color:C.grn,fontFamily:'Inter,sans-serif',
                display:'flex',alignItems:'center',gap:5}}>
                <span style={{fontSize:15}}>✓</span> 計價設定已儲存
              </span>
            )}
            <Btn ch="儲存計價設定" onClick={save} v="primary"/>
          </div>
        </div>
      )}
    </div>
  );
}

function TabDecision({risk}){
  const r=risk.fairResult;
  const ev=risk.evaluation;
  const tr=risk.treatment;
  const mo=risk.monitoring;
  const sc=risk.scenario;
  const ip=risk.internalPricing||{};
  const decLabel={accept:'接受 (Accept)',treat:'處理 (Treat)',
    transfer:'轉移 (Transfer)',avoid:'迴避 (Avoid)'};
  const statusSummary=()=>{
    if(risk.status==='closed')return{text:'此風險已結案。',color:C.fnt};
    if(risk.status==='monitoring'){
      if(mo.residualWithinThreshold==='yes')
        return{text:'應對措施已執行，殘餘風險已回到容忍範圍，目前持續監控中。',color:C.grn};
      return{text:'應對措施執行中，殘餘風險尚未回到容忍範圍，持續監控。',color:C.amb};
    }
    if(risk.status==='in_treatment')
      return{text:'此風險目前超出風險胃納／容忍度，應對措施正在執行中。',color:C.red};
    if(risk.status==='evaluated')
      return{text:'評估決策已完成，待建立應對計畫。',color:C.amb};
    if(risk.status==='analyzed')
      return{text:'FAIR 分析已完成，尚待評估決策。',color:C.fnt};
    return{text:'此風險已登記，尚待完成 FAIR 分析與評估。',color:C.fnt};
  };
  const {text:statusText,color:statusColor}=statusSummary();

  if(!r){
    return(
      <div style={{textAlign:'center',padding:'48px 20px',color:C.fnt,fontFamily:'Inter,sans-serif'}}>
        請先完成 FAIR 分析以產生決策摘要。
      </div>
    );
  }

  return(
    <div>
      {/* 頂部管理意見 */}
      <div style={{background:C.txt,borderRadius:4,padding:'18px 22px',marginBottom:16,color:'white'}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:'0.14em',
          textTransform:'uppercase',opacity:0.55,marginBottom:6,fontFamily:'Inter,sans-serif'}}>
          管理層摘要 · Executive Summary
        </div>
        <p style={{fontSize:14,lineHeight:1.85,fontFamily:'Inter,sans-serif',opacity:0.92}}>
          {statusText}
          {ev.decision&&(
            <span> 評估決策為「<strong>{decLabel[ev.decision]||ev.decision}</strong>」
            {ev.evaluator&&`，由 ${ev.evaluator}`}
            {ev.evaluationDate&&` 於 ${fmtDate(ev.evaluationDate)} 完成評估`}。</span>
          )}
          {tr.residualNarrative&&(
            <span> {tr.residualNarrative}</span>
          )}
        </p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        {/* A. 情境摘要 */}
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,padding:'14px 16px'}}>
          <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
            textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>
            風險情境
          </div>
          {[
            ['受影響資產',sc.asset||'—'],
            ['威脅來源',  sc.actor||'—'],
            ['威脅行為',  sc.event||'—'],
            ['損失事件',  sc.loss||'—'],
          ].map(([k,v])=>(
            <div key={k} style={{padding:'6px 0',borderBottom:`1px solid ${C.bdr}`}}>
              <div style={{fontSize:10,color:C.fnt,marginBottom:1,fontFamily:'Inter,sans-serif'}}>{k}</div>
              <div style={{fontSize:12.5,color:C.txt,fontFamily:'Inter,sans-serif'}}>{v}</div>
            </div>
          ))}
        </div>

        {/* B. FAIR 結果 */}
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,padding:'14px 16px'}}>
          <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
            textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>
            FAIR 量化結果
          </div>
          {[
            ['預期年度損失（EAL）',usd(r.mean),'長期平均年度暴露水準'],
            ['P50 中位損失',       usd(r.p50), '50% 情境低於此值'],
            ['P90 高風險門檻',     usd(r.p90), '90% 情境低於此值'],
            ['P95 尾端風險',       usd(r.p95), '5% 情境超過此值'],
            ['非零損失占比',       r.pLoss+'%','產生損失的情境比例'],
          ].map(([k,v,note])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',
              alignItems:'baseline',padding:'5px 0',borderBottom:`1px solid ${C.bdr}`}}>
              <div>
                <div style={{fontSize:12,color:C.txt,fontFamily:'Inter,sans-serif'}}>{k}</div>
                <div style={{fontSize:9.5,color:C.fnt,fontFamily:'Inter,sans-serif'}}>{note}</div>
              </div>
              <strong style={{fontSize:13,color:C.txt,fontFamily:'Inter,sans-serif'}}>{v}</strong>
            </div>
          ))}
        </div>

        {/* C. 評估摘要 */}
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,padding:'14px 16px'}}>
          <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
            textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>
            評估決策
          </div>
          {[
            ['最終決策',    ev.decision?decLabel[ev.decision]:'尚未完成'],
            ['風險胃納門檻（EAL）', ev.appetiteThreshold?usd(parseFloat(ev.appetiteThreshold)):'—'],
            ['容忍度門檻（P90）',   ev.toleranceThreshold?usd(parseFloat(ev.toleranceThreshold)):'—'],
            ['評估者',      ev.evaluator||'—'],
            ['評估日期',    ev.evaluationDate?fmtDate(ev.evaluationDate):'—'],
            ['是否需升級',  {no:'不需要',dept:'部門主管',exec:'高階主管',board:'董事會'}[ev.escalation]||'—'],
          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',
              padding:'5px 0',borderBottom:`1px solid ${C.bdr}`,fontSize:12,fontFamily:'Inter,sans-serif'}}>
              <span style={{color:C.sub}}>{k}</span>
              <strong style={{color:C.txt}}>{v}</strong>
            </div>
          ))}
          {ev.rationale&&(
            <div style={{marginTop:8,padding:'8px 10px',background:'#F6F4EF',borderRadius:3}}>
              <div style={{fontSize:10,color:C.fnt,marginBottom:3,fontFamily:'Inter,sans-serif'}}>決策理由</div>
              <p style={{fontSize:11.5,color:C.sub,lineHeight:1.65,fontFamily:'Inter,sans-serif'}}>
                {ev.rationale}
              </p>
            </div>
          )}
        </div>

        {/* D. 應對摘要 */}
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,padding:'14px 16px'}}>
          <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
            textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>
            應對計畫
          </div>
          {tr.strategy?(
            <>
              {[
                ['應對策略',   {reduce:'降低',transfer:'轉移',accept:'接受',avoid:'迴避'}[tr.strategy]||tr.strategy],
                ['執行狀態',   TREAT_STATUS[tr.treatStatus]?.label||'—'],
                ['應對負責人', tr.owner||'—'],
                ['目標完成日', fmtDate(tr.dueDate)||'—'],
                ['預估預算',   tr.budget||'—'],
                ['財務審查',   {pending:'待審查',approved:'已核准',rejected:'未核准',revision:'需修改'}[tr.financeStatus]||'—'],
                ['核准金額',   tr.approvedAmount||'—'],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',
                  padding:'5px 0',borderBottom:`1px solid ${C.bdr}`,fontSize:12,fontFamily:'Inter,sans-serif'}}>
                  <span style={{color:C.sub}}>{k}</span>
                  <strong style={{color:C.txt}}>{v}</strong>
                </div>
              ))}
              {tr.residualNarrative&&(
                <div style={{marginTop:8,padding:'8px 10px',background:C.grnL,borderRadius:3}}>
                  <div style={{fontSize:10,color:C.grn,marginBottom:3,fontFamily:'Inter,sans-serif'}}>
                    預期殘餘風險說明
                  </div>
                  <p style={{fontSize:11.5,color:C.grn+'CC',lineHeight:1.65,fontFamily:'Inter,sans-serif'}}>
                    {tr.residualNarrative}
                  </p>
                </div>
              )}
            </>
          ):(
            <div style={{fontSize:12,color:C.fnt,fontFamily:'Inter,sans-serif'}}>尚未建立應對計畫</div>
          )}
        </div>

        {/* E. 監控摘要 */}
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,
          padding:'14px 16px',gridColumn:'span 2'}}>
          <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
            textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>
            監控狀態
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            {[
              ['複查週期', {monthly:'每月',quarterly:'每季',biannual:'每半年',annual:'每年'}[mo.reviewCycle]||'—'],
              ['下次複查日', mo.nextReview?fmtDate(mo.nextReview):'—'],
              ['監控負責人', mo.monitoringOwner||'—'],
              ['殘餘風險狀態', {yes:'已在容忍範圍',no:'仍超出門檻',pending:'尚未評估'}[mo.residualWithinThreshold]||'—'],
            ].map(([k,v])=>(
              <div key={k} style={{padding:'8px 10px',background:'#F6F4EF',borderRadius:3}}>
                <div style={{fontSize:9.5,color:C.fnt,marginBottom:3,fontFamily:'Inter,sans-serif'}}>{k}</div>
                <div style={{fontSize:12.5,fontWeight:500,color:C.txt,fontFamily:'Inter,sans-serif'}}>{v}</div>
              </div>
            ))}
          </div>
          {mo.changeLog&&(
            <div style={{marginTop:10,padding:'8px 10px',background:'#F6F4EF',borderRadius:3}}>
              <div style={{fontSize:10,color:C.fnt,marginBottom:4,fontFamily:'Inter,sans-serif',
                fontWeight:600}}>變更記錄</div>
              <pre style={{fontSize:11.5,color:C.sub,lineHeight:1.7,fontFamily:'Inter,sans-serif',
                whiteSpace:'pre-wrap'}}>{mo.changeLog}</pre>
            </div>
          )}
        </div>
      </div>

      {/* F. 財務與資源配置摘要 */}
      {(ip&&ip.enabled)&&(
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,
          borderRadius:4,padding:'14px 16px',gridColumn:'span 2',marginTop:14}}>
          <div style={{fontSize:10,fontWeight:700,color:C.txt,letterSpacing:'0.1em',
            textTransform:'uppercase',marginBottom:14,fontFamily:'Inter,sans-serif'}}>
            財務與資源配置摘要 · Financial & Funding View
          </div>

          {/* 成本比較：目前 vs 殘餘 */}
          {(()=>{
            const parseTWD=s=>Math.round(parseFloat((s||'').replace(/[^0-9.\-]/g,''))||0);
            const curCost=parseTWD(ip.currentRiskCost)||Math.round(r?r.mean:0);
            const resCost=parseTWD(ip.residualRiskCost);
            const reduction=curCost-resCost;
            const basisLabel={eal:'EAL 計價基礎',p90:'P90 計價基礎',
              hybrid:'混合計價（EAL+P90）÷2',base_adj:'固定費率調整'}[ip.pricingBasis]||'FAIR 計價';
            const details=ip.allocationDetails||[];
            const totalPct=details.reduce((s,d)=>s+(parseFloat(d.weightPercent)||0),0);
            const calcRow=d=>{
              const pct=(parseFloat(d.weightPercent)||0)/100;
              return{
                curAlloc:Math.round(curCost*pct),
                resAlloc:Math.round(resCost*pct),
                net:Math.round(resCost*pct),
              };
            };
            return(
              <>
                {/* Cost cards */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}}>
                  {[
                    {label:'目前內部風險成本',val:curCost>0?usd(curCost):'—',
                      note:basisLabel,bg:'#F6F4EF',vc:C.red},
                    {label:'應對後預期風險成本',val:resCost>0?usd(resCost):'—',
                      note:'應對措施完成後',bg:C.grnL,vc:C.grn},
                    {label:'預期節省暴露',val:reduction>0?usd(reduction):'—',
                      note:'風險成本降幅',bg:C.grnL,vc:C.grn},
                    {label:'建議總分攤池',val:ip.allocatedAmount?usd(parseTWD(ip.allocatedAmount)):'—',
                      note:{monthly:'月度',quarterly:'季度',annual:'年度',one_time:'一次性'}[ip.allocationCycle]||'年度',
                      bg:'#F6F4EF',vc:C.txt},
                  ].map(({label,val,note,bg,vc})=>(
                    <div key={label} style={{background:bg,border:`1px solid ${C.bdr}`,
                      borderRadius:4,padding:'10px 12px'}}>
                      <div style={{fontSize:9.5,color:C.fnt,marginBottom:3,
                        textTransform:'uppercase',letterSpacing:'0.06em',
                        fontFamily:'Inter,sans-serif'}}>{label}</div>
                      <div style={{fontSize:19,fontWeight:700,color:vc,
                        fontFamily:'Inter,sans-serif',letterSpacing:'-0.01em'}}>{val}</div>
                      <div style={{fontSize:9.5,color:C.fnt,marginTop:2,
                        fontFamily:'Inter,sans-serif'}}>{note}</div>
                    </div>
                  ))}
                </div>

                {/* 保險 + 其他指標 */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
                  {[
                    ['保險後淨成本',  ip.postInsuranceNetRiskCost
                      ?usd(parseTWD(ip.postInsuranceNetRiskCost)):'—'],
                    ['是否納入預算',  {yes:'是',no:'否',pending:'待確認'}[ip.includedInBudget]||'—'],
                    ['計價方法',      basisLabel],
                  ].map(([k,v])=>(
                    <div key={k} style={{padding:'8px 10px',background:'#F6F4EF',borderRadius:3}}>
                      <div style={{fontSize:9.5,color:C.fnt,marginBottom:2,
                        fontFamily:'Inter,sans-serif'}}>{k}</div>
                      <div style={{fontSize:12.5,fontWeight:600,color:C.txt,
                        fontFamily:'Inter,sans-serif'}}>{v}</div>
                    </div>
                  ))}
                </div>

                {/* 分攤明細 */}
                {details.length>0&&(
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:10,fontWeight:700,color:C.txt,
                      letterSpacing:'0.08em',textTransform:'uppercase',
                      marginBottom:8,fontFamily:'Inter,sans-serif'}}>
                      分攤明細（{details.length} 個單位，已分攤 {totalPct.toFixed(1)}%）
                    </div>
                    {/* Header */}
                    <div style={{display:'grid',
                      gridTemplateColumns:'2fr 1.2fr 0.7fr 1.1fr 1.1fr 1.1fr',
                      gap:6,padding:'5px 8px',background:'#F0EDE8',borderRadius:4,
                      marginBottom:5,fontSize:9.5,fontWeight:700,color:C.fnt,
                      letterSpacing:'0.06em',textTransform:'uppercase',fontFamily:'Inter,sans-serif'}}>
                      {['單位名稱','分攤依據','%','目前分攤成本','殘餘分攤成本','淨分攤成本'].map(h=>(
                        <div key={h}>{h}</div>
                      ))}
                    </div>
                    {/* Rows */}
                    {details.map((d,i)=>{
                      const{curAlloc,resAlloc,net}=calcRow(d);
                      const basisMap={equal:'平均分攤',revenue:'依營收',asset:'依資產',
                        usage:'依使用量',eal:'依EAL',custom:'自訂'};
                      return(
                        <div key={d.id} style={{display:'grid',
                          gridTemplateColumns:'2fr 1.2fr 0.7fr 1.1fr 1.1fr 1.1fr',
                          gap:6,padding:'6px 8px',marginBottom:4,
                          background:i%2===0?'#FAFAF8':'white',
                          border:`1px solid ${C.bdr}`,borderRadius:3,alignItems:'center'}}>
                          <div style={{fontSize:12.5,fontWeight:600,color:C.txt,
                            fontFamily:'Inter,sans-serif'}}>{d.unitName||'（未命名）'}</div>
                          <div style={{fontSize:11,color:C.sub,fontFamily:'Inter,sans-serif'}}>
                            {basisMap[d.allocationBasis]||d.allocationBasis||'—'}
                          </div>
                          <div style={{fontSize:12,fontWeight:600,color:C.txt,
                            fontFamily:'Inter,sans-serif',textAlign:'center'}}>
                            {d.weightPercent?d.weightPercent+'%':'—'}
                          </div>
                          <div style={{fontSize:12,color:C.txt,fontFamily:'Inter,sans-serif',
                            textAlign:'right'}}>{curAlloc>0?usd(curAlloc):'—'}</div>
                          <div style={{fontSize:12,color:C.sub,fontFamily:'Inter,sans-serif',
                            textAlign:'right'}}>{resAlloc>0?usd(resAlloc):'—'}</div>
                          <div style={{fontSize:12,fontWeight:700,color:C.grn,
                            fontFamily:'Inter,sans-serif',textAlign:'right'}}>{net>0?usd(net):'—'}</div>
                        </div>
                      );
                    })}
                    {/* Totals */}
                    <div style={{display:'grid',
                      gridTemplateColumns:'2fr 1.2fr 0.7fr 1.1fr 1.1fr 1.1fr',
                      gap:6,padding:'6px 8px',
                      background:Math.abs(totalPct-100)<0.01?C.grnL:C.redL,
                      border:`1px solid ${Math.abs(totalPct-100)<0.01?C.grn+'40':C.red+'40'}`,
                      borderRadius:3,marginTop:2,alignItems:'center'}}>
                      <div style={{fontSize:11.5,fontWeight:700,color:C.txt,
                        fontFamily:'Inter,sans-serif'}}>合計</div>
                      <div/>
                      <div style={{fontSize:12,fontWeight:700,
                        color:Math.abs(totalPct-100)<0.01?C.grn:C.red,
                        fontFamily:'Inter,sans-serif',textAlign:'center'}}>
                        {totalPct.toFixed(1)}%
                      </div>
                      {[
                        details.reduce((s,d)=>s+calcRow(d).curAlloc,0),
                        details.reduce((s,d)=>s+calcRow(d).resAlloc,0),
                        details.reduce((s,d)=>s+calcRow(d).net,0),
                      ].map((v,ci)=>(
                        <div key={ci} style={{fontSize:12,fontWeight:700,
                          color:ci===2?C.grn:C.txt,fontFamily:'Inter,sans-serif',textAlign:'right'}}>
                          {v>0?usd(v):'—'}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 管理結論 */}
                {(ip.managementInterpretation||ip.roiNote)&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    {ip.roiNote&&(
                      <div style={{padding:'10px 12px',background:'#EBF0FF',
                        borderRadius:3,border:`1px solid ${C.blu}30`}}>
                        <div style={{fontSize:10,fontWeight:600,color:C.blu,marginBottom:4,
                          fontFamily:'Inter,sans-serif'}}>ROI / 成本效益說明</div>
                        <p style={{fontSize:12,color:C.txt,lineHeight:1.7,
                          fontFamily:'Inter,sans-serif'}}>{ip.roiNote}</p>
                      </div>
                    )}
                    {ip.managementInterpretation&&(
                      <div style={{padding:'10px 12px',background:C.grnL,
                        borderRadius:3,border:`1px solid ${C.grn}30`}}>
                        <div style={{fontSize:10,fontWeight:600,color:C.grn,marginBottom:4,
                          fontFamily:'Inter,sans-serif'}}>管理意涵 · Management Interpretation</div>
                        <p style={{fontSize:12,color:C.txt,lineHeight:1.7,
                          fontFamily:'Inter,sans-serif'}}>{ip.managementInterpretation}</p>
                      </div>
                    )}
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}

      <div style={{marginTop:16,display:'flex',justifyContent:'flex-end',gap:10,alignItems:'center'}}>
        <span style={{fontSize:11,color:C.fnt,fontFamily:'Inter,sans-serif'}}>
          匯出此風險的完整資料（JSON）
        </span>
        <Btn ch="↑ 匯出此風險" onClick={()=>{
          const payload={
            exportedAt:new Date().toISOString(),
            version:'fair_register_v4',
            count:1,
            risks:[risk],
          };
          const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url;
          a.download=`${risk.name||'風險'}_${new Date().toISOString().slice(0,10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
        }} v="primary"/>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════
   RISK DETAIL VIEW
═══════════════════════════════════════════════════ */
function RiskDetail({risk,onUpdate,onBack,opts:optsIn}){
  const opts=optsIn||OPTS;
  const[tab,setTab]=useState('overview');
  const TABS=[
    {id:'overview',   label:'總覽'},
    {id:'fair',       label:'FAIR 分析',  badge:risk.fairResult?'完成':null},
    {id:'evaluation', label:'評估',       badge:risk.evaluation.decision?risk.evaluation.decision:null},
    {id:'treatment',  label:'應對',       badge:risk.treatment.treatStatus?TREAT_STATUS[risk.treatment.treatStatus]?.label:null},
    {id:'monitoring', label:'監控'},
    {id:'pricing',    label:'風險計價',   badge:risk.internalPricing?.enabled?'啟用':null},
    {id:'decision',   label:'決策摘要',   badge:risk.evaluation.decision?'完成':null},
  ];
  const decMap={accept:'接受',treat:'處理',transfer:'轉移',avoid:'迴避'};
  return(
    <div>
      {/* Breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',
          fontSize:12.5,color:C.sub,fontFamily:'Inter,sans-serif',padding:0,fontWeight:500}}>
          ← 風險登記冊
        </button>
        <span style={{color:C.bdr}}>/</span>
        <span style={{fontSize:12.5,color:C.txt,fontFamily:'Inter,sans-serif',fontWeight:500}}>
          {risk.name||'(未命名)'}
        </span>
      </div>

      {/* Risk header */}
      <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,
        padding:'16px 20px',marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:200}}>
          <div className="serif" style={{fontSize:20,fontWeight:400,color:C.txt,lineHeight:1.2}}>
            {risk.name||`${risk.scenario.actor||'—'} → ${risk.scenario.asset||'—'}`}
          </div>
          <div style={{fontSize:11.5,color:C.sub,marginTop:4,fontFamily:'Inter,sans-serif'}}>
            {[risk.scenario.asset,risk.scenario.event].filter(Boolean).join(' · ')}
            {risk.owner&&` · 負責人：${risk.owner}`}
            {` · 登記日：${fmtDate(risk.createdAt)}`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <PriBadge priority={risk.priority}/>
          <StatusBadge status={risk.status}/>
          {risk.fairResult&&(
            <div style={{padding:'4px 12px',background:'#F2EFE8',borderRadius:3,
              fontSize:12.5,fontFamily:'Inter,sans-serif',fontWeight:500,color:C.txt}}>
              EAL {usd(risk.fairResult.mean)}
            </div>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:0,marginBottom:0,
        background:C.txt,borderRadius:'4px 4px 0 0',
        border:`1px solid ${C.txt}`,overflow:'hidden'}}>
        {TABS.map(t=>{
          const act=tab===t.id;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              padding:'11px 20px',fontSize:12.5,fontWeight:act?700:400,
              fontFamily:'Inter,sans-serif',cursor:'pointer',
              border:'none',
              borderBottom:act?'3px solid white':'3px solid transparent',
              background:act?'rgba(255,255,255,0.14)':'transparent',
              color:act?'white':'rgba(255,255,255,0.58)',
              transition:'all .15s',
              display:'flex',alignItems:'center',gap:6}}>
              {t.label}
              {t.badge&&(
                <span style={{fontSize:10,
                  background:'rgba(255,255,255,0.18)',
                  color:'rgba(255,255,255,0.88)',
                  padding:'1px 6px',borderRadius:2,fontFamily:'Inter,sans-serif',
                  fontWeight:500}}>{decMap[t.badge]||t.badge}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* Tab content */}
      <div className="fade" key={tab}
        style={{background:C.surf,border:`1px solid ${C.bdr}`,
          borderRadius:4,padding:'20px 20px 24px'}}>
        {tab==='overview'  &&<TabOverview    risk={risk} onUpdate={onUpdate} opts={opts}/>}
        {tab==='fair'      &&<TabFair        risk={risk} onUpdate={onUpdate}/>}
        {tab==='evaluation'&&<TabEvaluation  risk={risk} onUpdate={onUpdate}/>}
        {tab==='treatment' &&<TabTreatment   risk={risk} onUpdate={onUpdate}/>}
        {tab==='monitoring'&&<TabMonitoring  risk={risk} onUpdate={onUpdate}/>}
        {tab==='pricing'   &&<TabPricing     risk={risk} onUpdate={onUpdate}/>}
        {tab==='decision'  &&<TabDecision    risk={risk}/>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   IMPORT TOAST
═══════════════════════════════════════════════════ */
function ImportToast({msg,onClose}){
  useEffect(()=>{
    const t=setTimeout(onClose,4000);
    return()=>clearTimeout(t);
  },[onClose]);
  const ok=msg.type==='ok';
  return(
    <div className="fade" style={{
      position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',
      zIndex:400,padding:'12px 20px',borderRadius:6,
      background:ok?C.grn:C.red,color:'white',
      boxShadow:'0 6px 24px rgba(0,0,0,0.2)',
      display:'flex',alignItems:'center',gap:12,
      fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:500,
      minWidth:260,maxWidth:480}}>
      <span style={{fontSize:16}}>{ok?'✓':'✕'}</span>
      <span style={{flex:1}}>{msg.text}</span>
      <button onClick={onClose} style={{
        background:'none',border:'none',cursor:'pointer',
        color:'rgba(255,255,255,0.75)',fontSize:16,lineHeight:1,padding:0}}>×</button>
    </div>
  );
}

function App(){
  const[risks,setRisks]=useState(()=>loadRisks());
  const[customOpts,setCustomOpts]=useState(()=>{
    const saved=loadOpts();
    return saved||{};
  });
  const[view,setView]=useState('register');
  const[selectedId,setSelectedId]=useState(null);
  const[showNew,setShowNew]=useState(false);
  const[showOpts,setShowOpts]=useState(false);
  const[importMsg,setImportMsg]=useState(null);

  /* ── Export all risks as JSON ── */
  const exportRisks=()=>{
    const payload={
      exportedAt:new Date().toISOString(),
      version:'fair_register_v4',
      count:risks.length,
      risks,
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`企業風險量化平台_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  /* ── Import risks from JSON ── */
  const importRisks=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        /* Accept either a direct array or our wrapped payload format */
        const incoming=Array.isArray(data)?data:(data.risks||[]);
        if(!incoming.length)throw new Error('未找到任何風險資料');
        /* Merge: keep existing risks, append new ones that don't share the same id */
        const existingIds=new Set(risks.map(r=>r.id));
        const newItems=incoming.filter(r=>r.id&&!existingIds.has(r.id));
        const dupes=incoming.length-newItems.length;
        setRisks(rs=>[...rs,...newItems]);
        setImportMsg({
          type:'ok',
          text:`成功匯入 ${newItems.length} 筆風險${dupes>0?`（已略過 ${dupes} 筆重複項目）`:''}`,
        });
      }catch(err){
        setImportMsg({type:'err',text:`匯入失敗：${err.message}`});
      }
      /* reset file input so same file can be re-selected */
      e.target.value='';
    };
    reader.readAsText(file);
  };

  useEffect(()=>{saveRisks(risks);},[risks]);
  useEffect(()=>{saveOpts(customOpts);},[customOpts]);

  /* Merge defaults with custom overrides */
  const activeOpts=useMemo(()=>({
    assets:customOpts.assets||OPTS.assets,
    actors:customOpts.actors||OPTS.actors,
    events:customOpts.events||OPTS.events,
    losses:customOpts.losses||OPTS.losses,
  }),[customOpts]);

  const selectedRisk=risks.find(r=>r.id===selectedId);

  const addRisk=r=>{
    setRisks(rs=>[r,...rs]);
    setShowNew(false);
    setSelectedId(r.id);
    setView('detail');
  };
  const updateRisk=updated=>{
    setRisks(rs=>rs.map(r=>r.id===updated.id?updated:r));
  };
  const openRisk=id=>{
    setSelectedId(id);
    setView('detail');
  };

  const totalRisks=risks.length;
  const critCount=risks.filter(r=>r.priority==='critical').length;

  return(
    <div style={{fontFamily:"'Inter','Noto Serif TC',sans-serif",
      background:C.bg,minHeight:'100vh',color:C.txt,
      display:'flex',flexDirection:'column'}}>

      {/* Header */}
      <header className="no-print" style={{
        background:C.surf,borderBottom:`1px solid ${C.bdr}`,
        padding:'0 28px',display:'flex',alignItems:'center',
        height:48,position:'sticky',top:0,zIndex:100,gap:16}}>
        {/* Logo area */}
        <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <svg width="22" height="22" viewBox="0 0 22 22">
            <circle cx="11" cy="11" r="10" fill="none" stroke={C.txt} strokeWidth="1.2"/>
            <circle cx="11" cy="11" r="6"  fill="none" stroke={C.txt} strokeWidth="0.7" strokeDasharray="2 3"/>
            <circle cx="11" cy="11" r="2.5" fill={C.red}/>
          </svg>
          <span style={{fontSize:14.5,fontWeight:600,color:C.txt,fontFamily:'Inter,sans-serif',
            letterSpacing:'-0.01em'}}>企業風險量化平台</span>
        </div>

        <div style={{width:1,height:18,background:C.bdr}}/>

        {/* Breadcrumb nav */}
        {view==='detail'&&selectedRisk&&(
          <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12.5,fontFamily:'Inter,sans-serif'}}>
            <button onClick={()=>setView('register')} style={{
              background:'none',border:'none',cursor:'pointer',
              color:C.sub,fontFamily:'Inter,sans-serif',fontSize:12.5,padding:0}}>
              登記冊
            </button>
            <span style={{color:C.bdr}}>/</span>
            <span style={{color:C.txt,fontWeight:500,maxWidth:240,overflow:'hidden',
              textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {selectedRisk.name||'(未命名)'}
            </span>
          </div>
        )}

        <div style={{flex:1}}/>

        {/* Stats */}
        <div style={{display:'flex',gap:14,alignItems:'center',fontSize:11.5,
          fontFamily:'Inter,sans-serif',color:C.sub}}>
          <span>{totalRisks} 個風險</span>
          {critCount>0&&(
            <span style={{color:C.red,fontWeight:600}}>{critCount} 個緊急</span>
          )}
        </div>

        {/* Export button */}
        <button onClick={exportRisks} disabled={risks.length===0}
          style={{
            padding:'6px 14px',background:'transparent',
            border:`1px solid ${C.bdr}`,borderRadius:3,cursor:risks.length===0?'not-allowed':'pointer',
            fontSize:12,color:risks.length===0?C.fnt:C.sub,fontFamily:'Inter,sans-serif',
            display:'flex',alignItems:'center',gap:5,transition:'all .12s',
            marginLeft:6,opacity:risks.length===0?0.45:1}}
          title="匯出所有風險資料為 JSON 檔案">
          ↑ 匯出
        </button>

        {/* Import button (wraps hidden file input) */}
        <label style={{
          padding:'6px 14px',background:'transparent',
          border:`1px solid ${C.bdr}`,borderRadius:3,cursor:'pointer',
          fontSize:12,color:C.sub,fontFamily:'Inter,sans-serif',
          display:'flex',alignItems:'center',gap:5,
          transition:'all .12s',marginLeft:0}}
          title="從 JSON 檔案匯入風險資料">
          ↓ 匯入
          <input type="file" accept=".json,application/json"
            onChange={importRisks}
            style={{display:'none'}}/>
        </label>

        <button onClick={()=>setShowOpts(true)} style={{
          padding:'6px 14px',background:'transparent',
          border:`1px solid ${C.bdr}`,borderRadius:3,cursor:'pointer',
          fontSize:12,color:C.sub,fontFamily:'Inter,sans-serif',
          display:'flex',alignItems:'center',gap:6,transition:'all .12s',
          marginLeft:0}}
          title="管理選項清單">
          ⚙ 選項管理
        </button>
      </header>

      {/* Page content */}
      <div style={{maxWidth:1120,margin:'0 auto',padding:'24px 24px'}}>
        {/* Page title */}
        {view==='register'&&(
          <div style={{marginBottom:20}}>
            <h1 className="serif" style={{fontSize:28,fontWeight:700,color:C.txt,
              letterSpacing:'-0.01em',lineHeight:1.15}}>風險登記冊</h1>
            <p style={{fontSize:13,color:C.sub,marginTop:4,fontFamily:'Inter,sans-serif'}}>
              管理組織所有 FAIR 量化風險 · 點擊風險列開啟詳細分析
            </p>
          </div>
        )}

        {view==='register'&&(
          <div className="fade">
            <RiskRegister risks={risks} onOpen={openRisk} onAdd={()=>setShowNew(true)}/>
          </div>
        )}

        {view==='detail'&&selectedRisk&&(
          <div className="fade">
            <RiskDetail risk={selectedRisk} onUpdate={updateRisk}
              onBack={()=>setView('register')} opts={activeOpts}/>
          </div>
        )}
      </div>

      {/* New risk side panel */}
      {showNew&&<NewRiskPanel onSave={addRisk} onClose={()=>setShowNew(false)} opts={activeOpts}/>}

      {/* Import result toast */}
      {importMsg&&(
        <ImportToast msg={importMsg} onClose={()=>setImportMsg(null)}/>
      )}}
      {showOpts&&<OptsManagerPanel
        opts={activeOpts}
        onUpdate={o=>{
          /* o is the full merged list for one key; save entire updated category */
          setCustomOpts(prev=>{
            const next={...prev};
            Object.keys(o).forEach(k=>{
              if(o[k]===undefined){
                delete next[k]; /* undefined = reset to default */
              } else {
                next[k]=o[k];
              }
            });
            return next;
          });
        }}
        onClose={()=>setShowOpts(false)}/>}

      {/* Copyright footer */}
      <footer className="no-print" style={{
        marginTop:'auto',borderTop:`1px solid ${C.bdr}`,
        padding:'14px 28px',
        display:'flex',justifyContent:'center',alignItems:'center',
        background:C.surf,
      }}>
        <span style={{fontSize:11.5,color:C.fnt,fontFamily:'Inter,sans-serif',
          letterSpacing:'0.03em'}}>
          Copyright © 2026 Akers Kuo. All rights reserved.
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
