    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div style={{gridColumn:'span 2'}}>
        <SectionLabel>基本資訊</SectionLabel>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:12}}>
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>風險名稱</div>
            <TInput value={ed.name} onChange={e=>updField({name:e.target.value})}
              placeholder="例：電商平台客戶資料外洩風險"/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>負責人</div>
            <TInput value={ed.owner} onChange={e=>updField({owner:e.target.value})} placeholder="例：CISO"/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>優先等級</div>
            <TSelect value={ed.priority} onChange={e=>updField({priority:e.target.value})}
              options={Object.entries(PRI_CFG).map(([v,p])=>({v,l:p.label}))}
              placeholder="— 選擇 —"/>
          </div>
        </div>
      </div>
      <div style={{gridColumn:'span 2'}}>
        <SectionLabel>場景定義</SectionLabel>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {[
            {k:'asset',label:'受影響資產',opts:opts.assets},
            {k:'actor',label:'威脅來源',  opts:opts.actors},
            {k:'event',label:'威脅行為',  opts:opts.events},
            {k:'loss', label:'損失事件',  opts:opts.losses},
          ].map(({k,label,opts:optList})=>(
            <ScenarioField key={k} label={label} fieldKey={k}
              value={ed[k]} opts={optList}
              onChange={v=>updField({[k]:v})}/>
          ))}
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>業務衝擊關切</div>
            <TInput value={ed.concern} onChange={e=>updField({concern:e.target.value})} rows={2}
              placeholder="預期可能造成的業務影響…"/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>分析假設條件</div>
            <TInput value={ed.assumptions} onChange={e=>updField({assumptions:e.target.value})} rows={2}
              placeholder="分析前提與假設說明…"/>
          </div>
        </div>
      </div>
      <div style={{gridColumn:'span 2',display:'flex',justifyContent:'flex-end',
        alignItems:'center',gap:12}}>
        {saved&&!isDirty&&(
          <span style={{fontSize:12,color:C.grn,fontFamily:'Inter,sans-serif',
            display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:15}}>✓</span> 已儲存
          </span>
        )}
        {!isDirty&&!saved&&(
          <span style={{fontSize:12,color:C.fnt,fontFamily:'Inter,sans-serif'}}>
            尚無變更
          </span>
        )}
        <Btn
          ch={saved&&!isDirty?'儲存完成 ✓':'儲存變更'}
          onClick={isDirty?save:undefined}
          disabled={!isDirty}
          v={saved&&!isDirty?'ghost':'primary'}
          style={saved&&!isDirty?{color:C.grn,borderColor:C.grn,background:'transparent',opacity:0.8}:{}}
        />
      </div>
    </div>
  );
}

/* Tab: FAIR 分析 */
function TabFair({risk,onUpdate}){
  /* nodes live in local state; synced to risk on simulate */
  const[nodes,setNodes]=useState(()=>{
    /* migrate old fairParams schema → fairNodes */
    if(risk.fairNodes)return JSON.parse(JSON.stringify(risk.fairNodes));
    const n=cloneNodes(DEF_NODES);
    if(risk.fairParams){
      const p=risk.fairParams;
      ['cf','poa','tcap','rs','pl','slef','slm'].forEach(k=>{
        if(p[k]){n[k].lo=p[k].lo;n[k].ml=p[k].ml;n[k].hi=p[k].hi;}
      });
    }
    return n;
  });
  const[simCount,setSimCount]=useState(10000);
  const[simming,setSimming]=useState(false);
  const runSim=()=>{
    setSimming(true);
    setTimeout(()=>{
      try{
        const result=runMC(nodes,simCount);
        const newStatus=risk.status==='registered'?'analyzed':risk.status;
        onUpdate({...risk,fairNodes:nodes,fairResult:result,
          status:newStatus,updatedAt:today()});
      }finally{setSimming(false);}
    },80);
  };
  const hist=useMemo(()=>risk.fairResult?mkHist(risk.fairResult.raw):null,[risk.fairResult]);
  const exc =useMemo(()=>risk.fairResult?mkExc(risk.fairResult.raw):null,[risk.fairResult]);
  return(
    <div>
      <FairDiagram nodes={nodes} setNodes={setNodes}/>
      <div style={{margin:'12px 0',display:'flex',justifyContent:'flex-end',
        gap:10,alignItems:'center',flexWrap:'wrap'}}>
        {risk.fairResult&&(
          <span style={{fontSize:11.5,color:C.sub,fontFamily:'Inter,sans-serif'}}>
            上次模擬：{fmtDate(risk.updatedAt)}
            {risk.fairResult.N&&(
              <span style={{marginLeft:6,padding:'1px 7px',background:'#F0EDE8',
                borderRadius:2,fontSize:10,color:C.fnt}}>N={risk.fairResult.N.toLocaleString()}</span>
            )}
          </span>
        )}
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11.5,color:C.sub,fontFamily:'Inter,sans-serif',flexShrink:0}}>
            模擬次數
          </span>
          {[10000,50000,100000].map(n=>(
            <button key={n} onClick={()=>setSimCount(n)} style={{
              padding:'5px 10px',borderRadius:3,fontSize:11.5,cursor:'pointer',
              fontFamily:'Inter,sans-serif',fontWeight:500,transition:'all .12s',
              border:`1.5px solid ${simCount===n?C.txt:C.bdr}`,
              background:simCount===n?C.txt:'transparent',
              color:simCount===n?'white':C.sub}}>
              {n===10000?'10K':n===50000?'50K':'100K'}
            </button>
          ))}
        </div>
        <Btn ch={simming?'模擬執行中…':risk.fairResult?'重新執行模擬':'▶ 執行模擬'}
          onClick={runSim} disabled={simming}
          style={{padding:'9px 24px',fontSize:13}}/>
      </div>
      {risk.fairResult&&(
        <div className="fade">

          {/* ── 1. Scenario Summary ── */}
          <div style={{background:'#F6F4EF',border:`1px solid ${C.bdr}`,
            borderRadius:4,padding:'14px 18px',marginBottom:16,
            borderLeft:`3px solid ${C.red}`}}>
            <div style={{fontSize:10,fontWeight:600,color:C.red,letterSpacing:'0.12em',
              textTransform:'uppercase',marginBottom:8,fontFamily:'Inter,sans-serif'}}>
              情境摘要 · Scenario Summary
            </div>
            <p style={{fontSize:13.5,color:C.txt,lineHeight:1.85,fontFamily:'Inter,sans-serif'}}>
              <strong>{risk.scenario.actor||'—'}</strong>
              <span style={{color:C.sub}}> 對 </span>
              <strong>「{risk.scenario.asset||'—'}」</strong>
              <span style={{color:C.sub}}> 發動 </span>
              <strong>{risk.scenario.event||'—'}</strong>
              <span style={{color:C.sub}}> 行為，可能造成 </span>
              <strong>{risk.scenario.loss||'—'}</strong>。
            </p>
            {risk.scenario.assumptions&&(
              <p style={{fontSize:11.5,color:C.sub,marginTop:6,fontStyle:'italic',
                fontFamily:'Inter,sans-serif'}}>
                假設條件：{risk.scenario.assumptions}
              </p>
            )}
          </div>

          {/* ── 2. KPI Cards ── */}
          <SectionLabel>量化結果 · Quantitative Results</SectionLabel>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:6}}>
            {[
              {
                zh:'預期年度損失',en:'Expected Annual Loss',abbr:'EAL',
                val:usd(risk.fairResult.mean),
                note:'均值（Mean），代表長期平均的年度暴露水準',
                warn:'此值不代表最可能發生的損失金額',hi:true
              },
              {
                zh:'P50 中位數',en:'50th Percentile',abbr:'P50',
                val:usd(risk.fairResult.p50),
                note:'50% 的情境低於此值',warn:null
              },
              {
                zh:'P90 高風險門檻',en:'90th Percentile',abbr:'P90',
                val:usd(risk.fairResult.p90),
                note:'90% 情境下年度損失不超過此值',warn:null
              },
              {
                zh:'P95 尾端風險',en:'95th Percentile',abbr:'P95',
                val:usd(risk.fairResult.p95),
                note:'用於觀察高損失但較低機率的情境',warn:null
              },
            ].map((m,i)=>(
              <div key={i} style={{background:i===0?C.txt:C.surf,
                border:`1px solid ${i===0?C.txt:C.bdr}`,borderRadius:4,
                padding:'14px 14px'}}>
                <div style={{fontSize:10,color:i===0?'rgba(255,255,255,.55)':C.fnt,
                  marginBottom:2,fontFamily:'Inter,sans-serif',letterSpacing:'0.04em',
                  textTransform:'uppercase'}}>{m.abbr}</div>
                <div style={{fontSize:11,color:i===0?'rgba(255,255,255,.7)':C.sub,
                  marginBottom:6,fontFamily:'Inter,sans-serif',lineHeight:1.3}}>
                  {m.zh}
                  {i===0&&<span style={{display:'block',fontSize:9.5,opacity:0.7}}>{m.en}</span>}
                </div>
                <div style={{fontSize:22,fontWeight:700,color:i===0?'white':C.txt,
                  letterSpacing:'-0.02em',fontFamily:'Inter,sans-serif',
                  marginBottom:6,lineHeight:1}}>{m.val}</div>
                <div style={{fontSize:10.5,color:i===0?'rgba(255,255,255,.6)':C.sub,
                  fontFamily:'Inter,sans-serif',lineHeight:1.5}}>{m.note}</div>
                {m.warn&&(
                  <div style={{marginTop:5,fontSize:9.5,
                    color:i===0?'rgba(255,220,100,.85)':'#9E6818',
                    fontFamily:'Inter,sans-serif',fontStyle:'italic'}}>
                    ⚠ {m.warn}
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* ── 3. Distribution interpretation ── */}
          <div style={{background:'#F0EDE8',border:`1px solid ${C.bdr}`,
            borderRadius:4,padding:'12px 16px',marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
              textTransform:'uppercase',marginBottom:6,fontFamily:'Inter,sans-serif'}}>
              分佈特性說明
            </div>
            <p style={{fontSize:12.5,color:C.txt,lineHeight:1.8,fontFamily:'Inter,sans-serif'}}>
              此風險呈現<strong>右偏長尾分佈（Right-skewed / Long-tail Distribution）</strong>，
              多數情境的損失相對較低，但少數情境可能造成顯著較大的損失。
              因此，平均值（EAL = {usd(risk.fairResult.mean)}）可能明顯高於中位數（P50 = {usd(risk.fairResult.p50)}），
              這是 FAIR 量化分析的正常特性，代表極端情境的損失對均值影響較大。
            </p>
          </div>

          {/* ── 4 & 5. Charts ── */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,padding:14}}>
              <div style={{fontSize:12,fontWeight:600,color:C.txt,marginBottom:2,
                fontFamily:'Inter,sans-serif'}}>損失分佈直方圖</div>
              <div style={{fontSize:10.5,color:C.sub,marginBottom:3,
                fontFamily:'Inter,sans-serif'}}>Loss Distribution Histogram</div>
              <div style={{fontSize:10,color:C.fnt,marginBottom:8,
                fontFamily:'Inter,sans-serif'}}>
                X 軸：年度損失金額 · Y 軸：模擬次數（僅顯示非零損失情境）
              </div>
              <MiniHistogram data={hist} mean={risk.fairResult.mean}/>
              <div style={{fontSize:10,color:C.sub,marginTop:6,
                display:'flex',gap:6,alignItems:'center',fontFamily:'Inter,sans-serif'}}>
                <span style={{display:'inline-block',width:14,
                  borderTop:`1.5px dashed ${C.red}`}}/>
                平均值（Mean / EAL）= {usd(risk.fairResult.mean)}
              </div>
              <div style={{fontSize:10,color:C.fnt,marginTop:4,lineHeight:1.6,
                fontFamily:'Inter,sans-serif'}}>
                此圖顯示不同年度損失區間出現的頻率，可觀察最常見的損失範圍與分佈形狀。
              </div>
            </div>
            <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,padding:14}}>
              <div style={{fontSize:12,fontWeight:600,color:C.txt,marginBottom:2,
                fontFamily:'Inter,sans-serif'}}>損失超越機率曲線</div>
              <div style={{fontSize:10.5,color:C.sub,marginBottom:3,
                fontFamily:'Inter,sans-serif'}}>Loss Exceedance Curve</div>
              <div style={{fontSize:10,color:C.fnt,marginBottom:8,
                fontFamily:'Inter,sans-serif'}}>
                顯示某一損失金額「被超過」的機率
              </div>
              <MiniExceedance data={exc}/>
              <div style={{fontSize:10,color:C.sub,marginTop:6,
                display:'flex',gap:5,alignItems:'center',fontFamily:'Inter,sans-serif'}}>
                <span style={{display:'inline-block',width:14,
                  borderTop:`1.5px dashed ${C.red}`}}/>
                P90 線：90% 情境不超過 {usd(risk.fairResult.p90)}
              </div>
              <div style={{fontSize:10,color:C.fnt,marginTop:4,lineHeight:1.6,
                fontFamily:'Inter,sans-serif'}}>
                曲線往右代表損失金額越高；往上代表超越機率越高。曲線越陡，尾端風險越集中。
              </div>
            </div>
          </div>

          {/* ── 6. Business Decision Support ── */}
          <div style={{background:C.grnL,border:`1px solid ${C.grn}30`,
            borderRadius:4,padding:'14px 18px',marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:600,color:C.grn,letterSpacing:'0.1em',
              textTransform:'uppercase',marginBottom:12,fontFamily:'Inter,sans-serif'}}>
              業務解讀與管理建議 · Business Interpretation
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              {[
                `預期年度損失（均值 EAL）約為 ${usd(risk.fairResult.mean)}，代表此情境在長期平均下的年度風險暴露水準。此數值不代表最可能發生的損失金額。`,
                `在 ${risk.fairResult.N.toLocaleString()} 次模擬中，約 ${risk.fairResult.pLoss}% 的情境產生非零年度損失，代表損失事件在分析期間的預期發生率。`,
                `在 90% 的情境下，年度損失不超過 ${usd(risk.fairResult.p90)}（P90 信心水準）。此數值可作為預算規劃或風險準備金的參考依據。`,
                `極端情境（P99）損失估計可達 ${usd(risk.fairResult.p99)}。此為尾端風險（Tail Risk），發生機率極低，但一旦發生影響重大，建議列入壓力測試情境。`,
              ].map((text,i)=>(
                <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  <span style={{
                    flexShrink:0,width:20,height:20,borderRadius:'50%',
                    background:C.grn,color:'white',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:10.5,fontWeight:700,fontFamily:'Inter,sans-serif',
                    marginTop:1
                  }}>{i+1}</span>
                  <p style={{fontSize:12.5,color:C.txt,lineHeight:1.75,
                    fontFamily:'Inter,sans-serif'}}>{text}</p>
                </div>
              ))}
            </div>
            <div style={{borderTop:`1px solid ${C.grn}25`,paddingTop:10}}>
              <div style={{fontSize:10,fontWeight:600,color:C.grn,letterSpacing:'0.1em',
                textTransform:'uppercase',marginBottom:6,fontFamily:'Inter,sans-serif'}}>
                管理行動建議
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {[
                  '若管理層關注高尾端損失，應優先檢視能降低高損失情境的控制措施（如 TCap 或 LM 端）。',
                  `若組織風險承受門檻低於 P90 水準（${usd(risk.fairResult.p90)}），此情境建議納入優先處理範圍。`,
                ].map((t,i)=>(
                  <div key={i} style={{fontSize:12,color:C.grn,lineHeight:1.7,
                    fontFamily:'Inter,sans-serif',display:'flex',gap:6}}>
                    <span style={{flexShrink:0}}>→</span>
                    <span>{t}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ── 7. Assumptions & Model Basis ── */}
          <div style={{background:C.surf,border:`1px solid ${C.bdr}`,
            borderRadius:4,padding:'12px 16px'}}>
            <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
              textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>
              分析基礎與假設說明 · Model Basis
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:10}}>
              {[
                {k:'模擬方法',v:'蒙地卡羅（Monte Carlo）'},
                {k:'參數分佈',v:'Beta-PERT 三點估計'},
                {k:'模擬次數（N）',v:risk.fairResult.N.toLocaleString()},
              ].map(({k,v})=>(
                <div key={k} style={{padding:'8px 10px',background:'#F6F4EF',borderRadius:3}}>
                  <div style={{fontSize:9.5,color:C.fnt,marginBottom:3,
                    fontFamily:'Inter,sans-serif',letterSpacing:'0.06em',
                    textTransform:'uppercase'}}>{k}</div>
                  <div style={{fontSize:12.5,fontWeight:500,color:C.txt,
                    fontFamily:'Inter,sans-serif'}}>{v}</div>
                </div>
              ))}
            </div>
            <p style={{fontSize:11,color:C.fnt,lineHeight:1.65,fontFamily:'Inter,sans-serif',
              fontStyle:'italic'}}>
              本分析結果取決於目前輸入的 FAIR 參數假設。若情境、控制措施或輸入參數改變，
              分析結果亦可能隨之變動。建議定期複查並更新假設條件以維持分析的時效性。
            </p>
          </div>

        </div>
      )}
    </div>
  );
}

/* Tab: 評估 */
/* Tab: 評估 */
function TabEvaluation({risk,onUpdate}){
  const init=()=>({...{
    decision:'',evaluator:'',evaluationDate:today(),
    basis:'',rationale:'',escalation:'no',approvalLevel:'',
    appetiteThreshold:'',toleranceThreshold:'',thresholdSource:'',reviewedAt:'',
  },...risk.evaluation});
  const[ed,setEd]=useState(init);
  const[saved,setSaved]=useState(false);
  const upd=(k,v)=>{setEd(p=>({...p,[k]:v}));setSaved(false);};
  const isDirty=useMemo(()=>{
    const e=risk.evaluation;
    return ed.decision!==e.decision||ed.evaluator!==e.evaluator||
      ed.basis!==e.basis||ed.rationale!==e.rationale||
      ed.escalation!==e.escalation||ed.approvalLevel!==e.approvalLevel||
      ed.appetiteThreshold!==e.appetiteThreshold||
      ed.toleranceThreshold!==e.toleranceThreshold||
      ed.thresholdSource!==e.thresholdSource||ed.evaluationDate!==e.evaluationDate;
  },[ed,risk.evaluation]);
  const save=()=>{
    const newStatus=ed.decision?'evaluated':risk.status;
    onUpdate({...risk,evaluation:{...ed,reviewedAt:today()},status:newStatus,updatedAt:today()});
    setSaved(true);
  };
  if(!risk.fairResult){
    return(
      <div style={{textAlign:'center',padding:'40px 20px',color:C.fnt,fontFamily:'Inter,sans-serif'}}>
        請先在「FAIR 分析」標籤執行蒙地卡羅模擬，才能進行風險評估。
      </div>
    );
  }
  const r=risk.fairResult;
  const ealNum=parseFloat(ed.appetiteThreshold)||0;
  const p90Num=parseFloat(ed.toleranceThreshold)||0;
  const ealExceeds=ealNum>0&&r.mean>ealNum;
  const p90Exceeds=p90Num>0&&r.p90>p90Num;
  const anyExceeds=ealExceeds||p90Exceeds;
  const decisions=[
    {v:'accept',  l:'接受',  en:'Accept',   desc:'損失在可接受範圍，維持現狀監控'},
    {v:'treat',   l:'處理',  en:'Treat',    desc:'實施控制措施以降低風險暴露'},
    {v:'transfer',l:'轉移',  en:'Transfer', desc:'透過保險或合約安排轉移財務風險'},
    {v:'avoid',   l:'迴避',  en:'Avoid',    desc:'停止或改變導致此風險的業務活動'},
  ];
  const escalations=[
    {v:'no',   l:'不需要'},
    {v:'dept', l:'部門主管核准'},
    {v:'exec', l:'高階主管核准'},
    {v:'board',l:'董事會 / 稽核委員會核准'},
  ];
  return(
    <div>
      {/* A. FAIR 結果摘要 */}
      <SectionLabel>FAIR 量化結果摘要 · FAIR Analysis Summary</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:16}}>
        {[
          {zh:'預期年度損失',en:'Expected Annual Loss (EAL)',val:usd(r.mean),note:'長期平均年度暴露水準',hi:true},
          {zh:'P50 中位損失',en:'50th Percentile',           val:usd(r.p50), note:'50% 情境低於此值'},
          {zh:'P90 高風險門檻',en:'90th Percentile',         val:usd(r.p90), note:'90% 情境低於此值'},
          {zh:'P95 尾端風險',en:'95th Percentile',           val:usd(r.p95), note:'5% 情境超過此值'},
          {zh:'非零損失占比',en:'Non-Zero Loss Rate',         val:r.pLoss+'%',note:'產生損失的情境比例'},
        ].map((m,i)=>(
          <div key={i} style={{background:i===0?C.txt:'#F6F4EF',
            border:`1px solid ${i===0?C.txt:C.bdr}`,borderRadius:4,padding:'10px 12px'}}>
            <div style={{fontSize:9.5,color:i===0?'rgba(255,255,255,.55)':C.fnt,
              marginBottom:2,fontFamily:'Inter,sans-serif',lineHeight:1.4}}>{m.zh}</div>
            <div style={{fontSize:16,fontWeight:700,
              color:i===0?'white':C.txt,fontFamily:'Inter,sans-serif',
              letterSpacing:'-0.01em',marginBottom:2}}>{m.val}</div>
            <div style={{fontSize:9.5,color:i===0?'rgba(255,255,255,.45)':C.fnt,
              fontFamily:'Inter,sans-serif'}}>{m.note}</div>
          </div>
        ))}
      </div>

      {/* B. 風險門檻比較 */}
      <SectionLabel>風險門檻比較 · Risk Threshold Comparison</SectionLabel>
      <div style={{background:'#F6F4EF',border:`1px solid ${C.bdr}`,
        borderRadius:4,padding:'14px 16px',marginBottom:16}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
              適用風險胃納門檻（EAL）
            </div>
            <TInput value={ed.appetiteThreshold} onChange={e=>upd('appetiteThreshold',e.target.value)}
              placeholder="例：300,000" type="number"/>
            <div style={{fontSize:10,color:C.fnt,marginTop:3,fontFamily:'Inter,sans-serif'}}>
              風險胃納（Risk Appetite）上限，以 USD 輸入
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
              適用風險容忍度門檻（P90）
            </div>
            <TInput value={ed.toleranceThreshold} onChange={e=>upd('toleranceThreshold',e.target.value)}
              placeholder="例：1,000,000" type="number"/>
            <div style={{fontSize:10,color:C.fnt,marginTop:3,fontFamily:'Inter,sans-serif'}}>
              風險容忍度（Risk Tolerance）上限，以 USD 輸入
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
              門檻來源
            </div>
            <TSelect value={ed.thresholdSource} onChange={e=>upd('thresholdSource',e.target.value)}
              options={[
                {v:'policy',    l:'公司整體風險政策'},
                {v:'bu',        l:'業務單位風險準則'},
                {v:'risk_type', l:'風險類型特定標準'},
                {v:'board',     l:'董事會核定標準'},
                {v:'exception', l:'例外核准標準'},
                {v:'manual',    l:'本次手動設定'},
              ]} placeholder="— 選擇門檻來源 —"/>
          </div>
        </div>
        {/* Threshold status */}
        {(ealNum>0||p90Num>0)&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {ealNum>0&&(
              <div style={{padding:'10px 14px',borderRadius:4,
                background:ealExceeds?C.redL:C.grnL,
                border:`1px solid ${ealExceeds?C.red+'40':C.grn+'40'}`}}>
                <div style={{fontSize:10.5,fontWeight:600,
                  color:ealExceeds?C.red:C.grn,fontFamily:'Inter,sans-serif',marginBottom:3}}>
                  {ealExceeds?'⚠ EAL 超出風險胃納':'✓ EAL 在風險胃納範圍內'}
                </div>
                <div style={{fontSize:11.5,color:C.sub,fontFamily:'Inter,sans-serif'}}>
                  目前 EAL {usd(r.mean)} vs 門檻 {usd(ealNum)}
                </div>
              </div>
            )}
            {p90Num>0&&(
              <div style={{padding:'10px 14px',borderRadius:4,
                background:p90Exceeds?C.redL:C.grnL,
                border:`1px solid ${p90Exceeds?C.red+'40':C.grn+'40'}`}}>
                <div style={{fontSize:10.5,fontWeight:600,
                  color:p90Exceeds?C.red:C.grn,fontFamily:'Inter,sans-serif',marginBottom:3}}>
                  {p90Exceeds?'⚠ P90 超出風險容忍度':'✓ P90 在風險容忍度範圍內'}
                </div>
                <div style={{fontSize:11.5,color:C.sub,fontFamily:'Inter,sans-serif'}}>
                  目前 P90 {usd(r.p90)} vs 門檻 {usd(p90Num)}
                </div>
              </div>
            )}
          </div>
        )}
        {/* System recommendation */}
        {anyExceeds&&(
          <div style={{marginTop:10,padding:'10px 14px',background:C.ambL,
            borderRadius:4,border:`1px solid #DEC98A`}}>
            <div style={{fontSize:10.5,fontWeight:600,color:C.amb,
              fontFamily:'Inter,sans-serif',marginBottom:2}}>系統建議</div>
            <div style={{fontSize:12.5,color:C.txt,fontFamily:'Inter,sans-serif'}}>
              {ealExceeds&&p90Exceeds
                ?'EAL 與 P90 均超出門檻，建議採取「處理（Treat）」或「轉移（Transfer）」策略。'
                :ealExceeds
                  ?'EAL 超出風險胃納，建議重新評估是否接受或採取控制措施。'
                  :'P90 超出風險容忍度，尾端風險較高，建議考慮「處理」或「轉移」。'}
            </div>
          </div>
        )}
      </div>

      {/* C. 決策選項 */}
      <SectionLabel>評估決策 · Evaluation Decision</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
        {decisions.map(d=>(
          <div key={d.v} onClick={()=>upd('decision',d.v)}
            style={{padding:'12px 14px',borderRadius:4,cursor:'pointer',
              border:`2px solid ${ed.decision===d.v?C.txt:C.bdr}`,
              background:ed.decision===d.v?C.txt:C.surf,transition:'all .12s'}}>
            <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:3}}>
              <span style={{fontSize:13,fontWeight:700,
                color:ed.decision===d.v?'white':C.txt,fontFamily:'Inter,sans-serif'}}>{d.l}</span>
              <span style={{fontSize:10,color:ed.decision===d.v?'rgba(255,255,255,.55)':C.fnt,
                fontFamily:'Inter,sans-serif'}}>{d.en}</span>
            </div>
            <div style={{fontSize:11.5,
              color:ed.decision===d.v?'rgba(255,255,255,.65)':C.sub,fontFamily:'Inter,sans-serif'}}>
              {d.desc}
            </div>
          </div>
        ))}
      </div>
      {/* Decision guidance */}
      <div style={{background:'#F6F4EF',border:`1px solid ${C.bdr}`,borderRadius:4,
        padding:'10px 14px',marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:600,color:C.sub,letterSpacing:'0.1em',
          textTransform:'uppercase',marginBottom:6,fontFamily:'Inter,sans-serif'}}>決策參考指引</div>
        {[
          '若 EAL 與 P90 皆低於適用門檻，可考慮接受（Accept）並持續監控。',
          '若 P90 / P95 顯著高於門檻，且屬高尾端風險，建議處理（Treat）或轉移（Transfer）。',
          '若風險暴露與業務收益不成比例，或業務活動本身可調整，可考慮迴避（Avoid）。',
          '轉移（Transfer）適用於損失規模大但控制成本過高、可透過保險或合約安排轉嫁的情境。',
        ].map((t,i)=>(
          <div key={i} style={{fontSize:11.5,color:C.sub,lineHeight:1.7,
            fontFamily:'Inter,sans-serif',display:'flex',gap:8,marginBottom:3}}>
            <span style={{color:C.grn,flexShrink:0}}>·</span><span>{t}</span>
          </div>
        ))}
      </div>

      {/* D. 結構化評估理由 */}
      <SectionLabel>評估記錄 · Evaluation Record</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>評估者</div>
          <TInput value={ed.evaluator} onChange={e=>upd('evaluator',e.target.value)} placeholder="例：風險長（CRO）"/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>評估日期</div>
          <TInput type="date" value={ed.evaluationDate} onChange={e=>upd('evaluationDate',e.target.value)}/>
        </div>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
            評估依據（Basis of Evaluation）
          </div>
          <TInput value={ed.basis} onChange={e=>upd('basis',e.target.value)} rows={2}
            placeholder="例：依據公司資訊安全風險政策 v2.1，本情境 P90 超出部門容忍度上限 NT$800 萬"/>
        </div>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
            決策理由（Decision Rationale）
          </div>
          <TInput value={ed.rationale} onChange={e=>upd('rationale',e.target.value)} rows={3}
            placeholder="例：鑑於 EAL 達 NT$557 萬且 P90 達 NT$1,560 萬，超出部門風險胃納 NT$300 萬，決定採取降低策略，優先強化存取控制與資料加密"/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
            是否需升級審批
          </div>
          <TSelect value={ed.escalation} onChange={e=>upd('escalation',e.target.value)}
            options={escalations} placeholder="— 選擇 —"/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
            審批層級（如需要）
          </div>
          <TInput value={ed.approvalLevel} onChange={e=>upd('approvalLevel',e.target.value)}
            placeholder="例：資訊安全委員會、副總裁層級" disabled={ed.escalation==='no'}/>
        </div>
      </div>

      <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:12}}>
        {saved&&!isDirty&&(
          <span style={{fontSize:12,color:C.grn,fontFamily:'Inter,sans-serif',
            display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:15}}>✓</span> 已儲存
          </span>
        )}
        {!isDirty&&!saved&&(
          <span style={{fontSize:12,color:C.fnt,fontFamily:'Inter,sans-serif'}}>尚無變更</span>
        )}
        <Btn ch={saved&&!isDirty?'儲存完成 ✓':'儲存變更'}
          onClick={isDirty?save:undefined} disabled={!isDirty||!ed.decision}
          v={saved&&!isDirty?'ghost':'primary'}
          style={saved&&!isDirty?{color:C.grn,borderColor:C.grn,background:'transparent',opacity:0.8}:{}}/>
      </div>
    </div>
  );
}

/* Tab: 應對 */
function TabTreatment({risk,onUpdate}){
  const init=()=>({...{
    strategy:'',description:'',controls:'',owner:'',dueDate:'',
    treatStatus:'not_started',budget:'',budgetType:'',
    residualEAL:'',residualP90:'',residualP95:'',residualPLoss:'',
    residualBasis:'',residualNarrative:'',
    financeReviewer:'',financeStatus:'',approvedAmount:'',financeNotes:'',
    insuranceNeeded:'no',insuranceNotes:'',annualizedCost:'',rationale:'',
  },...risk.treatment});
  const[ed,setEd]=useState(init);
  const[saved,setSaved]=useState(false);
  const upd=(k,v)=>{setEd(p=>({...p,[k]:v}));setSaved(false);};
  const isDirty=useMemo(()=>{
    const t=risk.treatment;
    return ['strategy','description','controls','owner','dueDate','treatStatus',
      'budget','budgetType','residualEAL','residualP90','residualP95','residualPLoss',
      'residualBasis','residualNarrative','financeReviewer','financeStatus',
      'approvedAmount','financeNotes','insuranceNeeded','insuranceNotes',
      'annualizedCost','rationale'].some(k=>ed[k]!==t[k]);
  },[ed,risk.treatment]);
  const save=()=>{
    const newStatus=ed.strategy?'in_treatment':risk.status;
    onUpdate({...risk,treatment:{...ed},status:newStatus,updatedAt:today()});
    setSaved(true);

  const overdue=ed.dueDate&&isOverdue(ed.dueDate)&&ed.treatStatus!=='completed';

    {v:'accept',  l:'接受',en:'Accept',  c:C.fnt, desc:'在知情前提下接受當前風險水準'},

    {v:'project',   l:'專案費用（Project Budget）'},
    {v:'other',     l:'其他'},
  ];

        {strategies.map(s=>(
          <div key={s.v} onClick={()=>upd('strategy',s.v)}
            style={{padding:'12px 10px',borderRadius:4,cursor:'pointer',textAlign:'center',
              border:`2px solid ${ed.strategy===s.v?s.c:C.bdr}`,
              background:ed.strategy===s.v?s.c+'14':'white',transition:'all .12s'}}>
            <div style={{fontSize:14,fontWeight:700,color:ed.strategy===s.v?s.c:C.sub,
              fontFamily:'Inter,sans-serif'}}>{s.l}</div>
            <div style={{fontSize:9.5,color:C.fnt,fontFamily:'Inter,sans-serif',marginTop:1}}>{s.en}</div>
            <div style={{fontSize:10.5,color:ed.strategy===s.v?s.c+'CC':C.fnt,
              fontFamily:'Inter,sans-serif',marginTop:4,lineHeight:1.4}}>{s.desc}</div>
          </div>
        ))}
      </div>

      {/* B. 應對計畫 */}
      <SectionLabel>應對計畫 · Treatment Plan</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
            控制措施描述（Treatment Description）
          </div>
          <TInput value={ed.description} onChange={e=>upd('description',e.target.value)} rows={2}
            placeholder="例：強化特權存取管理（PAM）、部署端點偵測回應（EDR）、實施資料分類與 DLP 策略"/>
        </div>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>
            具體控制項目（Specific Control Actions）
          </div>
          <TInput value={ed.controls} onChange={e=>upd('controls',e.target.value)} rows={2}
            placeholder="例：① 全面部署 MFA ② 網路分段 ③ 加密靜態資料 ④ 季度安全意識培訓"/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>應對負責人</div>

            textTransform:'uppercase',marginBottom:10,fontFamily:'Inter,sans-serif'}}>

          {r?[
            ['EAL 均值',     usd(r.mean)],
            ['P90',          usd(r.p90)],
            ['P95',          usd(r.p95)],
            ['非零損失率',    r.pLoss+'%'],

            <div key={k} style={{display:'flex',justifyContent:'space-between',
              padding:'5px 0',borderBottom:`1px solid ${C.bdr}`,
              fontSize:12,fontFamily:'Inter,sans-serif'}}>
              <span style={{color:C.sub}}>{k}</span>
              <strong style={{color:C.txt}}>{v}</strong>

          )):(

            ['預期殘餘 P95',  'residualP95',  '例：$1,100,000'],
            ['預期非零損失率','residualPLoss', '例：35%'],

        <div style={{gridColumn:'span 1'}}/>

            options={financeStatuses} placeholder="— 選擇狀態 —"/>

          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>核准金額</div>
          <TInput value={ed.approvedAmount} onChange={e=>upd('approvedAmount',e.target.value)}
            placeholder="例：NT$120,000"/>

        <div>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>預估年度成本</div>

          <TSelect value={ed.insuranceNeeded} onChange={e=>upd('insuranceNeeded',e.target.value)}
            options={[{v:'no',l:'不需要'},{v:'yes',l:'需要評估'}]} placeholder="— 選擇 —"/>
        </div>
        {ed.insuranceNeeded==='yes'&&(
          <div>
            <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>保險方案說明</div>

        )}
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:4,fontFamily:'Inter,sans-serif'}}>財務備註</div>
          <TInput value={ed.financeNotes} onChange={e=>upd('financeNotes',e.target.value)} rows={2}

      <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:12}}>

        )}

          <span style={{fontSize:12,color:C.fnt,fontFamily:'Inter,sans-serif'}}>尚無變更</span>
        )}

          onClick={isDirty?save:undefined} disabled={!isDirty}
          v={saved&&!isDirty?'ghost':'primary'}
          style={saved&&!isDirty?{color:C.grn,borderColor:C.grn,background:'transparent',opacity:0.8}:{}}/>
      </div>
    </div>
  );
}

/* Tab: 監控 */
function TabMonitoring({risk,onUpdate}){
  const init=()=>({...{
    reviewCycle:'quarterly',nextReview:'',monitoringOwner:'',
    treatmentProgress:'',assumptionChanged:'no',assumptionNotes:'',
    residualWithinThreshold:'',refreshNeeded:'no',
    changeLog:'',notes:'',lastReviewed:'',
  },...risk.monitoring});
  const[ed,setEd]=useState(init);
  const[saved,setSaved]=useState(false);
  const upd=(k,v)=>{setEd(p=>({...p,[k]:v}));setSaved(false);};
  const isDirty=useMemo(()=>{
    const m=risk.monitoring;
    return ['reviewCycle','nextReview','monitoringOwner','treatmentProgress',
      'assumptionChanged','assumptionNotes','residualWithinThreshold',
      'refreshNeeded','changeLog','notes'].some(k=>ed[k]!==m[k]);
  },[ed,risk.monitoring]);
  const save=()=>{
    const newStatus=risk.treatment.treatStatus==='completed'?'monitoring':risk.status;
    onUpdate({...risk,monitoring:{...ed,lastReviewed:today()},
      status:newStatus,updatedAt:today()});
    setSaved(true);

  const closeRisk=()=>{
    if(window.confirm('確定要結案此風險？'))
      onUpdate({...risk,status:'closed',updatedAt:today()});

  const cycles=[
    {v:'monthly',  l:'每月'},

    {v:'biannual', l:'每半年'},
    {v:'annual',   l:'每年'},

  return(
    <div>
      {/* 應對進度摘要 */}

        <div style={{background:'#F6F4EF',border:`1px solid ${C.bdr}`,

            textTransform:'uppercase',marginBottom:8,fontFamily:'Inter,sans-serif'}}>
            應對計畫現況

          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[
              ['應對策略', {reduce:'降低',transfer:'轉移',accept:'接受',avoid:'迴避'}[risk.treatment.strategy]||risk.treatment.strategy],
              ['執行狀態', TREAT_STATUS[risk.treatment.treatStatus]?.label||'—'],
              ['目標完成日', fmtDate(risk.treatment.dueDate)||'—'],
              ['應對負責人', risk.treatment.owner||'—'],
              ['財務審查狀態', {pending:'待審查',approved:'已核准',rejected:'未核准',revision:'需修改'}[risk.treatment.financeStatus]||'—'],
              ['核准預算', risk.treatment.approvedAmount||'—'],
            ].map(([k,v])=>(
              <div key={k} style={{fontSize:12,fontFamily:'Inter,sans-serif'}}>
                <span style={{color:C.fnt}}>{k}：</span>
                <strong style={{color:C.txt}}>{v}</strong>
              </div>

          </div>
        </div>

      <SectionLabel>監控設定 · Monitoring Configuration</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div>
          <div style={{fontSize:11,color:C.txt,fontWeight:600,marginBottom:6,fontFamily:'Inter,sans-serif'}}>複查週期</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
            {cycles.map(c=>(
              <div key={c.v} onClick={()=>upd('reviewCycle',c.v)}
                style={{padding:'7px 4px',borderRadius:3,cursor:'pointer',
                  textAlign:'center',fontSize:11.5,fontFamily:'Inter,sans-serif',fontWeight:500,
                  border:`2px solid ${ed.reviewCycle===c.v?C.txt:C.bdr}`,
                  background:ed.reviewCycle===c.v?C.txt:'white',
                  color:ed.reviewCycle===c.v?'white':C.sub,transition:'all .12s'}}>

        <div>
