/* ═══════════════════════════════════════════════════
   MATH — Beta-PERT
═══════════════════════════════════════════════════ */
function normalRv(){
  let u,v,s;
  do{u=Math.random()*2-1;v=Math.random()*2-1;s=u*u+v*v;}
  while(s>=1||s===0);
  return u*Math.sqrt(-2*Math.log(s)/s);
}
function gammaRv(sh){
  if(sh<1)return gammaRv(1+sh)*Math.pow(Math.random(),1/sh);
  const d=sh-1/3,c=1/Math.sqrt(9*d);
  for(;;){
    let x,v;
    do{x=normalRv();v=1+c*x;}while(v<=0);
    v=v*v*v;const u=Math.random();
    if(u<1-0.0331*x*x*x*x)return d*v;
    if(Math.log(u)<0.5*x*x+d*(1-v+Math.log(v)))return d*v;
  }
}
function pertRv(lo,ml,hi){
  if(lo>=hi)return(lo+hi)/2;
  const m=Math.max(lo,Math.min(hi,ml)),r=hi-lo;
  const a=1+4*(m-lo)/r,b=1+4*(hi-m)/r;
  const gx=gammaRv(a),gy=gammaRv(b);
  return lo+r*gx/(gx+gy);
}
const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));

function runMC(nodes,N=10000){
  const out=new Array(N);
  for(let i=0;i<N;i++){
    /* ── LEF ─────────────────────── */
    let lef;
    if(nodes.lef.mode==='direct'){
      lef=pertRv(nodes.lef.lo,nodes.lef.ml,nodes.lef.hi);
    } else {
      /* derive TEF */
      let tef;
      if(nodes.tef.mode==='direct'){
        tef=pertRv(nodes.tef.lo,nodes.tef.ml,nodes.tef.hi);
      } else {
        tef=pertRv(nodes.cf.lo,nodes.cf.ml,nodes.cf.hi)
           *clamp(pertRv(nodes.poa.lo,nodes.poa.ml,nodes.poa.hi),0,1);
      }
      /* derive Vul */
      let vul;
      if(nodes.vul.mode==='direct'){
        vul=clamp(pertRv(nodes.vul.lo,nodes.vul.ml,nodes.vul.hi),0,1);
      } else {
        vul=pertRv(nodes.tcap.lo,nodes.tcap.ml,nodes.tcap.hi)>
            pertRv(nodes.rs.lo,nodes.rs.ml,nodes.rs.hi)?1:0;
      }
      lef=tef*vul;
    }
    /* ── LM ─────────────────────── */
    let lm;
    if(nodes.lm.mode==='direct'){
      lm=pertRv(nodes.lm.lo,nodes.lm.ml,nodes.lm.hi);
    } else {
      lm=pertRv(nodes.pl.lo,nodes.pl.ml,nodes.pl.hi)
        +clamp(pertRv(nodes.slef.lo,nodes.slef.ml,nodes.slef.hi),0,1)
        *pertRv(nodes.slm.lo,nodes.slm.ml,nodes.slm.hi);
    }
    out[i]=lef*lm;
  }
  out.sort((a,b)=>a-b);
  const sum=out.reduce((s,v)=>s+v,0);
  const pct=q=>out[Math.floor(N*q)];
  const nz=out.filter(v=>v>0).length;
  return{raw:out,N,mean:sum/N,p50:pct(.5),p90:pct(.9),p95:pct(.95),p99:pct(.99),pLoss:(nz/N*100).toFixed(1)};
}
function mkHist(sorted,bins=40){
  const nz=sorted.filter(v=>v>0);
  if(!nz.length)return[];
  const lo=nz[0],hi=nz[nz.length-1];
  if(lo===hi)return[{x:lo,ct:nz.length}];
  const bw=(hi-lo)/bins,cts=new Array(bins).fill(0);
  nz.forEach(v=>cts[Math.min(Math.floor((v-lo)/bw),bins-1)]++);
  return cts.map((ct,i)=>({x:lo+(i+.5)*bw,ct})).filter(b=>b.ct>0);
}
function mkExc(sorted){
  const N=sorted.length,step=Math.max(1,Math.floor(N/200)),pts=[];
  for(let i=0;i<N;i+=step)pts.push({loss:sorted[i],pct:(N-i)/N*100});
  pts.push({loss:sorted[N-1],pct:0});
  return pts;
}
const usd=v=>{
  if(!v||isNaN(v))return'—';
  if(v>=1e6)return`$${(v/1e6).toFixed(2)}M`;
  if(v>=1e3)return`$${(v/1e3).toFixed(1)}K`;
  return`$${Math.round(v)}`;
};

/* ═══════════════════════════════════════════════════
   NODE MODE DATA MODEL
   mode: 'direct' | 'derived'
   effective: 'direct' | 'derived' | 'info' (locked by parent)
═══════════════════════════════════════════════════ */
const DEF_NODES={
  /* switchable nodes — can be direct or derived */
  lef: {mode:'derived',lo:0,   ml:0,    hi:0   },
  tef: {mode:'derived',lo:0,   ml:0,    hi:0   },
  vul: {mode:'derived',lo:0,   ml:0,    hi:0   },
  lm:  {mode:'derived',lo:0,   ml:0,    hi:0   },
  /* leaf nodes — always direct (mode locked to 'direct') */
  cf:  {mode:'direct', lo:12,  ml:24,   hi:52  },
  poa: {mode:'direct', lo:0.05,ml:0.15, hi:0.30},
  tcap:{mode:'direct', lo:4,   ml:6,    hi:8   },
  rs:  {mode:'direct', lo:4,   ml:6,    hi:8   },
  pl:  {mode:'direct', lo:50000,ml:200000,hi:500000},
  slef:{mode:'direct', lo:0.2, ml:0.4,  hi:0.7 },
  slm: {mode:'direct', lo:20000,ml:80000,hi:250000},
};

/* Which nodes support mode switching */
const SWITCHABLE=new Set(['lef','tef','vul','lm']);

/* Resolve effective status of a node given current modes */
function nodeEffective(id,nodes){
  if(id==='risk')return 'derived';
  if(id==='sl')  return 'derived';
  if(['cf','poa'].includes(id)){
    if(nodes.lef.mode==='direct')return 'info';
    if(nodes.tef.mode==='direct')return 'info';
    return 'direct';
  }
  if(['tcap','rs'].includes(id)){
    if(nodes.lef.mode==='direct')return 'info';
    if(nodes.vul.mode==='direct')return 'info';
    return 'direct';
  }
  if(['pl','slef','slm'].includes(id)){
    if(nodes.lm.mode==='direct')return 'info';
    return 'direct';
  }
  if(id==='tef'||id==='vul'){
    if(nodes.lef.mode==='direct')return 'info';
    return nodes[id].mode;
  }
  return nodes[id]?nodes[id].mode:'direct';
}

function cloneNodes(n){
  const r={};
  Object.keys(n).forEach(k=>r[k]={...n[k]});
  return r;
}

const LS_KEY='fair_register_v2';
function loadRisks(){
  try{
    const d=localStorage.getItem(LS_KEY);
    if(!d||d==='undefined'||d==='null')return[];
    return JSON.parse(d)||[];
  }catch{return[];}
}
function saveRisks(risks){
  try{localStorage.setItem(LS_KEY,JSON.stringify(risks));}catch{}
}

function Btn({ch,onClick,disabled,v='primary',sm,style={}}){
  const p=sm?'6px 14px':'9px 20px';
  const fs=sm?11.5:12.5;
  const vs={
    primary:{background:C.txt,color:'white',border:'none'},
    ghost:{background:'transparent',color:C.sub,border:`1px solid ${C.bdr}`},
    red:{background:C.red,color:'white',border:'none'},
    grn:{background:C.grn,color:'white',border:'none'},
    outline:{background:'transparent',color:C.txt,border:`1px solid ${C.txt}`},
  };
  return(
    <button onClick={onClick} disabled={disabled} style={{
      ...vs[v],padding:p,borderRadius:3,fontSize:fs,fontWeight:500,
      cursor:disabled?'not-allowed':'pointer',fontFamily:'Inter,sans-serif',
      opacity:disabled?0.38:1,letterSpacing:'0.01em',transition:'opacity .12s',...style
    }}>{ch}</button>
  );
}

function TInput({value,onChange,placeholder,type='text',rows,sm}){

  if(rows)return <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={s}/>;
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={s}/>;

function TSelect({value,onChange,options,placeholder,sm}){

/* ═══════════════════════════════════════════════════
   SVG CHARTS (compact)
═══════════════════════════════════════════════════ */
function MiniHistogram({data,mean}){
  if(!data||!data.length)return null;
  const W=370,H=150,pad={t:6,r:4,b:22,l:36};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const maxCt=Math.max(...data.map(d=>d.ct));
  const minX=data[0].x,maxX=data[data.length-1].x;
  const xS=v=>((v-minX)/(maxX-minX||1))*iW;
  const yS=v=>iH-(v/maxCt)*iH;
  const bW=Math.max(1,(iW/data.length)-0.8);
  const tks=data.filter((_,i)=>i%Math.ceil(data.length/4)===0);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      <g transform={`translate(${pad.l},${pad.t})`}>
        {[0,.5,1].map(t=>(
          <line key={t} x1={0} x2={iW} y1={iH*t} y2={iH*t} stroke={C.bdr} strokeDasharray="2 4"/>
        ))}
        {data.map((d,i)=>(
          <rect key={i} x={xS(d.x)} y={yS(d.ct)} width={bW} height={iH-yS(d.ct)}
            fill={C.grnM} rx={1} opacity="0.85"/>
        ))}
        {mean>=minX&&mean<=maxX&&(
          <line x1={xS(mean)} x2={xS(mean)} y1={0} y2={iH}
            stroke={C.red} strokeDasharray="4 3" strokeWidth={1.5}/>
        )}
        {tks.map((d,i)=>(
          <text key={i} x={xS(d.x)} y={iH+14} textAnchor="middle"
            fontSize={7.5} fill={C.fnt}>{usd(d.x)}</text>
        ))}
        {[0,.5,1].map(t=>(
          <text key={t} x={-4} y={iH*t+3} textAnchor="end"
            fontSize={7.5} fill={C.fnt}>{Math.round(maxCt*(1-t))}</text>
        ))}
        <line x1={0} x2={iW} y1={iH} y2={iH} stroke={C.bdr}/>
        <line x1={0} x2={0} y1={0} y2={iH} stroke={C.bdr}/>
      </g>
    </svg>
  );
}

function MiniExceedance({data}){
  if(!data||!data.length)return null;
  const W=370,H=150,pad={t:6,r:18,b:22,l:36};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const minX=data[0].loss,maxX=data[data.length-1].loss;
  const xS=v=>((v-minX)/(maxX-minX||1))*iW;
  const yS=v=>iH-(v/100)*iH;
  const pts=data.map(d=>`${xS(d.loss)},${yS(d.pct)}`).join(' ');
  const p90y=yS(10);
  const tks=data.filter((_,i)=>i%Math.ceil(data.length/4)===0);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      <g transform={`translate(${pad.l},${pad.t})`}>
        {[0,25,50,75,100].map(t=>(
          <line key={t} x1={0} x2={iW} y1={yS(t)} y2={yS(t)} stroke={C.bdr} strokeDasharray="2 4"/>
        ))}
        <polyline points={pts} fill="none" stroke={C.grn} strokeWidth={1.8}/>
        <line x1={0} x2={iW} y1={p90y} y2={p90y}
          stroke={C.red} strokeDasharray="4 3" strokeWidth={1.2}/>
        <text x={iW+2} y={p90y+3} fontSize={8} fill={C.red}>P90</text>
        {tks.map((d,i)=>(
          <text key={i} x={xS(d.loss)} y={iH+14} textAnchor="middle"
            fontSize={7.5} fill={C.fnt}>{usd(d.loss)}</text>
        ))}
        {[0,50,100].map(t=>(
          <text key={t} x={-4} y={yS(t)+3} textAnchor="end"
            fontSize={7.5} fill={C.fnt}>{t}%</text>
        ))}
        <line x1={0} x2={iW} y1={iH} y2={iH} stroke={C.bdr}/>
        <line x1={0} x2={0} y1={0} y2={iH} stroke={C.bdr}/>
      </g>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════
   FAIR DIAGRAM ENGINE — multi-level estimation
   Each node: direct estimate OR derived from children
═══════════════════════════════════════════════════ */

/* Compute display values from nodes */
function computeVals(nodes){
  const pm=(lo,ml,hi)=>(lo+4*ml+hi)/6;
  /* leaf means */
  const cf_m =pm(nodes.cf.lo, nodes.cf.ml, nodes.cf.hi);
  const poa_m=Math.min(1,Math.max(0,pm(nodes.poa.lo,nodes.poa.ml,nodes.poa.hi)));
  const tc_m =pm(nodes.tcap.lo,nodes.tcap.ml,nodes.tcap.hi);
  const rs_m =pm(nodes.rs.lo,  nodes.rs.ml,  nodes.rs.hi);
  const pl_m =pm(nodes.pl.lo,  nodes.pl.ml,  nodes.pl.hi);
  const slef_m=Math.min(1,Math.max(0,pm(nodes.slef.lo,nodes.slef.ml,nodes.slef.hi)));
  const slm_m=pm(nodes.slm.lo, nodes.slm.ml, nodes.slm.hi);
  /* TEF */
  const tef_direct=nodes.tef.mode==='direct';
  const tef_m=tef_direct?pm(nodes.tef.lo,nodes.tef.ml,nodes.tef.hi):cf_m*poa_m;
  /* Vul (use quick sample for derived, direct uses ml) */
  const vul_direct=nodes.vul.mode==='direct';
  const vul_ml=vul_direct?Math.min(1,Math.max(0,pm(nodes.vul.lo,nodes.vul.ml,nodes.vul.hi))):null;
  /* LEF */
  const lef_direct=nodes.lef.mode==='direct';
  const lef_ml=lef_direct?pm(nodes.lef.lo,nodes.lef.ml,nodes.lef.hi):null;
  /* LM */
  const lm_direct=nodes.lm.mode==='direct';
  const lm_m=lm_direct?pm(nodes.lm.lo,nodes.lm.ml,nodes.lm.hi):(pl_m+slef_m*slm_m);
  return{cf_m,poa_m,tc_m,rs_m,pl_m,slef_m,slm_m,tef_m,vul_ml,lef_ml,lm_m};
}

function FairDiagram({nodes,setNodes}){
  const[active,setActive]=useState(null);
  const[panelPos,setPanelPos]=useState({left:0,top:0});
  const svgRef=useRef(null);

  /* quick vul% via mini-MC (only when derived) */
  const vul_pct=useMemo(()=>{
    if(nodes.lef.mode==='direct')return null;
    if(nodes.vul.mode==='direct'){
      const pm=(lo,ml,hi)=>(lo+4*ml+hi)/6;
      return Math.round(Math.min(1,Math.max(0,pm(nodes.vul.lo,nodes.vul.ml,nodes.vul.hi)))*100);
    }
    let h=0;
    for(let i=0;i<400;i++){
      if(pertRv(nodes.tcap.lo,nodes.tcap.ml,nodes.tcap.hi)>
         pertRv(nodes.rs.lo,nodes.rs.ml,nodes.rs.hi))h++;
    }
    return Math.round(h/400*100);
  },[nodes.lef.mode,nodes.vul.mode,
     nodes.vul.lo,nodes.vul.ml,nodes.vul.hi,
     nodes.tcap.lo,nodes.tcap.ml,nodes.tcap.hi,
     nodes.rs.lo,nodes.rs.ml,nodes.rs.hi]);

  const v=useMemo(()=>computeVals(nodes),[
    nodes.cf.lo,nodes.cf.ml,nodes.cf.hi,
    nodes.poa.lo,nodes.poa.ml,nodes.poa.hi,
    nodes.tcap.lo,nodes.tcap.ml,nodes.tcap.hi,
    nodes.rs.lo,nodes.rs.ml,nodes.rs.hi,
    nodes.pl.lo,nodes.pl.ml,nodes.pl.hi,
    nodes.slef.lo,nodes.slef.ml,nodes.slef.hi,
    nodes.slm.lo,nodes.slm.ml,nodes.slm.hi,
    nodes.tef.lo,nodes.tef.ml,nodes.tef.hi,nodes.tef.mode,
    nodes.vul.lo,nodes.vul.ml,nodes.vul.hi,nodes.vul.mode,
    nodes.lef.lo,nodes.lef.ml,nodes.lef.hi,nodes.lef.mode,
    nodes.lm.lo,nodes.lm.ml,nodes.lm.hi,nodes.lm.mode,
  ]);

  /* derived lef estimate */
  const lef_derived=nodes.lef.mode==='derived'?(v.tef_m*(vul_pct||0)/100):null;
  const lef_show=nodes.lef.mode==='direct'?v.lef_ml:lef_derived;
  const al_e=(lef_show||0)*v.lm_m;

  const pm=(lo,ml,hi)=>(lo+4*ml+hi)/6;

  /* ── SVG layout: box nodes, cx/cy = center, w/h = box size ── */
  /* ── Canvas: wider + taller to fit full English names ── */
  /*
   * VW/VH: canvas — NP boxes sized to 12px font
   * Centers derived from children-up:
   *   CF(55)PoA(156)TCap(260)RS(361) | SLEF(750)SLM(920)
   *   TEF=106 Vul=311 PL=660 SL=835
   *   LEF=209 LM=748  Risk=479
   */
  const VW=1000,VH=500;
  const NP={
    risk:[479, 46, 28, 18],
    lef: [209,138, 44, 20],  lm:  [748,138, 44, 20],
    tef: [106,240, 50, 20],  vul: [311,240, 54, 20],
    pl:  [660,240, 44, 20],  sl:  [835,240, 40, 20],
    cf:  [ 55,358, 42, 18],  poa: [156,358, 46, 18],
    tcap:[260,358, 44, 18],  rs:  [361,358, 44, 18],
    slef:[750,358, 60, 18],  slm: [920,358, 42, 18],
  };
  const elbowPath=(a,b)=>{
    const[ax,ay,,ah]=NP[a],[bx,by,,bh]=NP[b];
    const mid=(ay+ah+by-bh)/2;
    return `M${ax},${ay+ah} L${ax},${mid} L${bx},${mid} L${bx},${by-bh}`;
  };

  /* NM: English only — no zh field */
  const NM={
    risk:{en1:'Risk',              en2:'',            abbr:'Risk', clr:'#2A2820'},
    lef: {en1:'Loss Event',        en2:'Frequency',   abbr:'LEF',  clr:'#2C5018'},
    lm:  {en1:'Loss',              en2:'Magnitude',   abbr:'LM',   clr:'#A84810'},
    tef: {en1:'Threat Event',      en2:'Frequency',   abbr:'TEF',  clr:'#3A6020'},
    vul: {en1:'Vulnerability',     en2:'',            abbr:'Vul',  clr:'#3A6020'},
    pl:  {en1:'Primary',           en2:'Loss',        abbr:'PL',   clr:'#B65018'},
    sl:  {en1:'Secondary',         en2:'Loss',        abbr:'SL',   clr:'#B65018'},
    cf:  {en1:'Contact',           en2:'Frequency',   abbr:'CF',   clr:'#4E7828'},
    poa: {en1:'Probability',       en2:'of Action',   abbr:'PoA',  clr:'#4E7828'},
    tcap:{en1:'Threat',            en2:'Capability',  abbr:'TCap', clr:'#4E7828'},
    rs:  {en1:'Resistance',        en2:'Strength',    abbr:'RS',   clr:'#4E7828'},
    slef:{en1:'Sec. Loss Event',   en2:'Frequency',   abbr:'SLEF', clr:'#C47828'},
    slm: {en1:'Sec. Loss',         en2:'Magnitude',   abbr:'SLM',  clr:'#C47828'},
  }
  const NVALS={
    risk: usd(al_e),
    lef:  nodes.lef.mode==='direct'?pm(nodes.lef.lo,nodes.lef.ml,nodes.lef.hi).toFixed(3)+'/yr'
          :(lef_derived||0).toFixed(3)+'/yr',
    lm:   usd(v.lm_m),
    tef:  nodes.lef.mode==='direct'?'—'
          :(nodes.tef.mode==='direct'?pm(nodes.tef.lo,nodes.tef.ml,nodes.tef.hi).toFixed(2)+'/yr'
            :v.tef_m.toFixed(2)+'/yr'),
    vul:  nodes.lef.mode==='direct'?'—':(vul_pct!=null?vul_pct+'%':'—'),
    pl:   usd(v.pl_m),
    sl:   usd(v.slef_m*v.slm_m),
    cf:   nodes.lef.mode==='direct'||nodes.tef.mode==='direct'?'—':v.cf_m.toFixed(1)+'/yr',
    poa:  nodes.lef.mode==='direct'||nodes.tef.mode==='direct'?'—':(v.poa_m*100).toFixed(0)+'%',
    tcap: nodes.lef.mode==='direct'||nodes.vul.mode==='direct'?'—':v.tc_m.toFixed(1)+'/10',
    rs:   nodes.lef.mode==='direct'||nodes.vul.mode==='direct'?'—':v.rs_m.toFixed(1)+'/10',
    slef: nodes.lm.mode==='direct'?'—':(v.slef_m*100).toFixed(0)+'%',
    slm:  nodes.lm.mode==='direct'?'—':usd(v.slm_m),
  };

  const EDGES=[['risk','lef'],['risk','lm'],['lef','tef'],['lef','vul'],
    ['lm','pl'],['lm','sl'],['tef','cf'],['tef','poa'],
    ['vul','tcap'],['vul','rs'],['sl','slef'],['sl','slm']];
  const GRN=new Set(['lef','tef','vul','cf','poa','tcap','rs']);

  const doClick=(id,e)=>{
    e.stopPropagation();
    if(id==='risk'||id==='sl')return; /* not clickable */
    if(active===id){setActive(null);return;}
    const el=svgRef.current;if(!el)return;
    const r=el.getBoundingClientRect();
    const[nx,ny,hw,hh]=NP[id];
    const sx=r.width/VW,sy=r.height/VH;
    const PW=268;
    let px=(nx-PW/2)*sx;
    let py=(ny+hh+12)*sy;
    px=Math.max(4,Math.min(px,r.width-PW-4));
    if(py+260>r.height)py=Math.max(4,(ny-hh-272)*sy);
    setPanelPos({left:px,top:py});
    setActive(id);
  };

  const updNode=(k,f,val)=>{
    setNodes(n=>({...n,[k]:{...n[k],[f]:parseFloat(val)||0}}));
  };
  const setMode=(k,m)=>{
    setNodes(n=>({...n,[k]:{...n[k],mode:m}}));
    /* clear active to force re-open with new mode UI */
    setActive(null);
    setTimeout(()=>setActive(k),10);
  };

  const an=active?NM[active]:null;
  const eff=active?nodeEffective(active,nodes):null;
  const isSwitchable=active?SWITCHABLE.has(active):false;
  const activeMode=active&&nodes[active]?nodes[active].mode:null;
  const vulSt=v.tc_m>v.rs_m+0.5?'attacker':v.rs_m>v.tc_m+0.5?'defender':'balanced';

  /* Node ring color based on effective mode */
  const nodeRingClr=(id)=>{
    const ef=nodeEffective(id,nodes);
    if(ef==='info')return '#C8C4BC';
    if(SWITCHABLE.has(id)&&nodes[id]&&nodes[id].mode==='direct')return NM[id].clr;
    return NM[id].clr;
  };

  return(
    <div onClick={()=>setActive(null)}>
      {/* Mode legend */}
      <div style={{display:'flex',gap:14,marginBottom:8,alignItems:'center',
        fontSize:10.5,fontFamily:'Inter,sans-serif',color:C.sub}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:C.grn}}/>
          <span>直接估計（Direct）</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'white',
            border:`2px solid ${C.grn}`}}/>
          <span>分解估計（Derived）</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#E0DDD6'}}/>
          <span>資訊參考（由父節點直接估計）</span>
        </div>
        <span style={{marginLeft:'auto',color:C.fnt,fontSize:10}}>
          ✦ 點擊可切換直接 / 分解估計模式
        </span>
      </div>

      <div style={{position:'relative',background:'#F0EDE6',borderRadius:8,
        border:`1px solid ${C.bdr}`,marginBottom:10}}>
        <svg ref={svgRef} width="100%" viewBox={`0 0 ${VW} ${VH}`} style={{display:'block'}}>
          <defs>
            <pattern id="fpg2" width="36" height="36" patternUnits="userSpaceOnUse">
              <path d="M36 0L0 0 0 36" fill="none" stroke="#E6E2DA" strokeWidth="0.5"/>
            </pattern>
            <radialGradient id="fbg1b" cx="24%" cy="60%" r="44%">
              <stop offset="0%" stopColor="#507030" stopOpacity="0.06"/>
              <stop offset="100%" stopColor="#507030" stopOpacity="0"/>
            </radialGradient>
            <radialGradient id="fbg2b" cx="76%" cy="60%" r="44%">
              <stop offset="0%" stopColor="#C07020" stopOpacity="0.06"/>
              <stop offset="100%" stopColor="#C07020" stopOpacity="0"/>
            </radialGradient>
          </defs>
          <rect width={VW} height={VH} fill="url(#fpg2)"/>
          <rect width={VW} height={VH} fill="url(#fbg1b)"/>
          <rect width={VW} height={VH} fill="url(#fbg2b)"/>
          {[46,68,92].map((r,i)=>(
            <circle key={r} cx={479} cy={46} r={r} fill="none" stroke="#D4D0C8"
              strokeWidth="0.5" strokeDasharray={i===0?"4 6":"2 10"} opacity="0.38"/>
          ))}
          <line x1={479} y1={66} x2={479} y2={492}
            stroke="#CCCAC0" strokeWidth="0.5" strokeDasharray="3 8" opacity="0.35"/>
          <text x={210} y={112} textAnchor="middle" fontSize="8" fill="#2C5018"
            fontWeight="700" letterSpacing="0.14em" fontFamily="monospace" opacity="0.6">FREQUENCY</text>
          <text x={748} y={112} textAnchor="middle" fontSize="8" fill="#A84810"
            fontWeight="700" letterSpacing="0.14em" fontFamily="monospace" opacity="0.6">LOSS</text>

          {/* Orthogonal elbow edges */}
          {EDGES.map(([a,b])=>{
            const ef=nodeEffective(b,nodes);
            const grn=GRN.has(b)||(a==='risk'&&b==='lef');
            const dimmed=ef==='info';
            return <path key={a+b} d={elbowPath(a,b)} fill="none"
              stroke={dimmed?'rgba(180,176,170,0.3)'
                :grn?'rgba(44,80,24,0.4)':'rgba(168,72,16,0.4)'}
              strokeWidth={dimmed?1:1.5}
              strokeDasharray={dimmed?"5 4":"none"}/>;
          })}

          {/* Vul comparison bar */}
          {nodes.lef.mode==='derived'&&nodes.vul.mode==='derived'&&(
            <g>
              <rect x={255} y={276} width={112} height={6} rx={3}
                fill="#E8E4DC" stroke="#D0CCC4" strokeWidth="0.5"/>
              <rect x={256} y={277}
                width={Math.min(110,v.tc_m/10*110)} height={4} rx={2}
                fill="rgba(175,48,30,0.55)"/>
              <rect x={256} y={277}
                width={Math.min(110,v.rs_m/10*110)} height={4} rx={2}
                fill="rgba(48,84,26,0.5)"/>
              <text x={311} y={293} textAnchor="middle" fontSize="8"
                fill="#686460" fontFamily="monospace">
                {`Vul≈${vul_pct}% ${vulSt==='attacker'?'⚠攻>守':vulSt==='defender'?'✓守>攻':'⚡均衡'}`}
              </text>
            </g>
          )}

          {/* Rectangular box nodes — two-line English label */}
          {Object.entries(NM).map(([id,nm])=>{
            const[nx,ny,hw,hh]=NP[id];
            const isAct=active===id;
            const ef=nodeEffective(id,nodes);
            const isDirect=ef==='direct'||(nodes[id]&&nodes[id].mode==='direct'&&ef!=='info');
            const isInfo=ef==='info';
            const isSw=SWITCHABLE.has(id);
            const clk=id!=='risk'&&id!=='sl';
            const clr=isInfo?'#C8C4BC':nm.clr;
            const hasTwoLines=nm.en2&&nm.en2!=='';
            /* 12px font, no Chinese, centered in box */
            const en1Y=hasTwoLines?ny-4:ny+4;
            const en2Y=ny+10;
            const enFs=12;
            return(
              <g key={id} onClick={e=>clk&&doClick(id,e)}
                style={{cursor:clk?'pointer':'default'}}>
                {/* Active highlight */}
                {isAct&&<rect x={nx-hw-4} y={ny-hh-4}
                  width={(hw+4)*2} height={(hh+4)*2} rx={6}
                  fill={clr} fillOpacity="0.1"
                  stroke={clr} strokeOpacity="0.45" strokeWidth="1.5"/>}
                {/* Derived switchable dashed outline */}
                {isSw&&!isDirect&&!isInfo&&!isAct&&<rect x={nx-hw} y={ny-hh}
                  width={hw*2} height={hh*2} rx={4} fill="none"
                  stroke={clr} strokeWidth="1.2"
                  strokeDasharray="4 3" opacity="0.5"/>}
                {/* Box */}
                <rect x={nx-hw} y={ny-hh} width={hw*2} height={hh*2} rx={4}
                  fill={isDirect&&!isInfo?clr:'white'}
                  stroke={isInfo?'#D0CCC4':clr}
                  strokeWidth={isInfo?0.8:1.5}
                  opacity={isInfo?0.55:1}/>
                {/* English line 1 */}
                <text x={nx} y={en1Y} textAnchor="middle"
                  fontSize={enFs} fontWeight="700"
                  fontFamily="Inter,sans-serif"
                  fill={isDirect&&!isInfo?'white':(isInfo?'#C0BCB6':clr)}
                  opacity={isInfo?0.65:1}>{nm.en1}</text>
                {/* English line 2 (if exists) */}
                {hasTwoLines&&(
                  <text x={nx} y={en2Y} textAnchor="middle"
                    fontSize={enFs} fontWeight="700"
                    fontFamily="Inter,sans-serif"
                    fill={isDirect&&!isInfo?'white':(isInfo?'#C0BCB6':clr)}
                    opacity={isInfo?0.65:1}>{nm.en2}</text>
                )}
                {/* Chinese name removed — English only */}
                {/* Computed value below box */}
                <text x={nx} y={ny+hh+13} textAnchor="middle"
                  fontSize="9.5" fontWeight="500"
                  fill={isInfo?'#C8C4BC':clr}
                  opacity={isInfo?0.5:1}>{NVALS[id]}</text>
                {/* D badge for direct-mode switchable */}
                {isSw&&isDirect&&!isInfo&&(
                  <g>
                    <circle cx={nx+hw-1} cy={ny-hh+1} r={5.5}
                      fill={clr} stroke="white" strokeWidth="1"/>
                    <text x={nx+hw-1} y={ny-hh+3.8} textAnchor="middle"
                      fontSize="5.5" fill="white" fontWeight="700">D</text>
                  </g>
                )}
                {/* Edit dot for leaf direct nodes */}
                {!isSw&&isDirect&&!isInfo&&!isAct&&(
                  <circle cx={nx+hw-2} cy={ny-hh+2} r={2.5}
                    fill="white" fillOpacity="0.9"/>
                )}
              </g>
            );
          })}
        </svg>

        {/* ── Floating Panel ── */}
        {active&&an&&(
          <div onClick={e=>e.stopPropagation()} style={{
            position:'absolute',left:panelPos.left,top:panelPos.top,
            width:268,background:'white',
            border:`1.5px solid ${nodeRingClr(active)}55`,
            borderRadius:10,padding:'14px 16px',
            boxShadow:'0 8px 32px rgba(0,0,0,0.13)',zIndex:30}}>

            {/* Header */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>
                <div style={{fontSize:12.5,fontWeight:600,color:an.clr}}>{an.zh}</div>
                <div style={{fontSize:9,color:C.fnt,marginTop:1,fontFamily:'Inter,sans-serif'}}>
                  {an.en1}{an.en2?' '+an.en2:''} · {eff==='info'?'資訊參考':'可輸入'}
                </div>
              </div>
              <button onClick={()=>setActive(null)} style={{
                background:'none',border:'none',cursor:'pointer',
                fontSize:17,color:C.fnt,padding:0,lineHeight:1,marginLeft:6}}>×</button>
            </div>

            {/* Info-mode locked message */}
            {eff==='info'&&(
              <div style={{padding:'10px 12px',background:'#F6F4EF',borderRadius:6,
                fontSize:11.5,color:C.sub,lineHeight:1.6,fontFamily:'Inter,sans-serif',
                borderLeft:`3px solid #C8C4BC`}}>
                父節點已設為直接估計，此節點不參與計算。
                <br/>若需啟用，請將父節點切換為「分解估計」。
              </div>
            )}

            {/* Mode switch for switchable nodes */}
            {isSwitchable&&eff!=='info'&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,fontWeight:600,color:C.fnt,letterSpacing:'0.1em',
                  textTransform:'uppercase',marginBottom:6,fontFamily:'Inter,sans-serif'}}>
                  估計模式
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                  {[['direct','直接估計','Direct'],['derived','分解估計','Derived']].map(([m,zh,en])=>(
                    <div key={m} onClick={()=>setMode(active,m)}
                      style={{padding:'8px 10px',borderRadius:5,cursor:'pointer',
                        border:`2px solid ${activeMode===m?an.clr:C.bdr}`,
                        background:activeMode===m?an.clr+'14':'white',
                        transition:'all .12s'}}>
                      <div style={{fontSize:11.5,fontWeight:600,
                        color:activeMode===m?an.clr:C.txt,fontFamily:'Inter,sans-serif'}}>{zh}</div>
                      <div style={{fontSize:9.5,color:C.fnt,fontFamily:'Inter,sans-serif'}}>{en}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Direct mode: 3-point input */}
            {eff!=='info'&&activeMode==='direct'&&nodes[active]&&(()=>{
              const t=TERMS[active];
              const isUSD=t?t.unit==='USD':false;
              const isProb=t&&t.unit?t.unit.includes('0–'):false;
              const step=isUSD?5000:isProb?0.01:0.5;
              const nd=nodes[active];
              return(
                <div>
                  {t&&<div style={{fontSize:11,color:C.sub,marginBottom:8,lineHeight:1.55,
                    fontFamily:'Inter,sans-serif'}}>{t.desc}</div>}
                  {t&&<div style={{fontSize:9.5,color:C.fnt,marginBottom:8,
                    fontFamily:'Inter,sans-serif'}}>單位：{t.unit}</div>}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                    {[['lo','最低'],['ml','最可能'],['hi','最高']].map(([f,lbl])=>{
                      const isML=f==='ml';
                      return(
                        <div key={f}>
                          <div style={{fontSize:9,color:isML?an.clr:C.fnt,marginBottom:3,
                            textAlign:'center',fontWeight:isML?600:400,

                            letterSpacing:'0.05em'}}>{lbl}</div>
                          <input type="number" value={nd[f]} step={step}
                            onChange={e=>updNode(active,f,e.target.value)}
                            style={{width:'100%',padding:'6px 4px',textAlign:'center',
                              border:`1.5px solid ${isML?an.clr+'55':C.bdr}`,borderRadius:5,
                              fontSize:12,fontFamily:'Inter,sans-serif',color:C.txt,
                              background:isML?`${an.clr}0A`:'#FAFAF7'}}/>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{marginTop:9,display:'flex',justifyContent:'space-between',
                    alignItems:'center',padding:'7px 10px',
                    background:`${an.clr}0D`,borderRadius:5}}>
                    <span style={{fontSize:9.5,color:C.sub,fontFamily:'Inter,sans-serif'}}>
                      最可能值
                    </span>
                    <strong style={{fontSize:13,color:an.clr}}>{NVALS[active]}</strong>
                  </div>
                </div>
              );
            })()}

            {/* Derived mode: show formula + children active */}
            {eff!=='info'&&activeMode==='derived'&&(()=>{
              const formulaMap={
                lef:'LEF = TEF × 脆弱性',
                tef:'TEF = CF × PoA',
                vul:'Vul = P(TCap > RS)',
                lm: 'LM = PL + SLEF × SLM',
              };
              return(
                <div>
                  <div style={{padding:'10px 12px',background:C.grnL,
                    borderRadius:6,marginBottom:10,
                    borderLeft:`3px solid ${an.clr}`}}>
                    <div style={{fontSize:9.5,color:C.sub,marginBottom:4,
                      fontFamily:'Inter,sans-serif',fontWeight:600,
                      letterSpacing:'0.08em',textTransform:'uppercase'}}>計算公式</div>
                    <div style={{fontSize:12,color:an.clr,fontFamily:'monospace',
                      fontWeight:600}}>{formulaMap[active]||'由子節點計算'}</div>
                  </div>
                  {/* Vul special: show comparison */}
                  {active==='vul'&&nodes.lef.mode==='derived'&&(
                    <div>
                      {[['TCap','#B03020',v.tc_m],['RS','#305820',v.rs_m]].map(([l,c,val])=>(
                        <div key={l} style={{display:'flex',gap:7,alignItems:'center',marginBottom:5}}>
                          <span style={{fontSize:10,color:c,minWidth:30,fontWeight:600,fontFamily:'monospace'}}>{l}</span>
                          <div style={{flex:1,background:'#EEE',borderRadius:3,height:6}}>
                            <div style={{width:`${Math.min(100,val/10*100)}%`,height:6,background:c,borderRadius:3}}/>
                          </div>
                          <span style={{fontSize:10,color:c}}>{val.toFixed(1)}</span>
                        </div>
                      ))}
                      <div style={{fontSize:11,fontWeight:600,color:
                        vulSt==='attacker'?'#B03020':vulSt==='defender'?'#305820':'#9E6818',
                        fontFamily:'Inter,sans-serif',marginTop:4}}>
                        {vulSt==='attacker'?'⚠ 攻擊方較強':vulSt==='defender'?'✓ 防禦方較強':'⚡ 攻防相當'}
                      </div>
                    </div>
                  )}
                  <div style={{padding:'10px 12px',background:`${an.clr}0D`,
                    borderRadius:6,textAlign:'center',marginTop:6}}>
                    <div style={{fontSize:9.5,color:C.sub,fontFamily:'Inter,sans-serif',marginBottom:2}}>
                      目前估算值
                    </div>
                    <div style={{fontSize:18,fontWeight:700,color:an.clr}}>{NVALS[active]}</div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </div>

      {/* Formula bar */}
      <div style={{background:'#E8E5DE',borderRadius:5,padding:'7px 12px',
        display:'flex',alignItems:'center',flexWrap:'wrap',gap:8,fontSize:11}}>
        <span style={{color:C.fnt,fontSize:9.5,fontFamily:'Inter,sans-serif',flexShrink:0}}>即時估算</span>
        {nodes.lef.mode==='direct'?(
          <span style={{color:'#2C5018',fontFamily:'Inter,sans-serif',fontWeight:500}}>
            LEF=<strong>{NVALS.lef}</strong>
            <span style={{fontSize:9,color:C.fnt}}> (直接)</span>
          </span>
        ):(
          <span style={{color:'#2C5018',fontFamily:'Inter,sans-serif',fontWeight:500}}>
            LEF={NVALS.tef}×{vul_pct}%=<strong>{NVALS.lef}</strong>
          </span>
        )}
        <span style={{color:C.bdr}}>·</span>
        {nodes.lm.mode==='direct'?(
          <span style={{color:'#A84810',fontFamily:'Inter,sans-serif',fontWeight:500}}>
            LM=<strong>{usd(v.lm_m)}</strong>
            <span style={{fontSize:9,color:C.fnt}}> (直接)</span>
          </span>
        ):(
          <span style={{color:'#A84810',fontFamily:'Inter,sans-serif',fontWeight:500}}>
            LM={usd(v.pl_m)}+{(v.slef_m*100).toFixed(0)}%×{usd(v.slm_m)}=<strong>{usd(v.lm_m)}</strong>
          </span>
        )}
        <span style={{color:C.bdr}}>·</span>
        <strong style={{color:C.txt,fontFamily:'Inter,sans-serif'}}>年損失≈{usd(al_e)}</strong>
        <span style={{marginLeft:'auto',display:'flex',gap:10,fontSize:9.5,
          color:C.fnt,fontFamily:'Inter,sans-serif',flexShrink:0,alignItems:'center'}}>
          <span><span style={{fontWeight:700,color:C.grn}}>●</span> Direct</span>
          <span><span style={{fontWeight:700,color:'white',
            textShadow:`0 0 0 1px ${C.grn}`}}>○</span> Derived</span>
          <span><span style={{fontWeight:700,color:'#C8C4BC'}}>●</span> Info</span>
        </span>
      </div>
    </div>
  );
}

/* ScenarioField: dropdown + custom text input combo */
function ScenarioField({label,fieldKey,value,opts,onChange}){
  const isCustom=value!==''&&!opts.includes(value);
  const[showCustom,setShowCustom]=useState(isCustom);
  const handleSelect=e=>{
    if(e.target.value==='__custom__'){
      setShowCustom(true);
      onChange('');
    } else {
      setShowCustom(false);
      onChange(e.target.value);
    }
  };
  const selectVal=showCustom?'__custom__':value;
  return(
    <div>
      <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>{label}</div>
      <select value={selectVal} onChange={handleSelect} style={{
        width:'100%',padding:'8px 10px',border:`1px solid ${C.bdr}`,
        borderRadius:3,fontSize:13,fontFamily:'Inter,sans-serif',
        color:selectVal?C.txt:C.fnt,background:C.surf,
        cursor:'pointer',appearance:'auto',
        marginBottom:showCustom?6:0}}>
        <option value="">— 請選擇 —</option>
        {opts.map(o=><option key={o} value={o}>{o}</option>)}
        <option value="__custom__">✏ 自行輸入…</option>
      </select>
      {showCustom&&(
        <div style={{position:'relative'}}>
          <input
            autoFocus
            type="text"
            value={value}
            onChange={e=>onChange(e.target.value)}
            placeholder={`輸入自訂${label.replace(' *','')}…`}
            style={{width:'100%',padding:'8px 32px 8px 10px',
              border:`1.5px solid ${C.grn}`,borderRadius:3,
              fontSize:13,fontFamily:'Inter,sans-serif',
              color:C.txt,background:C.grnL}}
          />
          <button
            onClick={()=>{setShowCustom(false);onChange('');}}
            style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
              background:'none',border:'none',cursor:'pointer',
              fontSize:14,color:C.fnt,lineHeight:1,padding:0}}>×</button>
        </div>
      )}
    </div>
  );
}

    const name=form.name.trim()||`${form.actor} → ${form.asset}`;

            <div style={{fontSize:17,fontWeight:500,color:C.txt,fontFamily:'Inter,sans-serif'}}>新增風險</div>

        {/* Risk name */}

/* ═══════════════════════════════════════════════════
   RISK REGISTER (main view)
═══════════════════════════════════════════════════ */
function RiskRegister({risks,onOpen,onAdd}){
  const[filterStatus,setFilterStatus]=useState('');
  const[filterPri,setFilterPri]=useState('');
  const[filterOwner,setFilterOwner]=useState('');
  const[search,setSearch]=useState('');

  const filtered=useMemo(()=>risks.filter(r=>{
    if(filterStatus&&r.status!==filterStatus)return false;
    if(filterPri&&r.priority!==filterPri)return false;
    if(filterOwner&&r.owner!==filterOwner)return false;
    if(search&&!r.name.toLowerCase().includes(search.toLowerCase())
      &&!(r.scenario.asset||'').toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[risks,filterStatus,filterPri,filterOwner,search]);

  const owners=[...new Set(risks.map(r=>r.owner).filter(Boolean))];

  /* Summary stats */
  const total=risks.length;
  const critCount=risks.filter(r=>r.priority==='critical').length;
  const treatCount=risks.filter(r=>r.status==='in_treatment').length;
  const overdueCount=risks.filter(r=>
    r.treatment.dueDate&&isOverdue(r.treatment.dueDate)&&
    r.treatment.treatStatus!=='completed').length;

  const EAL=r=>r.fairResult?usd(r.fairResult.mean):'—';
  const P90=r=>r.fairResult?usd(r.fairResult.p90):'—';

  return(
    <div>
      {/* Summary bar */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}}>
        {[
          {n:total,     label:'風險總數',  sub:'登記中',    color:C.txt},
          {n:critCount, label:'緊急風險',  sub:'需立即處理', color:C.red},
          {n:treatCount,label:'處理進行中', sub:'待完成',    color:C.grn},
          {n:overdueCount,label:'逾期應對',sub:'請確認狀態', color:overdueCount>0?C.red:C.fnt},
        ].map((s,i)=>(
          <div key={i} style={{background:C.surf,border:`1px solid ${C.bdr}`,
            borderRadius:4,padding:'14px 16px',
            borderLeft:`3px solid ${s.color}`}}>
            <div style={{fontSize:26,fontWeight:600,color:s.n>0&&i>0?s.color:C.txt,
              fontFamily:'Inter,sans-serif',letterSpacing:'-0.02em',lineHeight:1}}>{s.n}</div>
            <div style={{fontSize:12,color:C.txt,fontFamily:'Inter,sans-serif',
              fontWeight:500,marginTop:4}}>{s.label}</div>
            <div style={{fontSize:10.5,color:C.sub,fontFamily:'Inter,sans-serif',marginTop:1}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Filter bar */}
      <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="搜尋風險名稱或資產…"
          style={{padding:'7px 11px',border:`1px solid ${C.bdr}`,borderRadius:3,
            fontSize:12.5,fontFamily:'Inter,sans-serif',color:C.txt,
            background:C.surf,width:200}}/>
        <TSelect value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} sm
          options={Object.entries(STATUS_CFG).map(([v,s])=>({v,l:s.label}))}
          placeholder="所有狀態"/>
        <TSelect value={filterPri} onChange={e=>setFilterPri(e.target.value)} sm
          options={Object.entries(PRI_CFG).map(([v,p])=>({v,l:p.label}))}
          placeholder="所有優先等級"/>
        {owners.length>0&&(
          <TSelect value={filterOwner} onChange={e=>setFilterOwner(e.target.value)} sm
            options={owners.map(o=>({v:o,l:o}))} placeholder="所有負責人"/>
        )}
        {(filterStatus||filterPri||filterOwner||search)&&(
          <Btn ch="清除篩選" onClick={()=>{setFilterStatus('');setFilterPri('');setFilterOwner('');setSearch('');}}
            v="ghost" sm/>
        )}
        <div style={{flex:1}}/>
        <Btn ch="+ 新增風險" onClick={onAdd} v="primary"/>
      </div>

      {/* Risk table */}
      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'52px 20px',color:C.fnt,
          fontFamily:'Inter,sans-serif',background:C.surf,borderRadius:4,
          border:`1px solid ${C.bdr}`}}>
          {risks.length===0?'尚未登記任何風險。點擊「+ 新增風險」開始。':'沒有符合條件的風險。'}
        </div>
      ):(
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,overflow:'hidden'}}>
          {/* Table header */}
          <div style={{display:'grid',
            gridTemplateColumns:'2fr 1.4fr 1fr 1fr 1fr 1fr 0.9fr 0.8fr',
            padding:'8px 16px',background:'#F6F4EF',
            borderBottom:`1px solid ${C.bdr}`,
            fontSize:10.5,fontWeight:600,color:C.fnt,
            letterSpacing:'0.08em',textTransform:'uppercase',
            fontFamily:'Inter,sans-serif'}}>
            {['風險名稱','場景','優先等級','狀態','EAL (均值)','P90 損失','負責人','操作'].map(h=>(
              <div key={h}>{h}</div>
            ))}
          </div>
          {/* Table rows */}
          {filtered.map((r,i)=>{
            const overdue=r.treatment.dueDate&&isOverdue(r.treatment.dueDate)&&
              r.treatment.treatStatus!=='completed';
            return(
              <div key={r.id} style={{
                display:'grid',
                gridTemplateColumns:'2fr 1.4fr 1fr 1fr 1fr 1fr 0.9fr 0.8fr',
                padding:'12px 16px',
                borderBottom:i<filtered.length-1?`1px solid ${C.bdr}`:'none',
                alignItems:'start',
                background:overdue?'#FFF8F6':i%2===0?C.surf:'#FAFAF8',
                transition:'background .1s',
              }}
              onMouseEnter={e=>e.currentTarget.style.background='#F5F2EC'}
              onMouseLeave={e=>e.currentTarget.style.background=overdue?'#FFF8F6':i%2===0?C.surf:'#FAFAF8'}>
                {/* Name */}
                <div style={{paddingRight:8}}>
                  <div style={{fontSize:13,fontWeight:500,color:C.txt,
                    fontFamily:'Inter,sans-serif',marginBottom:2,
                    lineHeight:1.4,wordBreak:'break-word'}}>{r.name||'(未命名)'}</div>
                  {overdue&&(
                    <div style={{fontSize:10,color:C.red,fontFamily:'Inter,sans-serif',marginTop:2}}>
                      ⚠ 應對逾期
                    </div>
                  )}
                </div>
                {/* Scenario */}
                <div style={{fontSize:11.5,color:C.sub,fontFamily:'Inter,sans-serif',
                  lineHeight:1.4,wordBreak:'break-word',paddingRight:6}}>
                  {[r.scenario.asset,r.scenario.actor].filter(Boolean).join('\n') || '—'}
                </div>
                {/* Priority */}
                <div><PriBadge priority={r.priority} small/></div>
                {/* Status */}
                <div><StatusBadge status={r.status} small/></div>
                {/* EAL */}
                <div style={{fontSize:12.5,fontWeight:500,
                  color:r.fairResult?C.txt:C.fnt,fontFamily:'Inter,sans-serif'}}>
                  {EAL(r)}
                </div>
                {/* P90 */}
                <div style={{fontSize:12.5,color:r.fairResult?C.txt:C.fnt,
                  fontFamily:'Inter,sans-serif'}}>
                  {P90(r)}
                </div>
                {/* Owner */}
                <div style={{fontSize:12,color:C.sub,fontFamily:'Inter,sans-serif',
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {r.owner||'—'}
                </div>
                {/* Action */}
                <div>
                  <Btn ch="開啟 →" onClick={()=>onOpen(r.id)} sm v="outline"/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* Tab: 總覽 */
function TabOverview({risk,onUpdate}){
  const init={
    name:risk.name,owner:risk.owner,priority:risk.priority,
    asset:risk.scenario.asset,actor:risk.scenario.actor,
    event:risk.scenario.event,loss:risk.scenario.loss,
    concern:risk.scenario.concern,assumptions:risk.scenario.assumptions,
  };
  const[ed,setEd]=useState(init);
  const[saved,setSaved]=useState(false);

  const isDirty=useMemo(()=>
    ed.name!==risk.name||ed.owner!==risk.owner||ed.priority!==risk.priority||
    ed.asset!==risk.scenario.asset||ed.actor!==risk.scenario.actor||
    ed.event!==risk.scenario.event||ed.loss!==risk.scenario.loss||
    ed.concern!==risk.scenario.concern||ed.assumptions!==risk.scenario.assumptions
  ,[ed,risk]);

  const updField=(patch)=>{
    setEd(p=>({...p,...patch}));
    setSaved(false);
  };

  const save=()=>{
    const updated={...risk,
      name:ed.name||`${ed.actor} → ${ed.asset}`,
      owner:ed.owner,priority:ed.priority,updatedAt:today(),
      scenario:{...risk.scenario,asset:ed.asset,actor:ed.actor,
        event:ed.event,loss:ed.loss,concern:ed.concern,assumptions:ed.assumptions}};
    onUpdate(updated);
    setSaved(true);
  };

  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div style={{gridColumn:'span 2'}}>
        <SectionLabel>基本資訊</SectionLabel>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:12}}>
          <div>
            <div style={{fontSize:11,color:C.sub,marginBottom:4,fontFamily:'Inter,sans-serif'}}>風險名稱</div>
            <TInput value={ed.name} onChange={e=>updField({name:e.target.value})}
              placeholder="例：電商平台客戶資料外洩風險"/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.sub,marginBottom:4,fontFamily:'Inter,sans-serif'}}>負責人</div>
            <TInput value={ed.owner} onChange={e=>updField({owner:e.target.value})} placeholder="例：CISO"/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.sub,marginBottom:4,fontFamily:'Inter,sans-serif'}}>優先等級</div>
            <TSelect value={ed.priority} onChange={e=>updField({priority:e.target.value})}
              options={Object.entries(PRI_CFG).map(([v,p])=>({v,l:p.label}))}
              placeholder="— 選擇 —"/>
          </div>
        </div>
      </div>
      <div style={{gridColumn:'span 2'}}>
        <SectionLabel>場景定義</SectionLabel>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {[
            {k:'asset',label:'受影響資產',opts:OPTS.assets},
            {k:'actor',label:'威脅來源',  opts:OPTS.actors},
            {k:'event',label:'威脅行為',  opts:OPTS.events},

          </div>
          <div>
            <div style={{fontSize:11,color:C.sub,marginBottom:4,fontFamily:'Inter,sans-serif'}}>分析假設條件</div>
            <TInput value={ed.assumptions} onChange={e=>updField({assumptions:e.target.value})} rows={2}
              placeholder="分析前提與假設說明…"/>
          </div>
        </div>
      </div>
      <div style={{gridColumn:'span 2',display:'flex',justifyContent:'flex-end',
        alignItems:'center',gap:12}}>
        {saved&&!isDirty&&(
          <span style={{fontSize:12,color:C.grn,fontFamily:'Inter,sans-serif',
            display:'flex',alignItems:'center',gap:5}}>
            <span style={{fontSize:15}}>✓</span> 已儲存
          </span>
        )}
        {!isDirty&&!saved&&(
          <span style={{fontSize:12,color:C.fnt,fontFamily:'Inter,sans-serif'}}>
            尚無變更
          </span>
        )}
        <Btn
          ch={saved&&!isDirty?'儲存完成 ✓':'儲存變更'}
          onClick={isDirty?save:undefined}
          disabled={!isDirty}
          v={saved&&!isDirty?'ghost':'grn'}
          style={saved&&!isDirty?{color:C.grn,borderColor:C.grn,background:'transparent',opacity:0.8}:{}}
        />
      </div>
    </div>
  );
}

/* Tab: FAIR 分析 */
function TabFair({risk,onUpdate}){
  /* nodes live in local state; synced to risk on simulate */
  const[nodes,setNodes]=useState(()=>{
    /* migrate old fairParams schema → fairNodes */
    if(risk.fairNodes)return JSON.parse(JSON.stringify(risk.fairNodes));
    const n=cloneNodes(DEF_NODES);
    if(risk.fairParams){
      const p=risk.fairParams;
      ['cf','poa','tcap','rs','pl','slef','slm'].forEach(k=>{
        if(p[k]){n[k].lo=p[k].lo;n[k].ml=p[k].ml;n[k].hi=p[k].hi;}
      });
    }
    return n;
  });
  const[simCount,setSimCount]=useState(10000);
  const[simming,setSimming]=useState(false);
  const runSim=()=>{
    setSimming(true);
    setTimeout(()=>{
      try{
        const result=runMC(nodes,simCount);
        const newStatus=risk.status==='registered'?'analyzed':risk.status;
        onUpdate({...risk,fairNodes:nodes,fairResult:result,
          status:newStatus,updatedAt:today()});
      }finally{setSimming(false);}
    },80);
  };
  const hist=useMemo(()=>risk.fairResult?mkHist(risk.fairResult.raw):null,[risk.fairResult]);
  const exc =useMemo(()=>risk.fairResult?mkExc(risk.fairResult.raw):null,[risk.fairResult]);
  return(
    <div>
      <FairDiagram nodes={nodes} setNodes={setNodes}/>
      <div style={{margin:'12px 0',display:'flex',justifyContent:'flex-end',
        gap:10,alignItems:'center',flexWrap:'wrap'}}>
        {risk.fairResult&&(
          <span style={{fontSize:11.5,color:C.sub,fontFamily:'Inter,sans-serif'}}>
            上次模擬：{fmtDate(risk.updatedAt)}
            {risk.fairResult.N&&(
              <span style={{marginLeft:6,padding:'1px 7px',background:'#F0EDE8',
                borderRadius:2,fontSize:10,color:C.fnt}}>N={risk.fairResult.N.toLocaleString()}</span>
            )}
          </span>
        )}
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11.5,color:C.sub,fontFamily:'Inter,sans-serif',flexShrink:0}}>
            模擬次數
          </span>
          {[10000,50000,100000].map(n=>(
            <button key={n} onClick={()=>setSimCount(n)} style={{
              padding:'5px 10px',borderRadius:3,fontSize:11.5,cursor:'pointer',
              fontFamily:'Inter,sans-serif',fontWeight:500,transition:'all .12s',
              border:`1.5px solid ${simCount===n?C.txt:C.bdr}`,
              background:simCount===n?C.txt:'transparent',
              color:simCount===n?'white':C.sub}}>
              {n===10000?'10K':n===50000?'50K':'100K'}
            </button>
          ))}
        </div>
        <Btn ch={simming?'模擬執行中…':risk.fairResult?'重新執行模擬':'▶ 執行模擬'}
          onClick={runSim} disabled={simming}
          style={{padding:'9px 24px',fontSize:13}}/>
      </div>
      {risk.fairResult&&(
        <div className="fade">

          {/* ── 1. Scenario Summary ── */}
          <div style={{background:'#F6F4EF',border:`1px solid ${C.bdr}`,
            borderRadius:4,padding:'14px 18px',marginBottom:16,
            borderLeft:`3px solid ${C.red}`}}>
            <div style={{fontSize:10,fontWeight:600,color:C.red,letterSpacing:'0.12em',
              textTransform:'uppercase',marginBottom:8,fontFamily:'Inter,sans-serif'}}>
              情境摘要 · Scenario Summary
            </div>
            <p style={{fontSize:13.5,color:C.txt,lineHeight:1.85,fontFamily:'Inter,sans-serif'}}>
              <strong>{risk.scenario.actor||'—'}</strong>
              <span style={{color:C.sub}}> 對 </span>
              <strong>「{risk.scenario.asset||'—'}」</strong>
              <span style={{color:C.sub}}> 發動 </span>
              <strong>{risk.scenario.event||'—'}</strong>
              <span style={{color:C.sub}}> 行為，可能造成 </span>

/* Tab: 評估 */
function TabEvaluation({risk,onUpdate}){
  const[ed,setEd]=useState(()=>({...risk.evaluation}));
  const upd=(k,v)=>setEd(p=>({...p,[k]:v}));
  const save=()=>{
    const newStatus=ed.decision?'evaluated':risk.status;
    onUpdate({...risk,evaluation:{...ed,reviewedAt:today()},
      status:newStatus,updatedAt:today()});
  };
  if(!risk.fairResult){
    return(
      <div style={{textAlign:'center',padding:'40px 20px',color:C.fnt,fontFamily:'Inter,sans-serif'}}>
        請先在「FAIR 分析」標籤執行蒙地卡羅模擬，才能進行風險評估。
      </div>
    );
  }
  const decisions=[
    {v:'accept',  l:'接受 Accept',   desc:'損失在可接受範圍，維持現狀'},
    {v:'treat',   l:'處理 Treat',    desc:'實施控制措施降低風險'},
    {v:'transfer',l:'轉移 Transfer', desc:'透過保險或外包轉移'},
    {v:'avoid',   l:'迴避 Avoid',    desc:'停止相關業務活動'},
  ];
  return(
    <div>
      {/* FAIR 結果摘要（唯讀） */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {[
          ['EAL 均值',usd(risk.fairResult.mean)],
          ['P50',usd(risk.fairResult.p50)],
          ['P90',usd(risk.fairResult.p90)],
          ['損失發生率',risk.fairResult.pLoss+'%'],
        ].map(([k,v])=>(
          <div key={k} style={{background:'#F6F4EF',border:`1px solid ${C.bdr}`,
            borderRadius:4,padding:'10px 14px'}}>
            <div style={{fontSize:10,color:C.fnt,marginBottom:3,fontFamily:'Inter,sans-serif'}}>{k}</div>
            <div style={{fontSize:16,fontWeight:600,color:C.txt,fontFamily:'Inter,sans-serif'}}>{v}</div>
          </div>
        ))}
      </div>

      <SectionLabel>評估決策</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
        {decisions.map(d=>(
          <div key={d.v} onClick={()=>upd('decision',d.v)}
            style={{padding:'12px 14px',borderRadius:4,cursor:'pointer',
              border:`2px solid ${ed.decision===d.v?C.txt:C.bdr}`,
              background:ed.decision===d.v?C.txt:C.surf,transition:'all .12s'}}>
            <div style={{fontSize:13,fontWeight:600,
              color:ed.decision===d.v?'white':C.txt,fontFamily:'Inter,sans-serif',marginBottom:2}}>
              {d.l}
            </div>
            <div style={{fontSize:11.5,
              color:ed.decision===d.v?'rgba(255,255,255,.65)':C.sub,fontFamily:'Inter,sans-serif'}}>
              {d.desc}
            </div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>評估者</div>
          <TInput value={ed.evaluator} onChange={e=>upd('evaluator',e.target.value)} placeholder="例：資訊安全長"/>
        </div>
        <div/>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>評估理由</div>
          <TInput value={ed.rationale} onChange={e=>upd('rationale',e.target.value)} rows={3}
            placeholder="例：P90 損失達 $850K，超出組織可接受門檻 $500K，需採取控制措施"/>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end'}}>
        <Btn ch="儲存評估" onClick={save} v="grn" disabled={!ed.decision}/>
      </div>
    </div>
  );
}

/* Tab: 應對 */
function TabTreatment({risk,onUpdate}){
  const[ed,setEd]=useState(()=>({...risk.treatment}));
  const upd=(k,v)=>setEd(p=>({...p,[k]:v}));
  const save=()=>{
    const newStatus=ed.strategy?'in_treatment':risk.status;
    onUpdate({...risk,treatment:{...ed},status:newStatus,updatedAt:today()});
  };
  const overdue=ed.dueDate&&isOverdue(ed.dueDate)&&ed.treatStatus!=='completed';
  const strategies=[
    {v:'reduce',  l:'降低 Reduce',   c:C.grn},
    {v:'transfer',l:'轉移 Transfer', c:C.blu},
    {v:'accept',  l:'接受 Accept',   c:C.fnt},
    {v:'avoid',   l:'迴避 Avoid',    c:C.red},
  ];
  return(
    <div>
      <SectionLabel>應對策略</SectionLabel>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {strategies.map(s=>(
          <div key={s.v} onClick={()=>upd('strategy',s.v)}
            style={{flex:1,padding:'10px 8px',borderRadius:4,cursor:'pointer',
              textAlign:'center',fontSize:12.5,fontWeight:600,fontFamily:'Inter,sans-serif',
              border:`2px solid ${ed.strategy===s.v?s.c:C.bdr}`,
              background:ed.strategy===s.v?s.c+'14':'white',
              color:ed.strategy===s.v?s.c:C.sub,transition:'all .12s'}}>
            {s.l}
          </div>
        ))}
      </div>

      <SectionLabel>應對計畫</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>控制措施描述</div>
          <TInput value={ed.description} onChange={e=>upd('description',e.target.value)} rows={2}
            placeholder="例：部署 EDR、強化 PAM、實施資料分類與 DLP 策略"/>
        </div>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>具體控制項目</div>
          <TInput value={ed.controls} onChange={e=>upd('controls',e.target.value)} rows={2}
            placeholder="例：全面部署 MFA、網路分段、加密儲存、安全意識培訓"/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>應對負責人</div>
          <TInput value={ed.owner} onChange={e=>upd('owner',e.target.value)} placeholder="例：IT 安全主管"/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>
            目標完成日 {overdue&&<span style={{color:C.red,fontSize:10}}>（已逾期）</span>}
          </div>
          <TInput type="date" value={ed.dueDate} onChange={e=>upd('dueDate',e.target.value)}/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>預估預算</div>
          <TInput value={ed.budget} onChange={e=>upd('budget',e.target.value)} placeholder="例：$120,000"/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>預期殘餘風險</div>
          <TInput value={ed.expectedResidual} onChange={e=>upd('expectedResidual',e.target.value)}
            placeholder="例：措施完成後 EAL 預計降至 $80K"/>
        </div>
      </div>

      <SectionLabel>執行狀態</SectionLabel>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {Object.entries(TREAT_STATUS).map(([v,s])=>(
          <div key={v} onClick={()=>upd('treatStatus',v)}
            style={{flex:1,padding:'8px 6px',borderRadius:4,cursor:'pointer',
              textAlign:'center',fontSize:12,fontWeight:500,fontFamily:'Inter,sans-serif',
              border:`2px solid ${ed.treatStatus===v?s.color:C.bdr}`,
              background:ed.treatStatus===v?s.color+'15':'white',
              color:ed.treatStatus===v?s.color:C.sub,transition:'all .12s'}}>
            {s.label}
          </div>
        ))}
      </div>

      <div style={{display:'flex',justifyContent:'flex-end'}}>
        <Btn ch="儲存應對計畫" onClick={save} v="grn"/>
      </div>
    </div>
  );
}

/* Tab: 監控 */
function TabMonitoring({risk,onUpdate}){
  const[ed,setEd]=useState(()=>({...risk.monitoring}));
  const upd=(k,v)=>setEd(p=>({...p,[k]:v}));
  const save=()=>{
    const newStatus=risk.treatment.treatStatus==='completed'?'monitoring':risk.status;
    onUpdate({...risk,monitoring:{...ed,lastReviewed:today()},
      status:newStatus,updatedAt:today()});
  };
  const closeRisk=()=>{
    if(window.confirm('確定要結案此風險？結案後仍可重新開啟。')){
      onUpdate({...risk,status:'closed',updatedAt:today()});
    }
  };
  const cycles=[
    {v:'monthly',  l:'每月'},
    {v:'quarterly',l:'每季'},
    {v:'biannual', l:'每半年'},
    {v:'annual',   l:'每年'},
  ];
  return(
    <div>
      <SectionLabel>複查設定</SectionLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:C.sub,marginBottom:6,fontFamily:'Inter,sans-serif'}}>複查週期</div>
          <div style={{display:'flex',gap:6}}>
            {cycles.map(c=>(
              <div key={c.v} onClick={()=>upd('reviewCycle',c.v)}
                style={{flex:1,padding:'7px 4px',borderRadius:3,cursor:'pointer',
                  textAlign:'center',fontSize:11.5,fontFamily:'Inter,sans-serif',fontWeight:500,
                  border:`2px solid ${ed.reviewCycle===c.v?C.txt:C.bdr}`,
                  background:ed.reviewCycle===c.v?C.txt:'white',
                  color:ed.reviewCycle===c.v?'white':C.sub,transition:'all .12s'}}>
                {c.l}
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>下次複查日</div>
          <TInput type="date" value={ed.nextReview} onChange={e=>upd('nextReview',e.target.value)}/>
        </div>
        <div style={{gridColumn:'span 2'}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:5,fontFamily:'Inter,sans-serif'}}>監控備註</div>
          <TInput value={ed.notes} onChange={e=>upd('notes',e.target.value)} rows={2}
            placeholder="例：每月由安全團隊提交 KRI 報告；控制效能複查列入季度稽核"/>
        </div>
      </div>

      {/* Timeline */}
      <SectionLabel>風險生命週期</SectionLabel>
      <div style={{marginBottom:16}}>
        {[
          {step:0,label:'已登記',     date:risk.createdAt},
          {step:1,label:'FAIR 分析完成',date:risk.fairResult?risk.updatedAt:null},
          {step:2,label:'評估決策',   date:risk.evaluation.reviewedAt},
          {step:3,label:'應對計畫',   date:risk.treatment.dueDate?risk.updatedAt:null},
          {step:4,label:'控制措施完成',date:risk.treatment.treatStatus==='completed'?risk.updatedAt:null},
          {step:5,label:'監控中',     date:risk.status==='monitoring'?risk.updatedAt:null},
        ].map((s,i)=>{
          const done=STATUS_CFG[risk.status]?.step>=s.step;
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <div style={{width:24,height:24,borderRadius:'50%',flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:10,fontWeight:700,fontFamily:'Inter,sans-serif',
                background:done?C.grn:C.bdr,color:done?'white':C.fnt}}>
                {done?'✓':i+1}
              </div>
              <div style={{fontSize:12.5,color:done?C.txt:C.fnt,fontFamily:'Inter,sans-serif',
                fontWeight:done?500:400}}>{s.label}</div>
              {s.date&&<div style={{fontSize:11,color:C.fnt,fontFamily:'Inter,sans-serif',marginLeft:'auto'}}>
                {fmtDate(s.date)}
              </div>}
            </div>
          );
        })}
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <Btn ch="結案此風險" onClick={closeRisk} v="ghost"
          style={{color:C.sub,fontSize:12}}/>
        <Btn ch="儲存監控設定" onClick={save} v="grn"/>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   RISK DETAIL VIEW
═══════════════════════════════════════════════════ */
function RiskDetail({risk,onUpdate,onBack}){
  const[tab,setTab]=useState('overview');
  const TABS=[
    {id:'overview',   label:'總覽'},
    {id:'fair',       label:'FAIR 分析',     badge:risk.fairResult?'完成':null},
    {id:'evaluation', label:'評估',          badge:risk.evaluation.decision?risk.evaluation.decision:null},
    {id:'treatment',  label:'應對',          badge:risk.treatment.treatStatus?TREAT_STATUS[risk.treatment.treatStatus]?.label:null},
    {id:'monitoring', label:'監控'},
  ];
  const decMap={accept:'接受',treat:'處理',transfer:'轉移',avoid:'迴避'};
  return(
    <div>
      {/* Breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',
          fontSize:12.5,color:C.sub,fontFamily:'Inter,sans-serif',padding:0,fontWeight:500}}>
          ← 風險登記冊
        </button>
        <span style={{color:C.bdr}}>/</span>
        <span style={{fontSize:12.5,color:C.txt,fontFamily:'Inter,sans-serif',fontWeight:500}}>
          {risk.name||'(未命名)'}
        </span>
      </div>

      {/* Risk header */}
      <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:4,
        padding:'16px 20px',marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:200}}>
          <div className="serif" style={{fontSize:20,fontWeight:400,color:C.txt,lineHeight:1.2}}>
            {risk.name||`${risk.scenario.actor||'—'} → ${risk.scenario.asset||'—'}`}
          </div>
          <div style={{fontSize:11.5,color:C.sub,marginTop:4,fontFamily:'Inter,sans-serif'}}>
            {[risk.scenario.asset,risk.scenario.event].filter(Boolean).join(' · ')}
            {risk.owner&&` · 負責人：${risk.owner}`}
            {` · 登記日：${fmtDate(risk.createdAt)}`}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <PriBadge priority={risk.priority}/>
          <StatusBadge status={risk.status}/>
          {risk.fairResult&&(
            <div style={{padding:'4px 12px',background:'#F2EFE8',borderRadius:3,
              fontSize:12.5,fontFamily:'Inter,sans-serif',fontWeight:500,color:C.txt}}>
              EAL {usd(risk.fairResult.mean)}
            </div>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:0,marginBottom:16,
        borderBottom:`2px solid ${C.bdr}`,background:C.surf,borderRadius:'4px 4px 0 0',
        border:`1px solid ${C.bdr}`,overflow:'hidden'}}>
        {TABS.map(t=>{
          const act=tab===t.id;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              padding:'11px 18px',fontSize:12.5,fontWeight:act?600:400,
              fontFamily:'Inter,sans-serif',cursor:'pointer',
              border:'none',borderBottom:act?`2px solid ${C.txt}`:'2px solid transparent',
              background:act?'white':'transparent',color:act?C.txt:C.sub,
              marginBottom:act?'-1px':'0',transition:'color .12s',
              display:'flex',alignItems:'center',gap:6}}>
              {t.label}
              {t.badge&&(
                <span style={{fontSize:10,background:C.bg,color:C.sub,
                  padding:'1px 6px',borderRadius:2,fontFamily:'Inter,sans-serif',
                  fontWeight:500}}>{decMap[t.badge]||t.badge}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* Tab content */}
      <div className="fade" key={tab}
        style={{background:C.surf,border:`1px solid ${C.bdr}`,
          borderRadius:4,padding:'20px 20px 24px'}}>
        {tab==='overview'  &&<TabOverview    risk={risk} onUpdate={onUpdate}/>}
        {tab==='fair'      &&<TabFair        risk={risk} onUpdate={onUpdate}/>}
        {tab==='evaluation'&&<TabEvaluation  risk={risk} onUpdate={onUpdate}/>}
        {tab==='treatment' &&<TabTreatment   risk={risk} onUpdate={onUpdate}/>}
        {tab==='monitoring'&&<TabMonitoring  risk={risk} onUpdate={onUpdate}/>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════ */
function App(){
  const[risks,setRisks]=useState(()=>loadRisks());
  const[view,setView]=useState('register');
  const[selectedId,setSelectedId]=useState(null);
  const[showNew,setShowNew]=useState(false);

  useEffect(()=>{saveRisks(risks);},[risks]);

  const selectedRisk=risks.find(r=>r.id===selectedId);

  const addRisk=r=>{
    setRisks(rs=>[r,...rs]);
    setShowNew(false);
    setSelectedId(r.id);
    setView('detail');
  };
  const updateRisk=updated=>{
    setRisks(rs=>rs.map(r=>r.id===updated.id?updated:r));
  };
  const openRisk=id=>{
    setSelectedId(id);
    setView('detail');
  };

  const totalRisks=risks.length;
  const critCount=risks.filter(r=>r.priority==='critical').length;

  return(
    <div style={{fontFamily:"'Inter','Noto Serif TC',sans-serif",
      background:C.bg,minHeight:'100vh',color:C.txt,
      display:'flex',flexDirection:'column'}}>

      {/* Header */}
      <header className="no-print" style={{
        background:C.surf,borderBottom:`1px solid ${C.bdr}`,
        padding:'0 28px',display:'flex',alignItems:'center',
        height:48,position:'sticky',top:0,zIndex:100,gap:16}}>
        {/* Logo area */}
        <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <svg width="22" height="22" viewBox="0 0 22 22">
            <circle cx="11" cy="11" r="10" fill="none" stroke={C.txt} strokeWidth="1.2"/>
            <circle cx="11" cy="11" r="6"  fill="none" stroke={C.txt} strokeWidth="0.7" strokeDasharray="2 3"/>
            <circle cx="11" cy="11" r="2.5" fill={C.red}/>
          </svg>
          <span style={{fontSize:14.5,fontWeight:600,color:C.txt,fontFamily:'Inter,sans-serif',
            letterSpacing:'-0.01em'}}>企業風險量化平台</span>
        </div>

        <div style={{width:1,height:18,background:C.bdr}}/>

        {/* Breadcrumb nav */}
        {view==='detail'&&selectedRisk&&(
          <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12.5,fontFamily:'Inter,sans-serif'}}>
            <button onClick={()=>setView('register')} style={{
              background:'none',border:'none',cursor:'pointer',
              color:C.sub,fontFamily:'Inter,sans-serif',fontSize:12.5,padding:0}}>
              登記冊
            </button>
            <span style={{color:C.bdr}}>/</span>
            <span style={{color:C.txt,fontWeight:500,maxWidth:240,overflow:'hidden',
              textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {selectedRisk.name||'(未命名)'}
            </span>
          </div>
        )}

        <div style={{flex:1}}/>

        {/* Stats */}
        <div style={{display:'flex',gap:14,alignItems:'center',fontSize:11.5,
          fontFamily:'Inter,sans-serif',color:C.sub}}>
          <span>{totalRisks} 個風險</span>
          {critCount>0&&(
            <span style={{color:C.red,fontWeight:600}}>{critCount} 個緊急</span>
          )}
        </div>
      </header>

      {/* Page content */}
      <div style={{maxWidth:1120,margin:'0 auto',padding:'24px 24px'}}>
        {/* Page title */}
        {view==='register'&&(
          <div style={{marginBottom:20}}>
            <h1 className="serif" style={{fontSize:28,fontWeight:300,color:C.txt,
              letterSpacing:'-0.01em',lineHeight:1.15}}>風險登記冊</h1>
            <p style={{fontSize:13,color:C.sub,marginTop:4,fontFamily:'Inter,sans-serif'}}>
              管理組織所有 FAIR 量化風險 · 點擊風險列開啟詳細分析
            </p>
          </div>
        )}

        {view==='register'&&(
          <div className="fade">
            <RiskRegister risks={risks} onOpen={openRisk} onAdd={()=>setShowNew(true)}/>
          </div>
        )}

        {view==='detail'&&selectedRisk&&(
          <div className="fade">
            <RiskDetail risk={selectedRisk} onUpdate={updateRisk}
              onBack={()=>setView('register')}/>
          </div>
        )}
      </div>

      {/* New risk side panel */}
      {showNew&&<NewRiskPanel onSave={addRisk} onClose={()=>setShowNew(false)}/>}

      {/* Copyright footer */}
      <footer className="no-print" style={{
        marginTop:'auto',borderTop:`1px solid ${C.bdr}`,
        padding:'14px 28px',
        display:'flex',justifyContent:'center',alignItems:'center',
        background:C.surf,
      }}>
        <span style={{fontSize:11.5,color:C.fnt,fontFamily:'Inter,sans-serif',
          letterSpacing:'0.03em'}}>
          Copyright © 2026 Akers Kuo. All rights reserved.
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
