/* ── Pure SVG chart helpers ── */
function SvgHistogram({data,mean,width=420,height=195}){
  if(!data||!data.length)return null;
  const pad={top:8,right:8,bottom:28,left:42};
  const W=width-pad.left-pad.right, H=height-pad.top-pad.bottom;
  const maxCt=Math.max(...data.map(d=>d.ct));
  const minX=data[0].x, maxX=data[data.length-1].x;
  const xS=v=>((v-minX)/(maxX-minX||1))*W;
  const yS=v=>H-(v/maxCt)*H;
  const barW=Math.max(1,(W/data.length)-1);
  const ticks=data.filter((_,i)=>i%Math.ceil(data.length/5)===0);
  return(
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:'visible'}}>
      <g transform={`translate(${pad.left},${pad.top})`}>
        {/* grid */}
        {[0,.25,.5,.75,1].map(t=>(
          <line key={t} x1={0} x2={W} y1={H*t} y2={H*t} stroke={C.bdr} strokeDasharray="2 3"/>
        ))}
        {/* bars */}
        {data.map((d,i)=>(
          <rect key={i} x={xS(d.x)} y={yS(d.ct)} width={barW} height={H-yS(d.ct)}
            fill={C.grnM} rx={1}/>
        ))}
        {/* mean line */}
        {mean>=minX&&mean<=maxX&&(
          <line x1={xS(mean)} x2={xS(mean)} y1={0} y2={H}
            stroke={C.amb} strokeDasharray="5 3" strokeWidth={1.5}/>
        )}
        {/* x-axis ticks */}
        {ticks.map((d,i)=>(
          <text key={i} x={xS(d.x)} y={H+16} textAnchor="middle"
            fontSize={8} fill={C.fnt}>{usd(d.x)}</text>
        ))}
        {/* y-axis ticks */}
        {[0,.5,1].map(t=>(
          <text key={t} x={-5} y={H*t+4} textAnchor="end"
            fontSize={8} fill={C.fnt}>{Math.round(maxCt*(1-t))}</text>
        ))}
        <line x1={0} x2={W} y1={H} y2={H} stroke={C.bdr}/>
        <line x1={0} x2={0} y1={0} y2={H} stroke={C.bdr}/>
      </g>
    </svg>
  );
}

function SvgExceedance({data,width=420,height=195}){
  if(!data||!data.length)return null;
  const pad={top:8,right:20,bottom:28,left:42};
  const W=width-pad.left-pad.right, H=height-pad.top-pad.bottom;
  const minX=data[0].loss, maxX=data[data.length-1].loss;
  const xS=v=>((v-minX)/(maxX-minX||1))*W;
  const yS=v=>H-(v/100)*H;
  const pts=data.map(d=>`${xS(d.loss)},${yS(d.pct)}`).join(' ');
  const ticks=data.filter((_,i)=>i%Math.ceil(data.length/5)===0);
  const p90y=yS(10);
  return(
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:'visible'}}>
      <g transform={`translate(${pad.left},${pad.top})`}>
        {[0,25,50,75,100].map(t=>(
          <line key={t} x1={0} x2={W} y1={yS(t)} y2={yS(t)} stroke={C.bdr} strokeDasharray="2 3"/>
        ))}
        <polyline points={pts} fill="none" stroke={C.grn} strokeWidth={2}/>
        <line x1={0} x2={W} y1={p90y} y2={p90y}
          stroke={C.amb} strokeDasharray="5 3" strokeWidth={1.5}/>
        <text x={W+2} y={p90y+4} fontSize={9} fill={C.amb}>P90</text>
        {ticks.map((d,i)=>(
          <text key={i} x={xS(d.loss)} y={H+16} textAnchor="middle"
            fontSize={8} fill={C.fnt}>{usd(d.loss)}</text>
        ))}
        {[0,25,50,75,100].map(t=>(
          <text key={t} x={-5} y={yS(t)+4} textAnchor="end"
            fontSize={8} fill={C.fnt}>{t}%</text>
        ))}
        <line x1={0} x2={W} y1={H} y2={H} stroke={C.bdr}/>
        <line x1={0} x2={0} y1={0} y2={H} stroke={C.bdr}/>
      </g>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════
   MATH — Beta-PERT distribution (Marsaglia-Tsang)
═══════════════════════════════════════════════════ */
function normalRv(){
  let u,v,s;
  do{u=Math.random()*2-1;v=Math.random()*2-1;s=u*u+v*v;}
  while(s>=1||s===0);
  return u*Math.sqrt(-2*Math.log(s)/s);
}
function gammaRv(sh){
  if(sh<1)return gammaRv(1+sh)*Math.pow(Math.random(),1/sh);
  const d=sh-1/3,c=1/Math.sqrt(9*d);
  for(;;){
    let x,v;
    do{x=normalRv();v=1+c*x;}while(v<=0);
    v=v*v*v;const u=Math.random();
    if(u<1-0.0331*x*x*x*x)return d*v;
    if(Math.log(u)<0.5*x*x+d*(1-v+Math.log(v)))return d*v;
  }
}
function pertRv(lo,ml,hi){
  if(lo>=hi)return(lo+hi)/2;
  const m=Math.max(lo,Math.min(hi,ml)),r=hi-lo;
  const a=1+4*(m-lo)/r,b=1+4*(hi-m)/r;
  const gx=gammaRv(a),gy=gammaRv(b);
  return lo+r*gx/(gx+gy);
}
const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));

/* ═══════════════════════════════════════════════════
   MONTE CARLO SIMULATION
═══════════════════════════════════════════════════ */
function runMC(p,N=10000){
  const out=new Array(N);
  for(let i=0;i<N;i++){
    const tef=pertRv(p.cf.lo,p.cf.ml,p.cf.hi)*clamp(pertRv(p.poa.lo,p.poa.ml,p.poa.hi),0,1);
    const vul=pertRv(p.tcap.lo,p.tcap.ml,p.tcap.hi)>pertRv(p.rs.lo,p.rs.ml,p.rs.hi)?1:0;
    const lef=tef*vul;
    const lm=pertRv(p.pl.lo,p.pl.ml,p.pl.hi)
             +clamp(pertRv(p.slef.lo,p.slef.ml,p.slef.hi),0,1)
             *pertRv(p.slm.lo,p.slm.ml,p.slm.hi);
    out[i]=lef*lm;
  }
  out.sort((a,b)=>a-b);
  const sum=out.reduce((s,v)=>s+v,0);
  const pct=q=>out[Math.floor(N*q)];
  const nz=out.filter(v=>v>0).length;
  return{raw:out,N,mean:sum/N,p50:pct(.5),p90:pct(.9),p95:pct(.95),p99:pct(.99),pLoss:(nz/N*100).toFixed(1)};
}
function mkHist(sorted,bins=48){
  const nz=sorted.filter(v=>v>0);
  if(!nz.length)return[];
  const lo=nz[0],hi=nz[nz.length-1];
  if(lo===hi)return[{x:lo,ct:nz.length}];
  const bw=(hi-lo)/bins,cts=new Array(bins).fill(0);
  nz.forEach(v=>cts[Math.min(Math.floor((v-lo)/bw),bins-1)]++);
  return cts.map((ct,i)=>({x:lo+(i+.5)*bw,ct})).filter(b=>b.ct>0);
}
function mkExc(sorted){
  const N=sorted.length,step=Math.max(1,Math.floor(N/240)),pts=[];
  for(let i=0;i<N;i+=step)pts.push({loss:sorted[i],pct:(N-i)/N*100});
  pts.push({loss:sorted[N-1],pct:0});
  return pts;
}

/* ═══════════════════════════════════════════════════
   FORMATTERS
═══════════════════════════════════════════════════ */
const usd=v=>{
  if(v>=1e6)return`$${(v/1e6).toFixed(2)}M`;
  if(v>=1e3)return`$${(v/1e3).toFixed(1)}K`;
  return`$${Math.round(v)}`;
};

/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
const C={
  bg:'#F7F5F0',surf:'#FFFFFF',bdr:'#E8E4DC',
  txt:'#1A1A18',sub:'#6B6860',fnt:'#B5B0A8',
  grn:'#4E6030',grnL:'#EBF0E2',grnM:'#7E9060',
  amb:'#9E6A18',ambL:'#F4EDDA',
};

/* ═══════════════════════════════════════════════════
   FAIR BILINGUAL TERMS
═══════════════════════════════════════════════════ */
const TERMS={
  cf:  {zh:'接觸頻率',        en:'Contact Frequency',          abbr:'CF',   unit:'次/年',  desc:'威脅者每年與目標資產發生接觸的預估次數'},
  poa: {zh:'行動機率',        en:'Probability of Action',      abbr:'PoA',  unit:'0 – 1', desc:'每次接觸後，威脅者採取攻擊行動的機率'},
  tcap:{zh:'威脅能力',        en:'Threat Capability',          abbr:'TCap', unit:'1 – 10',desc:'威脅者克服防護措施的技術能力強度（越高越危險）'},
  rs:  {zh:'抵抗強度',        en:'Resistance Strength',        abbr:'RS',   unit:'1 – 10',desc:'現有控制措施阻擋威脅者的強度（越高保護越強）'},
  pl:  {zh:'主要損失',        en:'Primary Loss',               abbr:'PL',   unit:'USD',   desc:'損失事件直接造成的財務衝擊（不含次要損失）'},
  slef:{zh:'次要損失事件頻率', en:'Secondary Loss Event Freq.', abbr:'SLEF', unit:'0 – 1', desc:'主要損失後引發次要損失的機率（如監管罰款、訴訟）'},
  slm: {zh:'次要損失規模',    en:'Secondary Loss Magnitude',   abbr:'SLM',  unit:'USD',   desc:'次要損失事件的預估財務規模'},
};

/* ═══════════════════════════════════════════════════
   SCENARIO OPTIONS
═══════════════════════════════════════════════════ */
const OPTS={
  assets:['客戶個資資料庫 (Customer PII)','財務與帳務系統 (Financial System)','員工薪資資料 (HR/Payroll)','原始碼儲存庫 (Source Code Repo)','生產伺服器 (Production Server)','電子郵件系統 (Email System)'],
  actors:['外部駭客－機會型 (Opportunistic)','外部駭客－目標型 (Targeted APT)','惡意內部人員 (Malicious Insider)','粗心員工 (Negligent Employee)','競爭對手 (Competitor)','國家級威脅者 (Nation-State)'],
  events:['未授權存取 (Unauthorized Access)','勒索軟體攻擊 (Ransomware)','資料外洩 (Data Exfiltration)','DDoS 服務中斷','社交工程攻擊 (Social Engineering)','供應鏈滲透 (Supply Chain)'],
  losses:['資料外洩罰款與法規合規費用','業務中斷與收入損失','聲譽損害與客戶流失','事件回應與系統復原費用','法律訴訟與和解費用','智慧財產損失'],
};

/* ═══════════════════════════════════════════════════
   DEFAULT PARAMETER VALUES
═══════════════════════════════════════════════════ */
const DEF={
  cf:  {lo:12,    ml:24,     hi:52    },
  poa: {lo:0.05,  ml:0.15,   hi:0.30  },
  tcap:{lo:4,     ml:6,      hi:8     },
  rs:  {lo:4,     ml:6,      hi:8     },
  pl:  {lo:50000, ml:200000, hi:500000},
  slef:{lo:0.2,   ml:0.4,    hi:0.7   },
  slm: {lo:20000, ml:80000,  hi:250000},
};

/* ═══════════════════════════════════════════════════
   SHARED UI PRIMITIVES
═══════════════════════════════════════════════════ */
function Hdr({n,zh,en,desc}){
  return(
    <div style={{marginBottom:22}}>
      <div style={{fontSize:10,letterSpacing:'0.2em',color:C.fnt,textTransform:'uppercase',marginBottom:4}}>Step {n}</div>
      <h2 style={{fontSize:21,fontWeight:400,color:C.txt,letterSpacing:'0.01em',marginBottom:5}}>{zh}</h2>
      <div style={{fontSize:11,color:C.fnt,letterSpacing:'0.07em',marginBottom:8}}>{en}</div>
      {desc&&<p style={{fontSize:13,color:C.sub,lineHeight:1.78}}>{desc}</p>}
    </div>
  );
}

function Btn({ch,onClick,disabled,v='primary',style={}}){
  const vs={
    primary:{background:C.grn,color:'white',border:'none'},
    ghost:{background:'transparent',color:C.sub,border:`1px solid ${C.bdr}`},
    amber:{background:C.amb,color:'white',border:'none'},
  };
  return(
    <button onClick={onClick} disabled={disabled} style={{
      ...vs[v],padding:'10px 22px',borderRadius:5,fontSize:13.5,
      cursor:disabled?'not-allowed':'pointer',fontFamily:'inherit',
      opacity:disabled?0.5:1,letterSpacing:'0.03em',transition:'opacity .2s',...style,
    }}>{ch}</button>
  );
}

function Card({title,en,accent,children}){
  return(
    <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:8,overflow:'hidden',marginBottom:14}}>
      <div style={{background:accent?C.ambL:C.grnL,padding:'9px 16px',borderBottom:`1px solid ${C.bdr}`}}>
        <span style={{fontSize:14,fontWeight:500,color:C.txt}}>{title}</span>
        <span style={{fontSize:11,color:C.sub,marginLeft:8}}>{en}</span>
      </div>
      <div style={{padding:16}}>{children}</div>
    </div>
  );
}

function PRow({k,val,onChange,mode}){
  const t=TERMS[k];
  const isUSD=t.unit==='USD';
  const isProb=t.unit.includes('0 –');
  const step=isUSD?5000:isProb?0.01:0.5;
  return(
    <div style={{marginBottom:18}}>
      <div style={{marginBottom:5}}>
        <span style={{fontSize:13.5,fontWeight:500,color:C.txt}}>{t.zh}</span>
        <span style={{fontSize:11,color:C.fnt,marginLeft:8}}>{mode==='professional'?`${t.en}  ·  ${t.abbr}`:t.abbr}</span>
      </div>
      <div style={{fontSize:12,color:C.sub,marginBottom:5,lineHeight:1.55}}>{t.desc}</div>
      <div style={{fontSize:11,color:C.fnt,marginBottom:7}}>單位 Unit: {t.unit}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        {[['lo','最低 Min'],['ml','最可能 ML'],['hi','最高 Max']].map(([f,lbl])=>(
          <div key={f}>
            <div style={{fontSize:11,color:C.sub,marginBottom:3}}>{lbl}</div>
            <input type="number" value={val[f]} step={step}
              onChange={e=>onChange(k,f,e.target.value)}
              style={{width:'100%',padding:'6px 8px',border:`1px solid ${C.bdr}`,borderRadius:4,
                fontSize:13,fontFamily:'inherit',color:C.txt,background:C.surf}}
            />
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   STEP 0 — SCENARIO DEFINITION
═══════════════════════════════════════════════════ */
function S0({sc,setSc,mode,next}){
  const fields=[
    {k:'asset',zh:'資產',     en:'Asset',        desc:'分析對象：哪項資產面臨風險？',opts:OPTS.assets},
    {k:'actor',zh:'威脅來源', en:'Threat Actor',  desc:'誰可能造成威脅？',            opts:OPTS.actors},
    {k:'event',zh:'威脅行為', en:'Threat Event',  desc:'威脅者可能採取什麼行動？',    opts:OPTS.events},
    {k:'loss', zh:'損失類型', en:'Loss Event',    desc:'可能造成什麼業務損失？',      opts:OPTS.losses},
  ];
  // Track which fields are in "custom" mode
  const [customMode,setCustomMode]=useState({asset:false,actor:false,event:false,loss:false});
  const handleSel=(k,v)=>{
    if(v==='__custom__'){
      setCustomMode(m=>({...m,[k]:true}));
      setSc(s=>({...s,[k]:''}));
    } else {
      setCustomMode(m=>({...m,[k]:false}));
      setSc(s=>({...s,[k]:v}));
    }
  };
  const ok=fields.every(f=>sc[f.k]&&sc[f.k].trim());
  return(
    <div className="fade">
      <Hdr n={1} zh="場景定義" en="Scenario Definition"
        desc="請描述希望分析的風險情境。FAIR 分析從明確的場景出發，確定資產、威脅來源、威脅行為與損失類型四個核心要素。"/>
      <div style={{background:C.ambL,border:'1px solid #DEC98A',borderRadius:8,padding:'11px 16px',marginBottom:20,display:'flex',gap:10}}>
        <span style={{fontSize:14,flexShrink:0,marginTop:1}}>💡</span>
        <div style={{fontSize:12.5,color:'#7A5A1A',lineHeight:1.7}}>
          <strong>範例：</strong>外部目標型駭客對客戶個資資料庫發動資料外洩攻擊，導致資料外洩罰款與合規費用增加。
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        {fields.map(({k,zh,en,desc,opts})=>(
          <div key={k} style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:16}}>
            <div style={{fontSize:12,color:C.sub,marginBottom:6}}>{desc}</div>
            <div style={{marginBottom:8}}>
              <span style={{fontSize:14.5,fontWeight:500}}>{zh}</span>
              {mode==='professional'&&<span style={{fontSize:11,color:C.fnt,marginLeft:8}}>{en}</span>}
            </div>
            <select
              value={customMode[k]?'__custom__':(sc[k]||'')}
              onChange={e=>handleSel(k,e.target.value)}
              style={{width:'100%',padding:'9px 12px',border:`1px solid ${C.bdr}`,borderRadius:5,
                fontFamily:'inherit',fontSize:13,color:C.txt,background:C.surf,cursor:'pointer'}}>
              <option value="">— 請選擇 —</option>
              {opts.map(o=><option key={o} value={o}>{o}</option>)}
              <option value="__custom__">✏ 自訂輸入…</option>
            </select>
            {customMode[k]&&(
              <input
                autoFocus
                type="text"
                placeholder={`請輸入自訂${zh}…`}
                value={sc[k]||''}
                onChange={e=>setSc(s=>({...s,[k]:e.target.value}))}
                style={{marginTop:8,width:'100%',padding:'8px 12px',
                  border:`1.5px solid ${C.grn}`,borderRadius:5,
                  fontFamily:'inherit',fontSize:13,color:C.txt,background:'#FAFFF5'}}
              />
            )}
          </div>
        ))}
      </div>
      {ok&&(
        <div className="fade" style={{marginTop:14,background:C.grnL,border:'1px solid #BDCFA0',borderRadius:8,padding:16}}>
          <div style={{fontSize:12,fontWeight:500,color:C.grn,marginBottom:6}}>✓ 場景摘要 Scenario Summary</div>
          <p style={{fontSize:13.5,color:C.txt,lineHeight:1.9}}>
            <strong>{sc.actor}</strong> 對 <strong>「{sc.asset}」</strong> 發動 <strong>{sc.event}</strong>，
            可能造成 <strong>{sc.loss}</strong>。
          </p>
        </div>
      )}
      <div style={{marginTop:22,display:'flex',justifyContent:'flex-end'}}>
        <Btn ch="下一步：輸入 FAIR 參數 →" onClick={next} disabled={!ok}/>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   STEP 1 — FAIR PARAMETER INPUT
═══════════════════════════════════════════════════ */
function S1({params,upd,mode,back,next}){
  return(
    <div className="fade">
      <Hdr n={2} zh="FAIR 參數輸入" en="Parameter Input"
        desc="依 FAIR 架構輸入各因素的三點估計（最低、最可能、最高），以反映不確定性。不需要精確數值，合理的估計範圍即可。"/>
      <div style={{background:'#EDE9E2',borderRadius:8,padding:'11px 16px',marginBottom:18,fontSize:12.5,color:C.sub,lineHeight:1.75}}>
        <strong style={{color:C.txt}}>FAIR 公式：</strong>
        年度損失 = LEF × LM，其中 LEF = (CF × PoA) × P(TCap &gt; RS)，LM = PL + SLEF × SLM
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        {/* LEF Column */}
        <div>
          <div style={{fontSize:10.5,letterSpacing:'0.16em',color:C.grn,fontWeight:600,textTransform:'uppercase',marginBottom:11}}>
            ← 損失事件頻率 (LEF)
          </div>
          <Card title="威脅事件頻率" en="Threat Event Frequency (TEF)">
            <div style={{fontSize:12,color:C.sub,background:'#F2EFE8',borderRadius:4,padding:'7px 10px',marginBottom:14,lineHeight:1.6}}>
              TEF = CF × PoA：接觸頻率乘以每次接觸採取行動的機率
            </div>
            <PRow k="cf"  val={params.cf}  onChange={upd} mode={mode}/>
            <PRow k="poa" val={params.poa} onChange={upd} mode={mode}/>
          </Card>
          <Card title="脆弱性" en="Vulnerability">
            <div style={{fontSize:12,color:C.sub,background:'#F2EFE8',borderRadius:4,padding:'7px 10px',marginBottom:14,lineHeight:1.6}}>
              每次迭代分別從 TCap 和 RS 分佈抽樣，若 TCap 樣本值 &gt; RS 樣本值，Vul = 1（損失事件發生）
            </div>
            <PRow k="tcap" val={params.tcap} onChange={upd} mode={mode}/>
            <PRow k="rs"   val={params.rs}   onChange={upd} mode={mode}/>
          </Card>
        </div>
        {/* LM Column */}
        <div>
          <div style={{fontSize:10.5,letterSpacing:'0.16em',color:C.amb,fontWeight:600,textTransform:'uppercase',marginBottom:11}}>
            → 損失規模 (LM)
          </div>
          <Card title="主要損失" en="Primary Loss (PL)" accent={true}>
            <div style={{fontSize:12,color:C.sub,background:'#F2EFE8',borderRadius:4,padding:'7px 10px',marginBottom:14,lineHeight:1.6}}>
              損失事件直接造成的財務衝擊，例如數據復原、緊急回應費用
            </div>
            <PRow k="pl" val={params.pl} onChange={upd} mode={mode}/>
          </Card>
          <Card title="次要損失" en="Secondary Loss" accent={true}>
            <div style={{fontSize:12,color:C.sub,background:'#F2EFE8',borderRadius:4,padding:'7px 10px',marginBottom:14,lineHeight:1.6}}>
              次要損失 = SLEF × SLM，包含監管罰款、客戶賠償、法律費用等間接損失
            </div>
            <PRow k="slef" val={params.slef} onChange={upd} mode={mode}/>
            <PRow k="slm"  val={params.slm}  onChange={upd} mode={mode}/>
          </Card>
        </div>
      </div>
      <div style={{marginTop:20,display:'flex',justifyContent:'space-between'}}>
        <Btn ch="← 返回" onClick={back} v="ghost"/>
        <Btn ch="下一步：執行模擬 →" onClick={next}/>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   STEP 2 — MONTE CARLO SIMULATION
═══════════════════════════════════════════════════ */
function S2({simming,runSim,back}){
  return(
    <div className="fade">
      <Hdr n={3} zh="蒙地卡羅模擬" en="Monte Carlo Simulation"
        desc="系統將執行 10,000 次隨機迭代，對每個 FAIR 參數從 Beta-PERT 分佈抽樣，計算年度損失的完整機率分佈。"/>
      <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:'38px 28px',textAlign:'center',marginBottom:22}}>
        <div style={{fontSize:40,marginBottom:16}}>⚙</div>
        <h3 style={{fontSize:17,fontWeight:400,color:C.txt,marginBottom:10}}>準備執行蒙地卡羅模擬</h3>
        <p style={{fontSize:13,color:C.sub,marginBottom:26,lineHeight:1.8,maxWidth:460,margin:'0 auto 26px'}}>
          每次迭代對 7 個 FAIR 參數進行 Beta-PERT 分佈抽樣，
          按照 FAIR 公式計算 LEF × LM 年度損失，共執行 <strong>10,000 次</strong>，輸出機率分佈統計。
        </p>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginBottom:30}}>
          {['① CF × PoA → TEF','② P(TCap > RS) → Vul','③ TEF × Vul → LEF','④ PL + SLEF×SLM → LM','⑤ LEF × LM → 年損失'].map(t=>(
            <span key={t} style={{background:C.grnL,color:C.grn,padding:'5px 14px',borderRadius:20,fontSize:12,border:'1px solid #BDCFA0'}}>{t}</span>
          ))}
        </div>
        <Btn ch={simming?'⏳ 模擬執行中...':'▶  開始模擬  (N = 10,000)'} onClick={runSim} disabled={simming}
          style={{padding:'13px 38px',fontSize:15}}/>
      </div>
      <Btn ch="← 返回" onClick={back} v="ghost"/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   STEP 3 — RESULTS
═══════════════════════════════════════════════════ */
function S3({res,sc,params,mode,back}){
  const hist=useMemo(()=>mkHist(res.raw),[res]);
  const exc =useMemo(()=>mkExc(res.raw), [res]);

  const TT1=({active,payload})=>!active||!payload?.length?null:(
    <div style={{background:'white',border:`1px solid ${C.bdr}`,padding:'8px 12px',borderRadius:4,fontSize:12}}>
      <div style={{color:C.sub}}>{usd(payload[0].payload.x)}</div>
      <div><strong>{payload[0].value.toLocaleString()}</strong> 次模擬</div>
    </div>
  );
  const TT2=({active,payload})=>!active||!payload?.length?null:(
    <div style={{background:'white',border:`1px solid ${C.bdr}`,padding:'8px 12px',borderRadius:4,fontSize:12}}>
      <div style={{color:C.sub}}>損失: {usd(payload[0].payload.loss)}</div>
      <div>超越機率: <strong>{payload[0].payload.pct.toFixed(1)}%</strong></div>
    </div>
  );

  const metrics=[
    {zh:'預期年度損失',   en:'Expected Annual Loss', val:usd(res.mean),note:'均值 Mean',            hi:true},
    {zh:'P50 中位數損失', en:'50th Percentile',       val:usd(res.p50), note:'50% 機率低於此值'},
    {zh:'P90 高風險損失', en:'90th Percentile',       val:usd(res.p90), note:'90% 機率低於此值'},
    {zh:'P95 尾端風險',  en:'95th Percentile',       val:usd(res.p95), note:'5% 機率超過此值'},
  ];
  const interp=[
    {zh:`預期年度損失（均值）約 ${usd(res.mean)}`,      en:`Expected annual loss is approximately ${usd(res.mean)}.`},
    {zh:`損失事件發生率約 ${res.pLoss}%（非零損失情境）`, en:`Probability of non-zero loss: ${res.pLoss}%.`},
    {zh:`90% 機率下，年度損失不超過 ${usd(res.p90)}`,   en:`There is a 90% probability that annual loss will not exceed ${usd(res.p90)}.`},
    {zh:`極端情境（P99）損失估計可達 ${usd(res.p99)}`,  en:`In extreme scenarios (P99), loss could reach approximately ${usd(res.p99)}.`},
  ];

  const paramSummary=[
    {label:'接觸頻率 CF',    val:`${params.cf.lo}–${params.cf.hi} 次/年`},
    {label:'行動機率 PoA',   val:`${params.poa.lo}–${params.poa.hi}`},
    {label:'威脅能力 TCap',  val:`${params.tcap.lo}–${params.tcap.hi} / 10`},
    {label:'抵抗強度 RS',    val:`${params.rs.lo}–${params.rs.hi} / 10`},
    {label:'主要損失 PL',    val:`${usd(params.pl.lo)}–${usd(params.pl.hi)}`},
    {label:'次要損失頻率 SLEF',val:`${params.slef.lo}–${params.slef.hi}`},
    {label:'次要損失規模 SLM',val:`${usd(params.slm.lo)}–${usd(params.slm.hi)}`},
  ];

  return(
    <div className="fade print-page">
      <Hdr n={4} zh="分析結果" en="Risk Quantification Results"
        desc={`基於 ${res.N.toLocaleString()} 次蒙地卡羅模擬的年度損失機率分佈。損失發生機率：${res.pLoss}%`}/>

      {/* Metric Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:11,marginBottom:20}}>
        {metrics.map((m,i)=>(
          <div key={i} style={{background:i===0?C.grn:C.surf,border:`1px solid ${i===0?C.grn:C.bdr}`,borderRadius:8,padding:'14px 12px'}}>
            <div style={{fontSize:11,color:i===0?'rgba(255,255,255,.65)':C.fnt,marginBottom:3}}>{m.zh}</div>
            {mode==='professional'&&<div style={{fontSize:10,color:i===0?'rgba(255,255,255,.4)':C.fnt,marginBottom:7}}>{m.en}</div>}
            <div style={{fontSize:21,fontWeight:500,color:i===0?'white':C.txt,letterSpacing:'-.01em',marginBottom:3}}>{m.val}</div>
            <div style={{fontSize:11,color:i===0?'rgba(255,255,255,.55)':C.sub}}>{m.note}</div>
          </div>
        ))}
      </div>

      {/* Charts */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:2}}>損失分佈直方圖</div>
          <div style={{fontSize:11,color:C.sub,marginBottom:12}}>Loss Distribution Histogram（僅顯示損失 &gt; 0 情境）</div>
          <SvgHistogram data={hist} mean={res.mean}/>
          <div style={{fontSize:11,color:C.sub,marginTop:6,display:'flex',alignItems:'center',gap:6}}>
            <span style={{display:'inline-block',width:18,borderTop:`2px dashed ${C.amb}`}}></span>
            均值 {usd(res.mean)}
          </div>
        </div>

        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:2}}>損失超越機率曲線</div>
          <div style={{fontSize:11,color:C.sub,marginBottom:12}}>Loss Exceedance Curve</div>
          <SvgExceedance data={exc}/>
          <div style={{fontSize:11,color:C.sub,marginTop:6}}>縱軸：「超過該損失值」的機率 · 橫軸：年度損失金額</div>
        </div>
      </div>

      {/* Business Interpretation */}
      <div style={{background:C.grnL,border:'1px solid #BDCFA0',borderRadius:8,padding:18,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:500,color:C.grn,marginBottom:12}}>📋 業務解讀 Business Interpretation</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {interp.map((item,i)=>(
            <div key={i} style={{fontSize:13,color:C.txt,lineHeight:1.8}}>
              · {item.zh}
              {mode==='professional'&&<div style={{fontSize:11,color:C.sub,fontStyle:'italic',marginTop:1}}>{item.en}</div>}
            </div>
          ))}
        </div>
      </div>

      {/* Scenario + Parameter summary */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:12.5,fontWeight:500,marginBottom:10}}>場景資訊 Scenario Details</div>
          {[['資產 Asset',sc.asset],['威脅來源 Threat Actor',sc.actor],['威脅行為 Threat Event',sc.event],['損失類型 Loss Event',sc.loss]].map(([l,v])=>(
            <div key={l} style={{padding:'7px 0',borderBottom:`1px solid ${C.bdr}`}}>
              <div style={{fontSize:10.5,color:C.sub,marginBottom:2}}>{l}</div>
              <div style={{fontSize:12.5}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{background:C.surf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:16}}>
          <div style={{fontSize:12.5,fontWeight:500,marginBottom:10}}>輸入假設 Input Assumptions</div>
          {paramSummary.map(({label,val})=>(
            <div key={label} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${C.bdr}`,fontSize:12}}>
              <span style={{color:C.sub}}>{label}</span>
              <span style={{color:C.txt,fontWeight:500}}>{val}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <Btn ch="← 重新模擬" onClick={back} v="ghost"/>
        <div style={{display:'flex',gap:10}}>
          <Btn ch="🖨 匯出 PDF 報告" onClick={()=>window.print()} v="amber"/>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   FAIR TAXONOMY SIDEBAR REFERENCE
═══════════════════════════════════════════════════ */
function TaxTree(){
  // Node definitions: id, label, zh, x, y, color
  const N={
    risk: {x:140,y:14, l:'Risk',  zh:'風險',    c:'#3A3A30'},
    lef:  {x:72, y:56, l:'LEF',   zh:'損失事件頻率', c:C.grn},
    lm:   {x:210,y:56, l:'LM',    zh:'損失規模', c:C.amb},
    tef:  {x:36, y:100,l:'TEF',   zh:'威脅事件頻率',c:C.grnM},
    vul:  {x:108,y:100,l:'Vul',   zh:'脆弱性',  c:C.grnM},
    pl:   {x:183,y:100,l:'PL',    zh:'主要損失',c:'#C89040'},
    sl:   {x:237,y:100,l:'SL',    zh:'次要損失',c:'#C89040'},
    cf:   {x:18, y:146,l:'CF',    zh:'接觸頻率',c:'#8AAA68'},
    poa:  {x:54, y:146,l:'PoA',   zh:'行動機率',c:'#8AAA68'},
    tcap: {x:90, y:146,l:'TCap',  zh:'威脅能力',c:'#8AAA68'},
    rs:   {x:126,y:146,l:'RS',    zh:'抵抗強度',c:'#8AAA68'},
    slef: {x:220,y:146,l:'SLEF',  zh:'次損頻率',c:'#C8A050'},
    slm:  {x:254,y:146,l:'SLM',   zh:'次損規模',c:'#C8A050'},
  };
  const edges=[
    ['risk','lef'],['risk','lm'],
    ['lef','tef'],['lef','vul'],
    ['lm','pl'],['lm','sl'],
    ['tef','cf'],['tef','poa'],
    ['vul','tcap'],['vul','rs'],
    ['sl','slef'],['sl','slm'],
  ];
  const ops=[
    {x:140,y:36,t:'×'},
    {x:72, y:78,t:'×'},
    {x:210,y:78,t:'+'},
    {x:173,y:122,t:'×'},
  ];
  return(
    <div style={{marginTop:22,paddingTop:16,borderTop:`1px solid ${C.bdr}`}}>
      <div style={{fontSize:10,letterSpacing:'0.13em',color:C.fnt,textTransform:'uppercase',marginBottom:8}}>FAIR 架構</div>
      <svg width="100%" viewBox="0 0 280 172" style={{overflow:'visible'}}>
        {/* edges */}
        {edges.map(([a,b])=>{
          const A=N[a],B=N[b];
          return <line key={a+b} x1={A.x} y1={A.y+8} x2={B.x} y2={B.y-8}
            stroke={C.bdr} strokeWidth={1}/>;
        })}
        {/* operator badges */}
        {ops.map(({x,y,t})=>(
          <g key={x+y}>
            <circle cx={x} cy={y} r={6} fill={C.bg} stroke={C.bdr} strokeWidth={0.8}/>
            <text x={x} y={y+3} textAnchor="middle" fontSize={7} fill={C.sub} fontFamily="monospace">{t}</text>
          </g>
        ))}
        {/* nodes */}
        {Object.entries(N).map(([id,{x,y,l,zh,c}])=>{
          const isLeaf=y>130;
          return(
            <g key={id}>
              <circle cx={x} cy={y} r={isLeaf?6:8} fill={c} opacity={0.9}/>
              <text x={x} y={isLeaf?y-9:y+18} textAnchor="middle"
                fontSize={isLeaf?6:6.5} fontWeight="600" fill={c} fontFamily="monospace"
                style={{letterSpacing:'0.02em'}}>{l}</text>
              {!isLeaf&&<text x={x} y={y+26} textAnchor="middle"
                fontSize={5} fill={C.fnt}>{zh}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{fontSize:9,color:C.fnt,marginTop:4,lineHeight:1.6}}>
        <span style={{color:C.grn,fontWeight:600}}>■</span> 頻率分支 &nbsp;
        <span style={{color:C.amb,fontWeight:600}}>■</span> 損失分支
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APPLICATION
═══════════════════════════════════════════════════ */
function App(){
  const [step,setStep]=useState(0);
  const [mode,setMode]=useState('professional');
  const [sc,setSc]=useState({asset:'',actor:'',event:'',loss:''});
  const [params,setParams]=useState(DEF);
  const [res,setRes]=useState(null);
  const [simming,setSimming]=useState(false);

  const upd=useCallback((k,f,v)=>{
    setParams(p=>({...p,[k]:{...p[k],[f]:parseFloat(v)||0}}));
  },[]);

  const runSim=useCallback(()=>{
    setSimming(true);
    setTimeout(()=>{
      try{setRes(runMC(params,10000));setStep(3);}
      finally{setSimming(false);}
    },80);
  },[params]);

  const NAV=[
    {zh:'場景定義',en:'Scenario'},
    {zh:'參數輸入',en:'Parameters'},
    {zh:'執行模擬',en:'Simulate'},
    {zh:'分析結果',en:'Results'},
  ];

  return(
    <div style={{fontFamily:"'Noto Serif TC','serif'",background:C.bg,minHeight:'100vh',color:C.txt}}>

      {/* ── HEADER ── */}
      <header className="no-print" style={{
        background:'#FAFAF7',borderBottom:`1px solid ${C.bdr}`,
        padding:'12px 28px',display:'flex',justifyContent:'space-between',alignItems:'center',
      }}>
        <div>
          <div style={{fontSize:9.5,letterSpacing:'0.22em',color:C.fnt,textTransform:'uppercase'}}>Factor Analysis of Information Risk</div>
          <div style={{fontSize:19,fontWeight:500,letterSpacing:'0.02em',marginTop:2}}>FAIR 風險量化分析系統</div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:12,color:C.sub,marginRight:4}}>顯示模式</span>
          {['beginner','professional'].map(m=>(
            <button key={m} onClick={()=>setMode(m)} style={{
              padding:'5px 14px',borderRadius:20,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all .15s',
              border:`1px solid ${mode===m?C.grn:C.bdr}`,background:mode===m?C.grn:'white',color:mode===m?'white':C.sub,
            }}>{m==='beginner'?'入門':'專業'}</button>
          ))}
        </div>
      </header>

      <div style={{display:'flex',maxWidth:1080,margin:'0 auto',padding:'26px 20px',gap:26}}>

        {/* ── LEFT NAV ── */}
        <nav className="no-print" style={{width:170,flexShrink:0}}>
          <div style={{position:'sticky',top:24}}>
            {NAV.map((n,i)=>{
              const act=step===i,done=step>i;
              return(
                <div key={i} onClick={()=>done&&setStep(i)} style={{display:'flex',gap:10,cursor:done?'pointer':'default'}}>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                    <div style={{
                      width:24,height:24,borderRadius:'50%',flexShrink:0,marginTop:4,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:11,fontWeight:600,transition:'all .25s',
                      background:act?C.grn:done?C.grnM:C.bdr,
                      color:act||done?'white':C.fnt,
                    }}>{done?'✓':i+1}</div>
                    {i<NAV.length-1&&<div style={{width:1,height:34,background:done?C.grnM:C.bdr,marginTop:3}}/>}
                  </div>
                  <div style={{paddingBottom:14,paddingTop:4}}>
                    <div style={{fontSize:13,fontWeight:act?500:400,color:act?C.txt:done?C.grn:C.fnt}}>{n.zh}</div>
                    <div style={{fontSize:10,color:C.fnt,letterSpacing:'0.05em'}}>{n.en}</div>
                  </div>
                </div>
              );
            })}
            <TaxTree/>
          </div>
        </nav>

        {/* ── MAIN CONTENT ── */}
        <main style={{flex:1,minWidth:0}}>
          {step===0&&<S0 sc={sc} setSc={setSc} mode={mode} next={()=>setStep(1)}/>}
          {step===1&&<S1 params={params} upd={upd} mode={mode} back={()=>setStep(0)} next={()=>setStep(2)}/>}
          {step===2&&<S2 simming={simming} runSim={runSim} back={()=>setStep(1)}/>}
          {step===3&&res&&<S3 res={res} sc={sc} params={params} mode={mode} back={()=>setStep(2)}/>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
